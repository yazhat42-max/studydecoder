<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Assignment | Study Decoder</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; width:100%; font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1419; color:#e7e9ea; }
.app-container { display:flex; flex-direction:column; min-height:100vh; min-height:100dvh; height:100dvh; width:100%; overflow-x:hidden; }
.header { background:#16202a; border-bottom:1px solid #2f3336; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.header-left { display:flex; align-items:center; gap:16px; }
.back-btn { color:#4f8cff; text-decoration:none; font-size:14px; font-weight:500; padding:8px 16px; border-radius:8px; background:rgba(79,140,255,0.1); }
.header-title { font-size:20px; font-weight:700; }
.header-subtitle { font-size:12px; color:#71767b; margin-top:2px; }
.main-content { flex:1; padding:32px 24px; }
.container { max-width:820px; margin:0 auto; }
.card { background:#16202a; border:1px solid #2f3336; border-radius:16px; padding:24px; margin-bottom:20px; }
.btn { background:linear-gradient(135deg,#4f8cff,#6c63ff); color:#fff; border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; font-family:inherit; }
.btn:hover:not(:disabled) { transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-ghost { background:rgba(79,140,255,0.08); color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); }
.btn-sm { padding:8px 16px; font-size:13px; border-radius:8px; }
.auth-loading-overlay { position:fixed; inset:0; background:#0f1419; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.auth-spinner { width:50px; height:50px; border:4px solid #2f3336; border-top-color:#4f8cff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
.error-banner { background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.4); color:#ff8088; padding:12px 16px; border-radius:8px; margin-bottom:16px; }

.head-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
.title-block h1 { font-size:24px; line-height:1.25; font-weight:800; margin-bottom:6px; }
.title-block .meta { font-size:13px; color:#a9b3bd; line-height:1.5; }
/* Per-type accent on the header card — distinct but consistent shell. */
.card.type-practice  { border-top:3px solid #8b5cf6; }
.card.type-worksheet { border-top:3px solid #f59e0b; }
.card.type-exam      { border-top:3px solid #ef4444; }
.card.type-deck      { border-top:3px solid #22c55e; }
.card.type-scenario  { border-top:3px solid #38bdf8; }
.resume-banner { background:rgba(56,189,248,0.08); border:1px solid rgba(56,189,248,0.3); color:#7dd3fc; padding:10px 14px; border-radius:10px; margin-bottom:14px; font-size:13px; line-height:1.5; }
.draft-status { position:fixed; top:78px; right:14px; background:rgba(108,99,255,0.92); color:#fff; padding:8px 14px; border-radius:999px; font-size:12px; font-weight:700; opacity:0; transform:translateY(-10px); transition:opacity .25s, transform .25s; pointer-events:none; box-shadow:0 6px 20px rgba(0,0,0,.4); z-index:90; }
.draft-status.show { opacity:1; transform:none; }
.draft-status.saving { background:rgba(168,85,247,0.92); }
.draft-status.saved { background:rgba(34,197,94,0.92); }
.draft-status.error { background:rgba(220,53,69,0.92); }
.badge { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:3px 10px; border-radius:6px; background:#1d3a5f; color:#9ec3ff; margin-right:6px; }
.badge.practice { background:rgba(139,92,246,0.18); color:#c4b5fd; }
.badge.worksheet { background:rgba(245,158,11,0.18); color:#fcd34d; }
.badge.deck { background:rgba(34,197,94,0.16); color:#86efac; }
.badge.exam { background:rgba(239,68,68,0.18); color:#fca5a5; }
.badge.scenario { background:rgba(56,189,248,0.18); color:#7dd3fc; }
.scen-setup { background:linear-gradient(135deg,rgba(56,189,248,0.08),rgba(108,99,255,0.06)); border:1px solid rgba(56,189,248,0.28); border-radius:14px; padding:18px 22px; margin-bottom:14px; font-size:15px; line-height:1.65; color:#d4d9de; white-space:pre-wrap; }
.scen-role { display:inline-block; background:rgba(108,99,255,0.18); color:#a78bfa; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:700; margin-bottom:10px; letter-spacing:.4px; text-transform:uppercase; }
.scen-progress { display:flex; gap:6px; margin-bottom:18px; }
.scen-progress span { flex:1; height:6px; background:#2f3336; border-radius:3px; transition:background .25s; }
.scen-progress span.done { background:linear-gradient(90deg,#4f8cff,#6c63ff); }
.scen-progress span.active { background:rgba(79,140,255,0.5); }
.scen-turn { background:#16202a; border:1px solid #2f3336; border-radius:14px; padding:22px 24px; margin-bottom:14px; }
.scen-turn-num { font-size:12px; color:#4f8cff; font-weight:800; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.scen-prompt { font-size:16px; color:#e7e9ea; line-height:1.6; margin-bottom:16px; }
.scen-option { display:block; width:100%; text-align:left; background:#0f1419; border:1.5px solid #2f3336; color:#e7e9ea; padding:14px 18px; border-radius:10px; margin-bottom:10px; cursor:pointer; font-size:14px; line-height:1.5; font-family:inherit; transition:all .15s; }
.scen-option:hover:not(:disabled) { border-color:rgba(79,140,255,0.55); background:rgba(79,140,255,0.06); }
.scen-option:disabled { cursor:default; opacity:.7; }
.scen-option.picked { border-color:rgba(79,140,255,0.6); background:rgba(79,140,255,0.1); }
.scen-option.correct { border-color:rgba(34,197,94,0.55); background:rgba(34,197,94,0.08); color:#86efac; }
.scen-option.wrong { border-color:rgba(220,53,69,0.45); background:rgba(220,53,69,0.06); color:#ff8088; }
.scen-feedback { margin-top:12px; padding:12px 16px; background:rgba(79,140,255,0.06); border:1px solid rgba(79,140,255,0.22); border-radius:8px; color:#d4d9de; font-size:14px; line-height:1.55; }
.scen-feedback.correct { background:rgba(34,197,94,0.08); border-color:rgba(34,197,94,0.3); color:#d4f5db; }
.scen-feedback.wrong { background:rgba(220,53,69,0.06); border-color:rgba(220,53,69,0.25); color:#ffd4d6; }
.scen-feedback .lbl { font-weight:700; display:block; margin-bottom:4px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; opacity:.85; }
.scen-advance { margin-top:14px; }
.exam-timer { position:sticky; top:60px; z-index:40; background:linear-gradient(135deg,#1a1a26,#16202a); border:1px solid rgba(239,68,68,0.3); border-radius:14px; padding:14px 18px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; box-shadow:0 8px 24px rgba(0,0,0,0.4); }
.exam-timer .clock { font-family:'JetBrains Mono', ui-monospace, monospace; font-size:22px; font-weight:800; color:#fca5a5; letter-spacing:1px; }
.exam-timer .clock.warn { color:#fcd34d; animation:examPulse 1s ease-in-out infinite; }
.exam-timer .clock.urgent { color:#ff6b6b; animation:examPulse .5s ease-in-out infinite; }
@keyframes examPulse { 50% { opacity:.5; } }
.exam-timer .meta { font-size:12px; color:#a9b3bd; }
.exam-section { background:#16202a; border:1px solid #2f3336; border-radius:14px; padding:18px 20px; margin-bottom:14px; }
.exam-section-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; padding-bottom:10px; border-bottom:1px solid #2f3336; margin-bottom:12px; }
.exam-section-title { font-size:15px; font-weight:800; color:#e7e9ea; }
.exam-section-marks { font-size:12px; color:#8899a6; font-weight:600; }
.exam-section-instr { font-size:13px; color:#a9b3bd; line-height:1.5; margin-bottom:14px; font-style:italic; }
.status-pill { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; padding:5px 12px; border-radius:999px; }
.status-pending { background:rgba(245,158,11,0.12); color:#fcd34d; border:1px solid rgba(245,158,11,0.3); }
.status-completed { background:rgba(34,197,94,0.16); color:#86efac; border:1px solid rgba(34,197,94,0.4); }

.instructions { font-size:14px; color:#d4d9de; line-height:1.55; padding:12px 14px; background:rgba(79,140,255,0.06); border:1px solid rgba(79,140,255,0.18); border-radius:8px; white-space:pre-wrap; word-break:break-word; }

.q-list { list-style:none; }
.q-item { padding:18px 0; border-bottom:1px solid #2f3336; }
.q-item:last-child { border-bottom:0; }
.q-num { font-size:13px; font-weight:700; color:#4f8cff; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.q-text { font-size:15px; color:#e7e9ea; line-height:1.6; margin-bottom:10px; }
.q-marks { color:#8899a6; font-size:13px; font-weight:500; margin-left:6px; }
.q-opts { padding:6px 0 12px 4px; color:#a9b3bd; font-size:14px; line-height:1.85; }
.q-opts > div { padding:4px 0; }
.q-opts label { display:flex; align-items:flex-start; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; transition:background .15s; }
.q-opts label:hover { background:rgba(79,140,255,0.06); }
.q-opts label input[type=radio] { margin-top:4px; accent-color:#4f8cff; }
.q-opts label input[type=radio]:disabled { opacity:.6; }
.q-textarea { width:100%; background:#0f1419; border:1px solid #2f3336; border-radius:8px; padding:12px 14px; color:#e7e9ea; font-size:14px; font-family:inherit; line-height:1.55; min-height:80px; resize:vertical; }
.q-textarea:focus { outline:none; border-color:#4f8cff; }
.q-textarea[disabled] { background:rgba(15,20,25,0.6); color:#a9b3bd; cursor:default; }
.show-answer { color:#4f8cff; cursor:pointer; font-size:13px; font-weight:600; background:none; border:none; padding:6px 0; font-family:inherit; }
.show-answer:hover { text-decoration:underline; }
.answer-block { margin-top:8px; padding:10px 14px; background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.22); border-radius:8px; color:#d4d9de; font-size:14px; line-height:1.55; }
.answer-block .lbl { font-weight:700; color:#86efac; display:block; margin-bottom:4px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
.mark-row { display:flex; align-items:center; gap:10px; margin-top:10px; padding:8px 12px; border-radius:8px; font-size:13px; font-weight:600; }
.mark-good { background:rgba(34,197,94,0.10); color:#86efac; border:1px solid rgba(34,197,94,0.3); }
.mark-mid { background:rgba(245,158,11,0.10); color:#fcd34d; border:1px solid rgba(245,158,11,0.3); }
.mark-low { background:rgba(220,53,69,0.10); color:#ff8088; border:1px solid rgba(220,53,69,0.3); }
.mark-bar { flex-shrink:0; min-width:60px; text-align:center; padding:4px 8px; border-radius:6px; background:rgba(255,255,255,0.06); font-weight:800; }
.mark-fb { flex:1; line-height:1.45; font-weight:500; }
.score-banner { background:linear-gradient(135deg,rgba(108,99,255,0.18),rgba(167,139,250,0.10)); border:1px solid rgba(108,99,255,0.35); border-radius:14px; padding:18px 22px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; }
.score-banner .num { font-size:34px; font-weight:900; color:#a78bfa; line-height:1; }
.score-banner .lbl { font-size:13px; color:rgba(255,255,255,0.65); margin-top:4px; }
.score-banner .band { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); padding:6px 16px; border-radius:999px; font-size:14px; font-weight:700; color:#fff; }

.deck-card { background:#0f1419; border:1px solid #2f3336; border-radius:12px; padding:18px; margin-bottom:14px; cursor:pointer; transition:border-color .15s; }
.deck-card:hover { border-color:rgba(79,140,255,0.45); }
.deck-card .front { font-size:15px; font-weight:700; color:#e7e9ea; margin-bottom:6px; }
.deck-card .back { font-size:14px; color:#a9b3bd; line-height:1.55; display:none; padding-top:8px; border-top:1px solid #2f3336; margin-top:8px; }
.deck-card.show .back { display:block; }
.deck-card .flip-hint { color:#71767b; font-size:12px; font-style:italic; }
.deck-card.show .flip-hint { display:none; }

.footer-actions { display:flex; gap:12px; justify-content:flex-end; padding-top:20px; border-top:1px solid #2f3336; margin-top:20px; flex-wrap:wrap; }

@media (max-width:600px) {
    .main-content { padding:18px 14px; }
    .title-block h1 { font-size:20px; }
    .header { padding:10px 14px; }
    .header-title { font-size:16px; }
    .footer-actions { justify-content:stretch; }
    .footer-actions .btn { flex:1; }
}
</style>
</head>
<body>
<div id="authLoading" class="auth-loading-overlay"><div class="auth-spinner"></div><div style="margin-top:16px;color:#71767b;">Loading…</div></div>
<div class="app-container hidden" id="appContainer">
  <header class="header">
    <div class="header-left">
      <a href="student-assignments.html" class="back-btn">← All assignments</a>
      <div><div class="header-title">Assignment</div><div class="header-subtitle" id="hSubtitle">Loading…</div></div>
    </div>
  </header>
  <main class="main-content">
    <div class="container" id="root"></div>
  </main>
</div>
<script src="auth.js"></script>
<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
function api(path, opts){ return fetch(API_BASE+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts||{})); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escMultiline(s){ return esc(s).replace(/\n/g, '<br>'); }
function fmtDate(s){
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

const params = new URLSearchParams(location.search);
const assignmentId = params.get('id');

let currentState = null;

function render(data){
    currentState = data;
    const a = data.assignment;
    const status = data.status || 'pending';
    const isCompleted = status === 'completed';
    const hasMarking = isCompleted && Array.isArray(data.perQuestion);
    document.getElementById('hSubtitle').textContent = (data.className || 'Your class') + (data.classSubject ? ' · ' + data.classSubject : '');

    // Build per-question answer lookup for re-rendering the completed view.
    const answerLookup = {};
    if (Array.isArray(data.answers)) {
        data.answers.forEach(ans => { answerLookup[ans.qIdx] = ans.value || ''; });
    }
    const markLookup = {};
    if (Array.isArray(data.perQuestion)) {
        data.perQuestion.forEach(r => { markLookup[r.qIdx] = r; });
    }

    function markRow(i, q) {
        const r = markLookup[i];
        if (!r) return '';
        const total = parseInt(r.marksTotal, 10) || 0;
        const got = parseInt(r.marksAwarded, 10) || 0;
        const cls = total === 0 ? 'mark-mid' : (got === total ? 'mark-good' : (got / total >= 0.5 ? 'mark-mid' : 'mark-low'));
        return `<div class="mark-row ${cls}">
            <div class="mark-bar">${got} / ${total}</div>
            <div class="mark-fb">${esc(r.feedback || '')}</div>
        </div>`;
    }

    let body = '';
    let scoreBanner = '';
    let timerBlock = '';
    // "Resumed" banner when the student is coming back to a saved draft.
    let resumeBanner = '';
    if (!isCompleted && data.draft && data.draft.savedAt) {
        const when = new Date(data.draft.savedAt);
        const ago = isNaN(when) ? '' : when.toLocaleString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        resumeBanner = `<div class="resume-banner">📂 <strong>Resumed from your saved progress</strong>${ago ? ' · last saved ' + esc(ago) : ''}. Your answers below are pre-filled.</div>`;
    }
    if (!a.content){
        body = '<div class="error-banner">Your teacher hasn\'t generated content for this assignment yet, or the generation failed. Ask them to delete and re-create it.</div>';
    } else if (a.type === 'deck' && Array.isArray(a.content.cards)){
        body = '<div class="card"><div class="section-title" style="font-weight:700;font-size:15px;margin-bottom:14px;">Flashcards — tap to reveal each answer</div>' +
            a.content.cards.map((c, i) =>
                `<div class="deck-card" data-card-idx="${i}">
                    <div class="front">${i+1}. ${esc(c.front || '')}</div>
                    <div class="flip-hint">Tap to reveal answer</div>
                    <div class="back">${escMultiline(c.back || '')}</div>
                </div>`
            ).join('') +
            '</div>';
    } else if (a.type === 'scenario' && Array.isArray(a.content.turns)){
        // Learn-IRL scenario: one turn shown at a time. Picks are tracked
        // client-side, then submitted in one POST when the last turn ends.
        if (hasMarking && data.totalPossible != null) {
            scoreBanner = `<div class="score-banner">
                <div>
                    <div class="num">${esc(data.totalAwarded)} / ${esc(data.totalPossible)}</div>
                    <div class="lbl">${esc(data.score || 0)}% &middot; Decisions correct</div>
                </div>
                <div class="band">${esc(data.band || '')}</div>
            </div>`;
        }
        body = `<div>
            <div class="scen-setup">
                ${a.content.role ? `<div class="scen-role">You are: ${esc(a.content.role)}</div>` : ''}
                ${escMultiline(a.content.setup || '')}
            </div>
            <div class="scen-progress" id="scenProgress">${a.content.turns.map((_, i) => `<span data-turn="${i}"></span>`).join('')}</div>
            <div id="scenTurnSlot"></div>
        </div>`;
    } else if (a.type === 'exam' && Array.isArray(a.content.sections)){
        // Sectioned exam view with a sticky countdown timer at the top.
        if (hasMarking && data.totalPossible != null) {
            scoreBanner = `<div class="score-banner">
                <div>
                    <div class="num">${esc(data.totalAwarded)} / ${esc(data.totalPossible)}</div>
                    <div class="lbl">${esc(data.score || 0)}% &middot; AI-marked exam</div>
                </div>
                <div class="band">${esc(data.band || '')}</div>
            </div>`;
        }
        if (!isCompleted) {
            const mins = a.content.duration || 60;
            timerBlock = `<div class="exam-timer" id="examTimer" data-minutes="${mins}">
                <div>
                    <div class="meta">⏱ Time remaining</div>
                    <div class="clock" id="examClock">${mins}:00</div>
                </div>
                <div class="meta" style="text-align:right;">${esc(a.content.questions ? a.content.questions.length : 0)} questions &middot; ${esc(a.content.totalMarks || '?')} marks total</div>
            </div>`;
        }
        let qCounter = 0;
        body = a.content.sections.map(sec => {
            const secMarks = (sec.questions || []).reduce((s, q) => s + (parseInt(q.marks, 10) || 0), 0);
            const items = (sec.questions || []).map(q => {
                const i = qCounter++;
                const marks = q.marks ? `<span class="q-marks">[${esc(q.marks)} marks]</span>` : '';
                const isMc = q.type === 'mc' && Array.isArray(q.options) && q.options.length;
                const currentValue = answerLookup[i] || '';
                let inputHtml = '';
                if (isMc) {
                    const letters = ['A','B','C','D','E','F'];
                    inputHtml = '<div class="q-opts">' + q.options.map((o, j) => {
                        const letter = letters[j] || String(j+1);
                        const checked = currentValue && currentValue.toUpperCase().startsWith(letter) ? 'checked' : '';
                        const disabled = isCompleted ? 'disabled' : '';
                        return `<label><input type="radio" name="q${i}" value="${esc(letter)}" ${checked} ${disabled}><span>${esc(o)}</span></label>`;
                    }).join('') + '</div>';
                } else {
                    inputHtml = `<textarea class="q-textarea" data-q-idx="${i}" ${isCompleted ? 'disabled' : ''} placeholder="Write your answer here…">${esc(currentValue)}</textarea>`;
                }
                return `<li class="q-item" data-q-idx="${i}">
                    <div class="q-num">Question ${i+1}</div>
                    <div class="q-text"><strong>${esc(q.question || '')}</strong>${marks}</div>
                    ${inputHtml}
                    ${markRow(i, q)}
                    ${isCompleted ? `<button class="show-answer" data-show="${i}" style="margin-top:10px;">Show model answer ↓</button>
                        <div class="answer-block" id="ans-${i}" style="display:none;">
                            <span class="lbl">Model answer</span>
                            ${escMultiline(q.answer || '')}
                            ${q.explanation ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(34,197,94,0.22);"><span class="lbl">Marking note</span>${escMultiline(q.explanation)}</div>` : ''}
                        </div>` : ''}
                </li>`;
            }).join('');
            return `<div class="exam-section">
                <div class="exam-section-head">
                    <div class="exam-section-title">${esc(sec.title || 'Section')}</div>
                    <div class="exam-section-marks">${secMarks} marks</div>
                </div>
                ${sec.instructions ? `<div class="exam-section-instr">${esc(sec.instructions)}</div>` : ''}
                <ol class="q-list">${items}</ol>
            </div>`;
        }).join('');
    } else if (Array.isArray(a.content.questions)){
        if (hasMarking && data.totalPossible != null) {
            scoreBanner = `<div class="score-banner">
                <div>
                    <div class="num">${esc(data.totalAwarded)} / ${esc(data.totalPossible)}</div>
                    <div class="lbl">${esc(data.score || 0)}% &middot; AI-marked</div>
                </div>
                <div class="band">${esc(data.band || '')}</div>
            </div>`;
        }
        body = '<div class="card"><ol class="q-list">' + a.content.questions.map((q, i) => {
            const marks = q.marks ? `<span class="q-marks">[${esc(q.marks)} marks]</span>` : '';
            const isMc = q.type === 'mc' && Array.isArray(q.options) && q.options.length;
            const currentValue = answerLookup[i] || '';
            let inputHtml = '';
            if (isMc) {
                const letters = ['A','B','C','D','E','F'];
                inputHtml = '<div class="q-opts">' + q.options.map((o, j) => {
                    const letter = letters[j] || String(j+1);
                    const checked = currentValue && currentValue.toUpperCase().startsWith(letter) ? 'checked' : '';
                    const disabled = isCompleted ? 'disabled' : '';
                    return `<label><input type="radio" name="q${i}" value="${esc(letter)}" ${checked} ${disabled}><span>${esc(o)}</span></label>`;
                }).join('') + '</div>';
            } else {
                inputHtml = `<textarea class="q-textarea" data-q-idx="${i}" ${isCompleted ? 'disabled' : ''} placeholder="Write your answer here…">${esc(currentValue)}</textarea>`;
            }
            return `<li class="q-item" data-q-idx="${i}">
                <div class="q-num">Question ${i+1}</div>
                <div class="q-text"><strong>${esc(q.question || '')}</strong>${marks}</div>
                ${inputHtml}
                ${markRow(i, q)}
                <button class="show-answer" data-show="${i}" style="margin-top:10px;">Show model answer ↓</button>
                <div class="answer-block" id="ans-${i}" style="display:none;">
                    <span class="lbl">Model answer</span>
                    ${escMultiline(q.answer || '')}
                    ${q.explanation ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(34,197,94,0.22);"><span class="lbl">Marking note</span>${escMultiline(q.explanation)}</div>` : ''}
                </div>
            </li>`;
        }).join('') + '</ol></div>';
    } else {
        body = '<div class="error-banner">Assignment content is in an unknown format.</div>';
    }

    const typeClass = (a.type || '').toLowerCase();
    const isDeck = a.type === 'deck';
    const isExam = a.type === 'exam';
    const isScenario = a.type === 'scenario';
    let actionBtns = '';
    if (a.content) {
        if (isDeck) {
            actionBtns = isCompleted
                ? `<button class="btn btn-ghost" id="markBtn" data-target="pending">Mark as not done</button>`
                : `<button class="btn" id="markBtn" data-target="completed">Mark as done ✓</button>`;
        } else if (isScenario) {
            // Scenario submission is triggered automatically when the student
            // finishes the last turn. Only show a "Replay" affordance once
            // the scenario is completed.
            actionBtns = isCompleted ? `<button class="btn btn-ghost" id="retryBtn">Replay scenario</button>` : '';
        } else if (isCompleted) {
            actionBtns = `<button class="btn btn-ghost" id="retryBtn">${isExam ? 'Re-attempt exam' : 'Resubmit answers'}</button>`;
        } else {
            const label = isExam ? 'Submit exam for marking →' : 'Submit answers for marking →';
            actionBtns = `<button class="btn" id="submitBtn">${label}</button>`;
        }
    }

    document.getElementById('root').innerHTML = `
        <div class="card type-${typeClass}">
            <div class="head-row">
                <div class="title-block">
                    <div style="margin-bottom:8px;"><span class="badge ${typeClass}">${esc(a.type || '')}</span></div>
                    <h1>${esc(a.title)}</h1>
                    <div class="meta">${data.className ? esc(data.className) : 'Your class'}${data.classSubject ? ' · ' + esc(data.classSubject) : ''}${a.dueAt ? ' · Due ' + esc(fmtDate(a.dueAt)) : ''}${a.spec && a.spec.difficulty ? ' · ' + esc(a.spec.difficulty.charAt(0).toUpperCase() + a.spec.difficulty.slice(1)) : ''}</div>
                </div>
                <span class="status-pill ${isCompleted ? 'status-completed' : 'status-pending'}">${isCompleted ? '✓ Completed' : 'Pending'}</span>
            </div>
            ${(a.instructions || a.refId) ? `<div class="instructions"><strong>Teacher's instructions:</strong><br>${escMultiline(a.instructions || a.refId)}</div>` : ''}
        </div>
        ${resumeBanner}
        ${timerBlock}
        ${scoreBanner}
        ${body}
        <div class="footer-actions">
            <a class="btn btn-ghost btn-sm" href="student-assignments.html">← Back</a>
            ${actionBtns}
        </div>`;

    // Wire flashcard flips
    document.querySelectorAll('.deck-card').forEach(c => {
        c.addEventListener('click', () => c.classList.toggle('show'));
    });
    // Wire show-answer toggles
    document.querySelectorAll('.show-answer').forEach(b => {
        b.addEventListener('click', () => {
            const block = document.getElementById('ans-' + b.dataset.show);
            const isOpen = block.style.display === 'block';
            block.style.display = isOpen ? 'none' : 'block';
            b.textContent = isOpen ? 'Show model answer ↓' : 'Hide model answer ↑';
        });
    });
    // Wire mark-as-done (deck only)
    const markBtn = document.getElementById('markBtn');
    if (markBtn){
        markBtn.addEventListener('click', () => toggleDone(markBtn.dataset.target, markBtn));
    }
    // Wire submit (practice/worksheet)
    const submitBtn = document.getElementById('submitBtn');
    if (submitBtn) submitBtn.addEventListener('click', () => submitAnswers(submitBtn));
    // Wire resubmit
    const retryBtn = document.getElementById('retryBtn');
    if (retryBtn) retryBtn.addEventListener('click', () => {
        // Re-render in input mode by clearing the local submission view
        data.status = 'pending';
        data.perQuestion = null;
        render(data);
    });
    // Exam timer
    startExamTimer();
    // Scenario play
    if (data.assignment && data.assignment.type === 'scenario') {
        startScenarioPlay(data);
    }
    // Draft autosave — only for editable, question-bearing types (practice /
    // worksheet / exam). Scenarios autosubmit on the last turn so don't need
    // drafts. Decks self-mark, no answers to save.
    const t = data.assignment && data.assignment.type;
    if (!isCompleted && (t === 'practice' || t === 'worksheet' || t === 'exam')) {
        startDraftAutosave();
    } else {
        stopDraftAutosave();
    }
}

// ---------- Draft autosave ----------
let _draftTimer = null;
let _draftLastSavedJson = '';
let _draftDirty = false;
function startDraftAutosave() {
    stopDraftAutosave();
    // Mark dirty on any input.
    document.querySelectorAll('.q-textarea').forEach(t => {
        t.addEventListener('input', () => { _draftDirty = true; });
    });
    document.querySelectorAll('input[type=radio]').forEach(r => {
        r.addEventListener('change', () => { _draftDirty = true; saveDraftSoon(800); });
    });
    // Periodic flush — saves whatever's typed in the last interval.
    _draftTimer = setInterval(() => { if (_draftDirty) saveDraft(); }, 20000);
    // Also save when the tab is about to close.
    window.addEventListener('beforeunload', beforeUnloadSave);
}
function stopDraftAutosave() {
    if (_draftTimer) { clearInterval(_draftTimer); _draftTimer = null; }
    window.removeEventListener('beforeunload', beforeUnloadSave);
}
function beforeUnloadSave() {
    // navigator.sendBeacon is the only reliable way to flush on unload.
    if (!_draftDirty) return;
    const payload = JSON.stringify({ answers: gatherAnswers() });
    try {
        navigator.sendBeacon(
            API_BASE + '/api/student/assignments/' + encodeURIComponent(assignmentId) + '/draft',
            new Blob([payload], { type: 'application/json' })
        );
    } catch (e) { /* ignore */ }
}
let _draftSoonTimer = null;
function saveDraftSoon(delayMs) {
    if (_draftSoonTimer) clearTimeout(_draftSoonTimer);
    _draftSoonTimer = setTimeout(() => { saveDraft(); }, delayMs || 1500);
}
function saveDraft() {
    const answers = gatherAnswers();
    const json = JSON.stringify(answers);
    if (json === _draftLastSavedJson) { _draftDirty = false; return; }
    showDraftStatus('saving', 'Saving…');
    api('/api/student/assignments/' + encodeURIComponent(assignmentId) + '/draft', {
        method: 'POST',
        body: JSON.stringify({ answers })
    })
        .then(r => {
            if (!r.ok) { showDraftStatus('error', 'Could not save'); return; }
            _draftLastSavedJson = json;
            _draftDirty = false;
            showDraftStatus('saved', '✓ Saved');
        })
        .catch(() => showDraftStatus('error', 'Could not save'));
}
function showDraftStatus(cls, label) {
    let el = document.getElementById('draftStatus');
    if (!el) {
        el = document.createElement('div');
        el.id = 'draftStatus';
        el.className = 'draft-status';
        document.body.appendChild(el);
    }
    el.className = 'draft-status show ' + cls;
    el.textContent = label;
    if (cls === 'saved') {
        setTimeout(() => { if (el.classList.contains('saved')) el.classList.remove('show'); }, 1800);
    }
}

// ---------- Learn-IRL scenario play (client-side state machine) ----------
let _scenarioPicks = {}; // turnIdx → optionIdx
function startScenarioPlay(data){
    _scenarioPicks = {};
    const turns = data.assignment.content.turns || [];
    const isCompleted = data.status === 'completed';
    // If already completed, hydrate picks from saved answers so all turns
    // render in their final state.
    if (isCompleted && Array.isArray(data.answers)) {
        data.answers.forEach(a => { _scenarioPicks[a.qIdx] = parseInt(a.value, 10); });
        renderScenarioCompleted(turns, data);
    } else {
        renderScenarioTurn(turns, 0);
    }
}
function renderScenarioCompleted(turns, data) {
    const slot = document.getElementById('scenTurnSlot');
    if (!slot) return;
    document.querySelectorAll('#scenProgress span').forEach(s => s.classList.add('done'));
    slot.innerHTML = turns.map((t, i) => {
        const picked = _scenarioPicks[i];
        const perQ = (data.perQuestion || []).find(q => q.qIdx === i) || {};
        const wasCorrect = perQ.marksAwarded > 0;
        return `<div class="scen-turn">
            <div class="scen-turn-num">Turn ${i+1} of ${turns.length} · ${wasCorrect ? '<span style="color:#86efac;">✓ Correct</span>' : '<span style="color:#ff8088;">✗ Wrong</span>'}</div>
            <div class="scen-prompt">${esc(t.prompt || '')}</div>
            ${(t.options || []).map((o, j) => {
                const isPicked = j === picked;
                const cls = isPicked ? (o.isCorrect ? 'correct' : 'wrong') : (o.isCorrect ? 'correct' : '');
                return `<button class="scen-option ${cls}" disabled>${isPicked ? '➤ ' : (o.isCorrect ? '✓ ' : '')}${esc(o.label || '')}</button>`;
            }).join('')}
            ${perQ.feedback ? `<div class="scen-feedback ${wasCorrect ? 'correct' : 'wrong'}"><span class="lbl">Outcome</span>${esc(perQ.feedback)}</div>` : ''}
        </div>`;
    }).join('');
}
function renderScenarioTurn(turns, idx) {
    const slot = document.getElementById('scenTurnSlot');
    if (!slot) return;
    // Progress bar
    document.querySelectorAll('#scenProgress span').forEach((s, i) => {
        s.classList.toggle('done', i < idx);
        s.classList.toggle('active', i === idx);
    });
    if (idx >= turns.length) {
        slot.innerHTML = '<div class="card" style="text-align:center;padding:30px;"><div style="font-size:2rem;margin-bottom:10px;">🎯</div><div style="color:#e7e9ea;font-weight:700;margin-bottom:8px;">Scenario complete — submitting your decisions…</div><div style="color:#a9b3bd;font-size:13px;">Hold on a second.</div></div>';
        submitScenario(turns);
        return;
    }
    const t = turns[idx];
    slot.innerHTML = `<div class="scen-turn">
        <div class="scen-turn-num">Turn ${idx+1} of ${turns.length}</div>
        <div class="scen-prompt">${esc(t.prompt || '')}</div>
        ${(t.options || []).map((o, j) => `<button class="scen-option" data-opt="${j}">${esc(o.label || '')}</button>`).join('')}
        <div id="scenFeedbackSlot"></div>
    </div>`;
    slot.querySelectorAll('.scen-option').forEach(btn => {
        btn.addEventListener('click', () => pickScenarioOption(turns, idx, parseInt(btn.dataset.opt, 10)));
    });
}
function pickScenarioOption(turns, idx, optIdx) {
    _scenarioPicks[idx] = optIdx;
    const t = turns[idx];
    const o = t.options[optIdx];
    if (!o) return;
    // Lock all option buttons + style the picked / correct ones
    const slot = document.getElementById('scenTurnSlot');
    slot.querySelectorAll('.scen-option').forEach((btn, j) => {
        btn.disabled = true;
        if (j === optIdx) btn.classList.add('picked', o.isCorrect ? 'correct' : 'wrong');
        else if (t.options[j].isCorrect) btn.classList.add('correct');
    });
    const fb = document.getElementById('scenFeedbackSlot');
    fb.innerHTML = `<div class="scen-feedback ${o.isCorrect ? 'correct' : 'wrong'}">
        <span class="lbl">${o.isCorrect ? 'Right call' : 'Not the best call'}</span>
        ${esc(o.feedback || '')}
    </div>
    <div class="scen-advance">
        <button class="btn btn-sm" id="scenNextBtn">${idx + 1 >= turns.length ? 'Finish & submit →' : 'Next turn →'}</button>
    </div>`;
    document.getElementById('scenNextBtn').addEventListener('click', () => renderScenarioTurn(turns, idx + 1));
}
function submitScenario(turns) {
    const answers = turns.map((_, i) => ({ qIdx: i, value: _scenarioPicks[i] != null ? String(_scenarioPicks[i]) : '' }));
    api('/api/student/assignments/' + encodeURIComponent(assignmentId) + '/answers', {
        method: 'POST',
        body: JSON.stringify({ answers })
    })
        .then(async r => {
            if (!r.ok){
                const d = await r.json().catch(()=>({}));
                alert(d.error || 'Could not save your decisions.');
                return;
            }
            loadAssignment();
        })
        .catch(() => alert('Network error. Please try again.'));
}

// Single ticking interval so re-renders don't pile up multiple timers.
let _examTimerInterval = null;
let _examTimerExpiresAt = 0;
function startExamTimer(){
    const el = document.getElementById('examTimer');
    if (!el) {
        if (_examTimerInterval) { clearInterval(_examTimerInterval); _examTimerInterval = null; }
        return;
    }
    const minutes = parseInt(el.dataset.minutes, 10) || 60;
    // Persist the deadline so refreshing the page doesn't reset the timer.
    const storeKey = 'sd_exam_deadline_' + assignmentId;
    const stored = parseInt(sessionStorage.getItem(storeKey) || '0', 10);
    if (stored && stored > Date.now()) {
        _examTimerExpiresAt = stored;
    } else {
        _examTimerExpiresAt = Date.now() + minutes * 60 * 1000;
        sessionStorage.setItem(storeKey, String(_examTimerExpiresAt));
    }
    if (_examTimerInterval) clearInterval(_examTimerInterval);
    function tick(){
        const remaining = Math.max(0, _examTimerExpiresAt - Date.now());
        const totalSec = Math.round(remaining / 1000);
        const mm = Math.floor(totalSec / 60);
        const ss = totalSec % 60;
        const clock = document.getElementById('examClock');
        if (!clock) { clearInterval(_examTimerInterval); _examTimerInterval = null; return; }
        clock.textContent = mm + ':' + String(ss).padStart(2, '0');
        clock.classList.toggle('warn', totalSec <= 600 && totalSec > 60);
        clock.classList.toggle('urgent', totalSec <= 60);
        // Update the "Time remaining" label once the clock hits zero so it
        // doesn't keep saying remaining when there's none left.
        const timerLabel = document.querySelector('#examTimer .meta');
        if (timerLabel) timerLabel.textContent = totalSec <= 0 ? '⏱ Time\'s up' : '⏱ Time remaining';
        if (totalSec <= 0) {
            clearInterval(_examTimerInterval);
            _examTimerInterval = null;
            sessionStorage.removeItem(storeKey);
            // Auto-submit when time runs out. Force a final draft save first
            // so anything typed in the last 20s window (before the autosave
            // interval fired) is captured in the submission payload.
            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn && !submitBtn.disabled) {
                _draftDirty = false; // skip the redundant draft save call
                alert('Time\'s up — submitting your exam now.');
                submitAnswers(submitBtn);
            }
        }
    }
    tick();
    _examTimerInterval = setInterval(tick, 1000);
}

function gatherAnswers(){
    const root = document.getElementById('root');
    const answers = [];
    root.querySelectorAll('.q-textarea').forEach(t => {
        answers.push({ qIdx: parseInt(t.dataset.qIdx, 10), value: t.value || '' });
    });
    // For MC, find selected radio per q-item
    root.querySelectorAll('.q-item').forEach(item => {
        const idx = parseInt(item.dataset.qIdx, 10);
        if (answers.some(a => a.qIdx === idx)) return;
        const picked = item.querySelector('input[type=radio]:checked');
        answers.push({ qIdx: idx, value: picked ? picked.value : '' });
    });
    return answers.sort((a,b) => a.qIdx - b.qIdx);
}

function submitAnswers(btn){
    const answers = gatherAnswers();
    if (!answers.some(a => a.value && a.value.trim())) {
        if (!confirm('You haven\'t answered any questions. Submit anyway (score will be 0)?')) return;
    }
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = 'Marking (10-20s)…';
    api('/api/student/assignments/' + encodeURIComponent(assignmentId) + '/answers', {
        method: 'POST',
        body: JSON.stringify({ answers })
    })
        .then(async r => {
            if (!r.ok){
                const d = await r.json().catch(()=>({}));
                alert(d.error || 'Could not submit your answers.');
                btn.disabled = false; btn.textContent = orig;
                return;
            }
            // Exam submitted — clear the persisted timer deadline so a
            // re-attempt starts a fresh clock + tear down the draft autosave.
            try { sessionStorage.removeItem('sd_exam_deadline_' + assignmentId); } catch (e) {}
            if (_examTimerInterval) { clearInterval(_examTimerInterval); _examTimerInterval = null; }
            stopDraftAutosave();
            const ds = document.getElementById('draftStatus');
            if (ds) ds.remove();
            loadAssignment();
        })
        .catch(() => {
            alert('Network error. Please try again.');
            btn.disabled = false; btn.textContent = orig;
        });
}

function toggleDone(target, btn){
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = target === 'completed' ? 'Saving…' : 'Updating…';
    api('/api/student/assignments/' + encodeURIComponent(assignmentId) + '/submit', {
        method: 'POST',
        body: JSON.stringify({ status: target })
    })
        .then(async r => {
            if (!r.ok){
                const d = await r.json().catch(()=>({}));
                alert(d.error || 'Could not update assignment.');
                btn.disabled = false; btn.textContent = orig;
                return;
            }
            loadAssignment();
        })
        .catch(() => {
            alert('Network error. Please try again.');
            btn.disabled = false; btn.textContent = orig;
        });
}

function loadAssignment(){
    if (!assignmentId){
        document.getElementById('root').innerHTML = '<div class="error-banner">No assignment specified.</div>';
        document.getElementById('authLoading').classList.add('hidden');
        document.getElementById('appContainer').classList.remove('hidden');
        return;
    }
    api('/api/student/assignments/' + encodeURIComponent(assignmentId))
        .then(async r => {
            if (!r.ok){
                if (r.status === 401){
                    window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname + location.search);
                    return;
                }
                const d = await r.json().catch(()=>({}));
                document.getElementById('root').innerHTML = '<div class="error-banner">' + esc(d.error || 'Could not load this assignment.') + '</div>';
                return;
            }
            return r.json();
        })
        .then(d => { if (d) render(d); })
        .catch(() => {
            document.getElementById('root').innerHTML = '<div class="error-banner">Network error. Please refresh.</div>';
        })
        .finally(() => {
            document.getElementById('authLoading').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
        });
}

(function init(){
    api('/api/subscription')
        .then(r => {
            if (!r.ok || r.status === 401){
                window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname + location.search);
                return null;
            }
            return r.json();
        })
        .then(d => {
            if (!d) return;
            if (d.role === 'teacher'){
                window.location.replace('/teacher-dashboard.html');
                return;
            }
            loadAssignment();
        })
        .catch(() => {
            window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname + location.search);
        });
})();
</script>
