<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>For Teachers | Study Decoder</title>
<meta name="description" content="One teacher seat gives your whole class full access to Study Decoder. From $15/month — junior, senior or combined. Up to 100 linked students. Cancel anytime.">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; width:100%; font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1419; color:#e7e9ea; }
.app-container { display:flex; flex-direction:column; min-height:100vh; width:100%; overflow-x:hidden; }
.header { background:#16202a; border-bottom:1px solid #2f3336; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.header-left { display:flex; align-items:center; gap:16px; }
.back-btn { color:#4f8cff; text-decoration:none; font-size:14px; font-weight:500; padding:8px 16px; border-radius:8px; background:rgba(79,140,255,0.1); }
.header-title { font-size:20px; font-weight:700; }
.header-subtitle { font-size:12px; color:#71767b; margin-top:2px; }
.main-content { flex:1; padding:32px 24px; }
.container { max-width:980px; margin:0 auto; }
.card { background:#16202a; border:1px solid #2f3336; border-radius:16px; padding:24px; margin-bottom:20px; }
.btn { background:linear-gradient(135deg,#4f8cff,#6c63ff); color:#fff; border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; }
.btn:hover:not(:disabled) { transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-ghost { background:#1d3a5f; color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); }
.btn-danger { background:rgba(220,53,69,0.15); color:#ff8088; border:1px solid rgba(220,53,69,0.4); }
.form-input,.form-select,textarea { background:#0f1419; border:1px solid #2f3336; border-radius:8px; padding:12px 14px; color:#e7e9ea; font-size:14px; font-family:inherit; width:100%; }
.form-input:focus,.form-select:focus,textarea:focus { outline:none; border-color:#4f8cff; }
.form-label { font-size:13px; font-weight:500; color:#c8ccd0; display:block; margin-bottom:6px; }
.auth-loading-overlay { position:fixed; inset:0; background:#0f1419; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.auth-spinner { width:50px; height:50px; border:4px solid #2f3336; border-top-color:#4f8cff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
.error-banner { background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.4); color:#ff8088; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
.stat-box { background:#0f1419; border:1px solid #2f3336; border-radius:12px; padding:16px; }
.stat-box .num { font-size:26px; font-weight:800; color:#4f8cff; }
.stat-box .lbl { font-size:12px; color:#8899a6; margin-top:2px; }
table { width:100%; border-collapse:collapse; }
th,td { text-align:left; padding:10px 12px; border-bottom:1px solid #2f3336; font-size:14px; }
th { color:#8899a6; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
@media (max-width:720px){ .main-content{padding:16px;} table{font-size:13px;} th,td{padding:8px 6px;} }

.hero { text-align:center; padding:24px 8px 8px; }
.hero h1 { font-size:34px; line-height:1.2; font-weight:800; margin-bottom:14px; }
.hero h1 .grad { background:linear-gradient(135deg,#4f8cff,#6c63ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.hero p { font-size:16px; color:#a9b3bd; max-width:620px; margin:0 auto; }
.plan-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
@media (max-width:760px){ .plan-grid { grid-template-columns:1fr; } }
.plan-card { background:#16202a; border:1px solid #2f3336; border-radius:16px; padding:22px; display:flex; flex-direction:column; text-align:center; position:relative; }
.plan-card.featured { border-color:rgba(79,140,255,0.55); box-shadow:0 0 24px rgba(79,140,255,0.08); }
.plan-tag { position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#4f8cff,#6c63ff); color:#fff; font-size:11px; font-weight:700; letter-spacing:0.5px; padding:3px 12px; border-radius:50px; text-transform:uppercase; }
.plan-name { font-size:14px; font-weight:700; color:#8899a6; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.plan-price { font-size:36px; font-weight:800; }
.plan-price .per { font-size:14px; color:#8899a6; font-weight:600; }
.plan-sub { color:#8899a6; font-size:12px; margin-top:2px; min-height:32px; }
.feature-list { list-style:none; text-align:left; margin:16px 0; }
.feature-list li { padding:6px 0; font-size:13px; color:#d4d9de; }
.feature-list li.muted { color:#71767b; }
.plan-cta { margin-top:auto; padding-top:14px; }
.plan-cta .btn { width:100%; }
.faq details { background:#0f1419; border:1px solid #2f3336; border-radius:10px; padding:12px 16px; margin-bottom:10px; }
.faq summary { cursor:pointer; font-weight:600; font-size:15px; color:#e7e9ea; }
.faq details[open] summary { color:#4f8cff; }
.faq p { margin-top:10px; color:#a9b3bd; font-size:14px; line-height:1.55; }
.section-title { font-size:18px; font-weight:700; margin-bottom:14px; }
.link-inline { color:#4f8cff; text-decoration:none; font-weight:600; }
.success-note { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.4); color:#7ee2a8; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
/* Premium plan-card depth + hover lift (paired with teacher-theme.css) */
.plan-card { transition:transform .2s cubic-bezier(.2,.7,.2,1), box-shadow .2s, border-color .2s; }
.plan-card:hover { transform:translateY(-4px); box-shadow:0 16px 44px rgba(0,0,0,0.45); border-color:rgba(108,99,255,0.45); }
.plan-card.featured { border-color:rgba(108,99,255,0.6); box-shadow:0 0 34px rgba(108,99,255,0.16); }
.plan-card.featured:hover { box-shadow:0 16px 48px rgba(108,99,255,0.28); }
/* "What your students get" value strip */
.value-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; }
.value-item { display:flex; gap:12px; align-items:flex-start; }
.value-item .vi-ico { font-size:1.5rem; line-height:1; }
.value-item .vi-title { font-weight:700; font-size:14px; color:#fff; margin-bottom:2px; }
.value-item .vi-sub { font-size:12.5px; color:#a9b3bd; line-height:1.45; }
</style>
<link rel="stylesheet" href="teacher-theme.css">
</head>
<body>
<div id="authLoading" class="auth-loading-overlay"><div class="auth-spinner"></div><div style="margin-top:16px;color:#71767b;">Loading…</div></div>
<div class="app-container hidden" id="appContainer">
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">← Home</a>
      <div><div class="header-title">For Teachers</div><div class="header-subtitle">One seat. Your whole class gets full access.</div></div>
    </div>
  </header>
  <main class="main-content"><div class="container" id="root"></div></main>
</div>
<script src="auth.js"></script>
<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
function api(path, opts){ return fetch(API_BASE+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts||{})); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let isTeacher = false;

const PLANS = [
  {
    id: 'teacher-junior',
    name: 'Junior',
    price: '$15',
    sub: 'Years 7-10 classes',
    features: [
      '✓ Junior (Y7-10) classes only',
      '✓ Up to 100 linked students',
      '✓ Class progress + mastery maps',
      '✓ Teacher AI tools',
      '<span style="color:#71767b;">✗ Senior (HSC) classes</span>'
    ]
  },
  {
    id: 'teacher-senior',
    name: 'Senior',
    price: '$25',
    sub: 'Year 11-12 HSC classes',
    features: [
      '✓ Senior (HSC) classes only',
      '✓ Up to 100 linked students',
      '✓ Class progress + mastery maps',
      '✓ Teacher AI tools',
      '<span style="color:#71767b;">✗ Junior (Y7-10) classes</span>'
    ]
  },
  {
    id: 'teacher-both',
    name: 'Combined',
    price: '$35',
    sub: 'Junior + Senior classes',
    featured: true,
    features: [
      '✓ <strong>Junior AND Senior</strong> classes',
      '✓ Up to 100 linked students total',
      '✓ Class progress + mastery maps',
      '✓ Teacher AI tools',
      '✓ Best for mixed-level teachers'
    ]
  }
];

function planCardHtml(p){
  const featured = p.featured ? ' featured' : '';
  const tag = p.featured ? '<div class="plan-tag">Most popular</div>' : '';
  const features = p.features.map(f => '<li>' + f + '</li>').join('');
  const cta = isTeacher
    ? '<a href="teacher-dashboard.html" class="btn" style="display:inline-block;text-decoration:none;">Open Dashboard →</a>'
    : `<button class="btn" data-plan="${p.id}" onclick="startCheckout('${p.id}', this)">Choose ${p.name} →</button>`;
  return `
    <div class="plan-card${featured}">
      ${tag}
      <div class="plan-name">${p.name}</div>
      <div class="plan-price">${p.price}<span class="per">/month</span></div>
      <div class="plan-sub">${p.sub}</div>
      <ul class="feature-list">${features}</ul>
      <div class="plan-cta">${cta}</div>
    </div>`;
}

function render(){
  const root = document.getElementById('root');
  root.innerHTML = `
    <div id="msgSlot"></div>

    <section class="sd-hero-band sd-fade">
      <h1>Give your whole class <span class="grad">Study Decoder</span> — for the price of one seat.</h1>
      <p>One teacher seat unlocks full Study Decoder access for every student you link, up to <strong>100 students</strong> across all your classes. Pick the tier that matches what you teach.</p>
    </section>

    <div class="plan-grid">${PLANS.map(planCardHtml).join('')}</div>

    <div class="card glow">
      <div class="section-title">What your students get — free, while they're in your class</div>
      <div class="value-strip">
        <div class="value-item"><span class="vi-ico">🤖</span><div><div class="vi-title">Exam-style practice</div><div class="vi-sub">AI question bots that mark to NSW marking criteria and show band feedback.</div></div></div>
        <div class="value-item"><span class="vi-ico">🌍</span><div><div class="vi-title">Learn IRL</div><div class="vi-sub">Real-world scenarios that turn dry syllabus dot points into things that stick.</div></div></div>
        <div class="value-item"><span class="vi-ico">🃏</span><div><div class="vi-title">Smart flashcards</div><div class="vi-sub">Spaced-repetition decks built from the exact syllabus you're teaching.</div></div></div>
        <div class="value-item"><span class="vi-ico">📊</span><div><div class="vi-title">Progress you can see</div><div class="vi-sub">You get live mastery maps per student so you know who needs help, and where.</div></div></div>
      </div>
    </div>

    <div class="card faq">
      <div class="section-title">Frequently asked questions</div>
      <details>
        <summary>Which tier do I pick?</summary>
        <p>Pick the one that matches the year levels you teach. The <strong>Junior</strong> tier lets you create classes for Years 7-10. The <strong>Senior</strong> tier covers HSC (Year 11-12). The <strong>Combined</strong> tier lets you run both — pick this if you teach a mix of levels.</p>
      </details>
      <details>
        <summary>How do students join?</summary>
        <p>Each class you create gets its own 6-character join code. Share it with your students — they sign up (or log in), enter the code on the Join a Class page, and they're linked instantly.</p>
      </details>
      <details>
        <summary>Do students pay anything?</summary>
        <p>No. Students get full Study Decoder access free for as long as they're linked to your active class.</p>
      </details>
      <details>
        <summary>Is there a student limit?</summary>
        <p>Yes — each seat supports up to <strong>100 linked students total</strong>, across as many classes as you want. If you need more capacity than that, contact us about the school plan.</p>
      </details>
      <details>
        <summary>What happens if I cancel?</summary>
        <p>Your teacher seat stops at the end of the billing period and your linked students revert to the free tier. Their progress and mastery data is kept — nothing is deleted.</p>
      </details>
      <details>
        <summary>Can I be a student too?</summary>
        <p>Yes. The teacher seat is billed separately from a personal Study Decoder subscription, so you can have both.</p>
      </details>
    </div>
  `;
}

function startCheckout(plan, btn){
  const msg = document.getElementById('msgSlot');
  msg.innerHTML = '';
  const orig = btn ? btn.textContent : null;
  if (btn){ btn.disabled = true; btn.textContent = 'Opening checkout…'; }
  const restore = () => { if (btn){ btn.disabled = false; btn.textContent = orig; } };
  api('/api/create-checkout-session', { method:'POST', body: JSON.stringify({ plan }) })
    .then(async r => {
      const d = await r.json().catch(()=>({}));
      if (!r.ok){
        const err = d.error || 'Could not start checkout';
        if (err === 'Not authenticated' || r.status === 401){
          window.location.href = 'login.html?role=teacher&redirect=' + encodeURIComponent(location.pathname);
          return;
        }
        if (/already/i.test(err)){
          msg.innerHTML = '<div class="success-note">You already have an active teacher seat. <a class="link-inline" href="teacher-dashboard.html">Go to your dashboard →</a></div>';
        } else {
          msg.innerHTML = '<div class="error-banner">' + esc(err) + '</div>';
        }
        restore();
        return;
      }
      if (d.url){
        window.open(d.url, '_blank');
        restore();
      } else {
        msg.innerHTML = '<div class="error-banner">Checkout session could not be created. Please try again.</div>';
        restore();
      }
    })
    .catch(() => {
      msg.innerHTML = '<div class="error-banner">Network error. Please try again.</div>';
      restore();
    });
}

(function init(){
  // Landing page — works logged out. Just detect whether they're already a teacher.
  api('/api/subscription')
    .then(async r => {
      if (r.ok){
        const d = await r.json().catch(()=>({}));
        isTeacher = d.role === 'teacher';
      }
    })
    .catch(()=>{})
    .finally(() => {
      render();
      document.getElementById('authLoading').classList.add('hidden');
      document.getElementById('appContainer').classList.remove('hidden');
    });
})();
</script>
</body>
</html>
