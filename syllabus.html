            stopFunFacts();

            let idx = Math.floor(Math.random() * facts.length);
            const box = document.getElementById('funFactBox');
            if (!box) return;
            box.style.display = 'block';
            const textEl = box.querySelector('.ff-text');
            textEl.className = 'ff-text ff-swap';
            textEl.textContent = facts[idx];
            funFactInterval = setInterval(() => {
                idx = (idx + 1) % facts.length;
                textEl.className = 'ff-text';
                setTimeout(() => {
                    textEl.textContent = facts[idx];
                    textEl.className = 'ff-text ff-swap';
                }, 50);
            }, 4500);
        }

            if (funFactInterval) { clearInterval(funFactInterval); funFactInterval = null; }

        // Populate subjects dropdown
        function loadSubjects(savedSubjects) {
            const byCategory = {};
            subjects.forEach(s => {
                if (!byCategory[s.category]) byCategory[s.category] = [];
                byCategory[s.category].push(s);
            });
            
            subjectSelect.innerHTML = '<option value="">Select your subject...</option>';
            
            // Add "Your Subjects" group at the top if user has saved subjects
            if (savedSubjects && savedSubjects.length > 0) {
                const yourGroup = document.createElement('optgroup');
                yourGroup.label = '⭐ Your Subjects';
                savedSubjects.forEach(id => {
                    const s = subjects.find(x => x.id === id);
                    if (s) {
                        const opt = document.createElement('option');
                        opt.value = s.id;
                        opt.textContent = s.name;
                        yourGroup.appendChild(opt);
                    }
                });
                if (yourGroup.children.length > 0) subjectSelect.appendChild(yourGroup);
            }
            
            Object.keys(byCategory).sort().forEach(cat => {
                const group = document.createElement('optgroup');
                group.label = cat;
                byCategory[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.id;
                    opt.textContent = s.name;
                    group.appendChild(opt);
                });
                subjectSelect.appendChild(group);
            });
        }

            if (welcome) welcome.remove();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'message-user' : 'message-assistant'}`;
            messageDiv.innerHTML = isUser ? content.replace(/\n/g, '<br>') : formatResponse(content);
            outputContent.appendChild(messageDiv);
            outputPanel.scrollTop = outputPanel.scrollHeight;
        }
        
        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span>Decoding syllabus...</span>';
            outputContent.appendChild(loadingDiv);
            // Fun fact box
            let box = document.getElementById('funFactBox');
            if (!box) {
                box = document.createElement('div');
                box.id = 'funFactBox';
                box.className = 'fun-fact-box';
                box.style.display = 'none';
                box.innerHTML = '<div class="ff-label">💡 Did you know?</div><div class="ff-text"></div>';
                outputContent.appendChild(box);
            }
            outputPanel.scrollTop = outputPanel.scrollHeight;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) loading.remove();
        }
        
        async function sendMessage(userMessage, subjectId) {
            if (isLoading) {
                console.warn('[DEBUG] Already loading, skipping duplicate request');
                return;
            }
            isLoading = true;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            
            try {
                conversationHistory.push({ role: 'user', content: userMessage });
                addMessage(userMessage, true);
                showLoading();
                startFunFacts(subjectId);
                
                const detail = parseInt(detailSlider.value) || 2;
                
                console.log('[DEBUG] Sending request to /api/chat/syllabus with:', { 
                    messageCount: conversationHistory.length,
                    subjectId,
                    detailLevel: detail,
                    lastMessage: userMessage.substring(0, 100)
                });
                
                const response = await fetch(`${API_BASE}/api/chat/syllabus`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ messages: conversationHistory, subject: subjectId, detailLevel: detail })
                });
                
                console.log('[DEBUG] Response status:', response.status, response.statusText);
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    if (errorData.freeTierExhausted) {
                        hideLoading();
                        stopFunFacts();
                        showFreeTierUpsell(errorData.botType, errorData.limitType);
                        return;
                    }
                    throw new Error(`API Error ${response.status}: ${errorData.error || 'Unknown error'}`);
                }
                
                const data = await response.json();
                console.log('[DEBUG] Received response:', data.reply.substring(0, 100));
                
                hideLoading();
                stopFunFacts();
                conversationHistory.push({ role: 'assistant', content: data.reply });
                addMessage(data.reply, false);
                
                // Show cross-bot recommendations
                const topicName = topicSelect.options[topicSelect.selectedIndex]?.text || '';
                showRecommendations(subjectId, topicName);
                
                // Clear history after response for independent topic decoding
                console.log('[DEBUG] Response received and displayed. Clearing history for next independent decode.');
                conversationHistory = [];
            } catch (error) {
                console.error('[DEBUG] sendMessage error:', error);
                hideLoading();
                stopFunFacts();
                addMessage(`Error: ${error.message || 'Unable to process your request. Please try again.'}`, false);
            } finally {
                isLoading = false;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Decode Syllabus';
            }
        }
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            console.log('[DEBUG] Submit handler triggered for syllabus');
            const subjectId = document.getElementById('subject').value;
            const subjectName = subjectSelect.options[subjectSelect.selectedIndex].text;
            const topic = topicSelect.options[topicSelect.selectedIndex].text;
            
            if (!subjectId) { alert('Please select a subject.'); return; }
            if (!topic || topic === 'Select subject first...' || topic === 'Select a topic/module...' || topic === 'Select year first...') { alert('Please select a topic.'); return; }
            
            console.log('[DEBUG] Subject:', subjectName, 'Topic:', topic, 'SubjectId:', subjectId);
            
            // Save to sessionStorage so other bots can auto-preload this subject/topic
            try {
                sessionStorage.setItem('sd_last_decoded_subject', subjectId);
                sessionStorage.setItem('sd_last_decoded_topic', topic);
            } catch (e) { /* silent */ }
            
            // Clear conversation history for fresh decode
            conversationHistory = [];
            
            const message = `DECODE NOW - Subject: ${subjectName} | Topic: ${topic}

Output the complete decoded content for this topic. Do not ask any questions. Do not request additional information. Just decode the topic using the syllabus content you have.`;
            console.log('[DEBUG] Calling sendMessage with message length:', message.length);
            sendMessage(message, subjectId);
        });

        // =====================
        // SAVE SUBJECT TO PREFERENCES
        // =====================
        let userSavedSubjects = [];
        async function saveSubjectPreference(subjectId) {
            if (!subjectId || userSavedSubjects.includes(subjectId)) return;
            userSavedSubjects.push(subjectId);
            // Keep max 10 most recent
            if (userSavedSubjects.length > 10) userSavedSubjects = userSavedSubjects.slice(-10);
            try {
                await fetch(`${API_BASE}/api/user/preferences`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ subjects: userSavedSubjects })
                });
            } catch (e) { /* silent */ }
        }

        // =====================
        // AUTHENTICATION CHECK
        // =====================
        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/subscription`, {
                    credentials: 'include'
                });
                
                if (!res.ok) {
                    // Not logged in - redirect to login
                    window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                    return;
                }
                
                const data = await res.json();
                
                // Check if has access (owner, lifetime, og_tester, subscribed, or free tier acknowledged)
                const hasAccess = data.role === 'owner' || data.role === 'lifetime' || data.role === 'og_tester' || data.subscribed || data.freeAcknowledged || data.preferences?.onboarded;
                if (!hasAccess) {
                    // Show paywall or redirect
                    window.location.href = '/index.html';
                    return;
                }
                
                // Load saved preferences
                userSavedSubjects = data.preferences?.subjects || [];
                loadSubjects(userSavedSubjects);
                
                // Restore detail level preference
                if (data.preferences?.detailLevel) {
                    detailSlider.value = data.preferences.detailLevel;
                    detailLabel.textContent = detailLabels[data.preferences.detailLevel];
                }
                
                // User has access - show content
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                
                // Auto-preset from URL params (from cross-bot recommendations)
                const urlParams = new URLSearchParams(window.location.search);
                const urlSubject = urlParams.get('subject');
                if (urlSubject) {
                    setTimeout(() => {
                        subjectSelect.value = urlSubject;
                        subjectSelect.dispatchEvent(new Event('change'));
                    }, 300);
                }
                
                if (!data.subscribed && data.role !== 'owner' && data.role !== 'lifetime' && data.role !== 'og_tester') {
                    const upgradeBtn = document.createElement('a');
                    upgradeBtn.href = 'https://buy.stripe.com/fZufZgbx32wMcqSe9R7Vm03';
                    upgradeBtn.target = '_blank';
                    upgradeBtn.innerHTML = '⚡ Upgrade';
                    upgradeBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:10px 20px;border-radius:50px;text-decoration:none;font-weight:600;font-size:0.9rem;z-index:9999;box-shadow:0 4px 15px rgba(102,126,234,0.4);transition:transform 0.2s,box-shadow 0.2s;';
                    upgradeBtn.onmouseenter = () => { upgradeBtn.style.transform = 'scale(1.05)'; upgradeBtn.style.boxShadow = '0 6px 20px rgba(102,126,234,0.6)'; };
                    upgradeBtn.onmouseleave = () => { upgradeBtn.style.transform = 'scale(1)'; upgradeBtn.style.boxShadow = '0 4px 15px rgba(102,126,234,0.4)'; };
                    document.body.appendChild(upgradeBtn);
                }
                
            } catch (e) {
                console.error('Auth check failed:', e);
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
            }
        }
        
        // Run auth check on page load
        checkAuth();
    </script>
</body>
