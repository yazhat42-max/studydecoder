<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flashcards | Study Decoder</title>
<meta name="description" content="Conversational flashcards that make you explain your thinking, with adaptive spaced repetition.">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; width:100%; font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1419; color:#e7e9ea; }
.app-container { display:flex; flex-direction:column; min-height:100vh; width:100%; overflow-x:hidden; }
.header { background:#16202a; border-bottom:1px solid #2f3336; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.header-left { display:flex; align-items:center; gap:16px; }
.back-btn { color:#4f8cff; text-decoration:none; font-size:14px; font-weight:500; padding:8px 16px; border-radius:8px; background:rgba(79,140,255,0.1); }
.header-title { font-size:20px; font-weight:700; }
.header-subtitle { font-size:12px; color:#71767b; margin-top:2px; }
.main-content { flex:1; padding:32px 24px; }
.container { max-width:980px; margin:0 auto; }
.card { background:#16202a; border:1px solid #2f3336; border-radius:16px; padding:24px; margin-bottom:20px; }
.btn { background:linear-gradient(135deg,#4f8cff,#6c63ff); color:#fff; border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; }
.btn:hover:not(:disabled) { transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-ghost { background:#1d3a5f; color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); }
.btn-danger { background:rgba(220,53,69,0.15); color:#ff8088; border:1px solid rgba(220,53,69,0.4); }
.form-input,.form-select,textarea { background:#0f1419; border:1px solid #2f3336; border-radius:8px; padding:12px 14px; color:#e7e9ea; font-size:14px; font-family:inherit; width:100%; }
.form-input:focus,.form-select:focus,textarea:focus { outline:none; border-color:#4f8cff; }
.form-label { font-size:13px; font-weight:500; color:#c8ccd0; display:block; margin-bottom:6px; }
.form-group { margin-bottom:16px; }
.auth-loading-overlay { position:fixed; inset:0; background:#0f1419; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.auth-spinner { width:50px; height:50px; border:4px solid #2f3336; border-top-color:#4f8cff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
.error-banner { background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.4); color:#ff8088; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
.loading { display:flex; align-items:center; gap:10px; color:#71767b; padding:20px 0; justify-content:center; }
.loading-dots { display:flex; gap:4px; }
.loading-dots span { width:8px; height:8px; background:#4f8cff; border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
.loading-dots span:nth-child(1){animation-delay:-0.32s;} .loading-dots span:nth-child(2){animation-delay:-0.16s;}
@keyframes bounce { 0%,80%,100%{transform:scale(0);} 40%{transform:scale(1);} }
@media (max-width:720px){ .main-content{padding:16px;} }
/* page-specific */
.explainer { color:#aab0b6; font-size:14px; line-height:1.6; }
.explainer strong { color:#e7e9ea; }
.row-between { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.section-title { font-size:16px; font-weight:700; }
.mastery-link { background:#1d3a5f; color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; text-decoration:none; display:inline-block; }
.deck-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.deck-card { background:#16202a; border:1px solid #2f3336; border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:10px; }
.deck-title { font-size:16px; font-weight:700; }
.deck-meta { font-size:12px; color:#71767b; }
.badges { display:flex; gap:6px; flex-wrap:wrap; }
.badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; }
.badge-count { background:rgba(79,140,255,0.15); color:#4f8cff; }
.badge-public { background:rgba(34,197,94,0.18); color:#4ade80; }
.badge-owned { background:rgba(255,255,255,0.06); color:#aab0b6; }
.deck-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:auto; }
.btn-sm { padding:8px 14px; font-size:13px; border-radius:8px; }
.deck-cards-list { border-top:1px solid #2f3336; margin-top:6px; padding-top:10px; font-size:13px; color:#c8ccd0; }
.deck-cards-list li { margin:6px 0; padding-left:14px; position:relative; line-height:1.5; }
.deck-cards-list li:before { content:"›"; position:absolute; left:0; color:#4f8cff; }
.empty-state { text-align:center; color:#71767b; padding:40px 20px; }
.chip-area { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.chip { background:rgba(79,140,255,0.15); color:#cfe0ff; border:1px solid rgba(79,140,255,0.3); border-radius:999px; padding:5px 12px; font-size:13px; display:flex; align-items:center; gap:8px; }
.chip button { background:none; border:none; color:#9fc0ff; cursor:pointer; font-size:14px; line-height:1; padding:0; }
.chip-input-row { display:flex; gap:8px; }
.checkbox-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.checkbox-row input { width:16px; height:16px; accent-color:#4f8cff; }
.checkbox-row label { font-size:14px; color:#c8ccd0; }
.muted { color:#71767b; font-size:12px; margin-top:4px; }
</style>
</head>
<body>
<div id="authLoading" class="auth-loading-overlay"><div class="auth-spinner"></div><div style="margin-top:16px;color:#71767b;">Loading…</div></div>
<div class="app-container hidden" id="appContainer">
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">← Home</a>
      <div><div class="header-title">Flashcards</div><div class="header-subtitle">Conversational cards that make you explain, not just flip.</div></div>
    </div>
  </header>
  <main class="main-content"><div class="container" id="root"></div></main>
</div>
<script src="auth.js"></script>
<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
function api(path, opts){ return fetch(API_BASE+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts||{})); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const root = document.getElementById('root');
let SYLLABUS = {};
let DECKS = [];
let formOpen = false;
let dotPoints = [];
const expanded = {}; // deckId -> {cards}

function render(){
  root.innerHTML = `
    <div class="card">
      <div class="explainer">
        <strong>These aren't flip cards.</strong> Each review is a short Socratic exchange — the AI asks a leading question,
        you explain your answer in your own words, and it grades and coaches you. An adaptive spaced-repetition engine
        decides when each card is due.
      </div>
    </div>
    <div class="row-between" style="margin-bottom:16px;">
      <button class="btn" id="newDeckBtn">${formOpen ? '× Close' : '+ New Deck'}</button>
      <a class="mastery-link" href="mastery-map.html">View your mastery map →</a>
    </div>
    <div id="formSlot"></div>
    <div id="errSlot"></div>
    <div class="section-title" style="margin-bottom:12px;">Your decks</div>
    <div id="deckSlot"></div>
  `;
  document.getElementById('newDeckBtn').onclick = () => { formOpen = !formOpen; if(!formOpen){ dotPoints=[]; } render(); };
  if (formOpen) renderForm();
  renderDecks();
}

function renderForm(){
  const slot = document.getElementById('formSlot');
  const subjects = Object.keys(SYLLABUS);
  slot.innerHTML = `
    <div class="card">
      <div class="section-title" style="margin-bottom:14px;">New deck</div>
      <div class="form-group">
        <label class="form-label" for="fTitle">Deck title *</label>
        <input class="form-input" id="fTitle" placeholder="e.g. Module 5: Equilibrium key ideas">
      </div>
      <div class="form-group">
        <label class="form-label" for="fSubject">Subject</label>
        <select class="form-select" id="fSubject">
          <option value="">— Select a subject —</option>
          ${subjects.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="fModule">Module</label>
        <select class="form-select" id="fModule"><option value="">— Select a subject first —</option></select>
        <input class="form-input" id="fModuleCustom" placeholder="…or type a custom module / topic" style="margin-top:8px;">
        <div class="muted">Pick from the list or type your own.</div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="fAiGen">
        <label for="fAiGen">AI-generate conversational cards from the syllabus</label>
      </div>
      <div id="aiOpts" class="hidden">
        <div class="form-group">
          <label class="form-label">Dot points to cover</label>
          <div class="chip-input-row">
            <input class="form-input" id="fDotInput" placeholder="Type a dot point and press Add">
            <button type="button" class="btn btn-ghost btn-sm" id="fDotAdd">Add</button>
          </div>
          <div class="chip-area" id="fDotChips"></div>
          <div class="muted">Add one or more syllabus dot points the AI should build cards around.</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="fCount">Number of cards</label>
          <select class="form-select" id="fCount">
            <option value="5">5 cards</option>
            <option value="8" selected>8 cards</option>
            <option value="10">10 cards</option>
            <option value="15">15 cards</option>
          </select>
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="fPublic">
        <label for="fPublic">Make this deck public</label>
      </div>
      <div id="formStatus"></div>
      <button class="btn" id="fSubmit">Create deck</button>
    </div>
  `;
  const subjSel = document.getElementById('fSubject');
  const modSel = document.getElementById('fModule');
  subjSel.onchange = () => {
    const mods = SYLLABUS[subjSel.value] || [];
    modSel.innerHTML = mods.length
      ? '<option value="">— Select a module —</option>' + mods.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('')
      : '<option value="">(no modules listed — use custom field)</option>';
  };
  const aiGen = document.getElementById('fAiGen');
  aiGen.onchange = () => document.getElementById('aiOpts').classList.toggle('hidden', !aiGen.checked);
  document.getElementById('fDotAdd').onclick = addDot;
  document.getElementById('fDotInput').addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); addDot(); } });
  renderChips();
  document.getElementById('fSubmit').onclick = submitDeck;
}

function addDot(){
  const inp = document.getElementById('fDotInput');
  const v = inp.value.trim();
  if (v){ dotPoints.push(v); inp.value=''; renderChips(); }
  inp.focus();
}
function renderChips(){
  const c = document.getElementById('fDotChips');
  if (!c) return;
  c.innerHTML = dotPoints.map((d,i)=>`<span class="chip">${esc(d)}<button type="button" data-i="${i}">×</button></span>`).join('');
  c.querySelectorAll('button').forEach(b => b.onclick = () => { dotPoints.splice(+b.dataset.i,1); renderChips(); });
}

function submitDeck(){
  const title = document.getElementById('fTitle').value.trim();
  const subject = document.getElementById('fSubject').value;
  const modCustom = document.getElementById('fModuleCustom').value.trim();
  const module = modCustom || document.getElementById('fModule').value;
  const isPublic = document.getElementById('fPublic').checked;
  const aiGen = document.getElementById('fAiGen').checked;
  const count = parseInt(document.getElementById('fCount') ? document.getElementById('fCount').value : '8', 10);
  const status = document.getElementById('formStatus');
  const btn = document.getElementById('fSubmit');
  status.innerHTML = '';
  if (!title){ status.innerHTML = '<div class="error-banner">Please enter a deck title.</div>'; return; }
  btn.disabled = true; btn.textContent = 'Creating…';

  api('/api/decks', { method:'POST', body: JSON.stringify({ title, subject, module, dotPoints, isPublic }) })
    .then(r => r.json().then(d => ({ ok:r.ok, status:r.status, d })))
    .then(({ ok, d }) => {
      if (!ok || !d.deck) throw new Error((d && d.error) || 'Could not create deck.');
      const deckId = d.deck.deckId;
      if (aiGen){
        status.innerHTML = `<div class="loading"><span>Generating conversational cards… 15-30 seconds</span><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
        return api('/api/decks/'+encodeURIComponent(deckId)+'/generate-cards', { method:'POST', body: JSON.stringify({ count, dotPoints }) })
          .then(r => r.json().then(gd => ({ status:r.status, gd })))
          .then(({ status:st, gd }) => {
            if (st === 403 && gd && gd.freeTierExhausted){
              status.innerHTML = freeTierBanner() + '<div class="muted">Your deck was created — you can add cards later or upgrade for AI generation.</div>';
              finishCreate(false);
              return;
            }
            if (!gd || !gd.deck) throw new Error((gd && gd.error) || 'Card generation failed.');
            finishCreate(true);
          });
      }
      finishCreate(true);
    })
    .catch(err => {
      status.innerHTML = '<div class="error-banner">'+esc(err.message||'Something went wrong.')+'</div>';
      btn.disabled = false; btn.textContent = 'Create deck';
    });
}

function finishCreate(closeForm){
  if (closeForm){ formOpen = false; dotPoints = []; }
  loadDecks().then(() => render());
}

function freeTierBanner(){
  return '<div class="error-banner">You\'ve used your 3 free flashcard reviews today. Upgrade to Premium for unlimited reviews. <a href="index.html" style="color:#ff8088;text-decoration:underline;">See plans</a></div>';
}

function renderDecks(){
  const slot = document.getElementById('deckSlot');
  if (!DECKS.length){
    slot.innerHTML = `<div class="card empty-state">No decks yet. Create your first deck above — turn a tricky module into a set of conversational cards.</div>`;
    return;
  }
  slot.innerHTML = `<div class="deck-grid">${DECKS.map(deckCard).join('')}</div>`;
  DECKS.forEach(dk => {
    const el = document.getElementById('deck-'+dk.deckId);
    if (!el) return;
    el.querySelector('[data-act="view"]').onclick = () => toggleCards(dk.deckId);
    const del = el.querySelector('[data-act="delete"]');
    if (del) del.onclick = () => deleteDeck(dk.deckId);
  });
}

function deckCard(dk){
  const meta = [dk.subject, dk.module].filter(Boolean).join(' · ') || 'No subject set';
  const ex = expanded[dk.deckId];
  let cardsHtml = '';
  if (ex){
    cardsHtml = ex.loading
      ? `<div class="deck-cards-list"><div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>`
      : ex.error
        ? `<div class="deck-cards-list"><span style="color:#ff8088;">${esc(ex.error)}</span></div>`
        : (ex.cards && ex.cards.length
            ? `<ul class="deck-cards-list">${ex.cards.map(c=>`<li>${esc(c.prompt)}</li>`).join('')}</ul>`
            : `<div class="deck-cards-list">No cards in this deck yet.</div>`);
  }
  return `
    <div class="deck-card" id="deck-${esc(dk.deckId)}">
      <div class="deck-title">${esc(dk.title)}</div>
      <div class="deck-meta">${esc(meta)}</div>
      <div class="badges">
        <span class="badge badge-count">${dk.cardCount||0} cards</span>
        ${dk.isPublic ? '<span class="badge badge-public">Public</span>' : ''}
        ${dk.owned ? '<span class="badge badge-owned">Owned</span>' : ''}
      </div>
      <div class="deck-actions">
        <a class="btn btn-sm" href="flashcard-review.html?deck=${encodeURIComponent(dk.deckId)}">Review</a>
        <button class="btn btn-ghost btn-sm" data-act="view">${ex ? 'Hide cards' : 'View cards'}</button>
        ${dk.owned ? '<button class="btn btn-danger btn-sm" data-act="delete">Delete</button>' : ''}
      </div>
      ${cardsHtml}
    </div>`;
}

function toggleCards(deckId){
  if (expanded[deckId]){ delete expanded[deckId]; renderDecks(); return; }
  expanded[deckId] = { loading:true };
  renderDecks();
  api('/api/decks/'+encodeURIComponent(deckId))
    .then(r => r.json().then(d => ({ ok:r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) throw new Error((d && d.error) || 'Could not load cards.');
      expanded[deckId] = { cards: d.cards || [] };
      renderDecks();
    })
    .catch(err => { expanded[deckId] = { error: err.message }; renderDecks(); });
}

function deleteDeck(deckId){
  if (!confirm('Delete this deck and all its cards? This cannot be undone.')) return;
  api('/api/decks/'+encodeURIComponent(deckId), { method:'DELETE' })
    .then(r => r.json().then(d => ({ ok:r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok || !d.success) throw new Error((d && d.error) || 'Delete failed.');
      delete expanded[deckId];
      return loadDecks().then(() => render());
    })
    .catch(err => {
      document.getElementById('errSlot').innerHTML = '<div class="error-banner">'+esc(err.message)+'</div>';
    });
}

function loadDecks(){
  return api('/api/decks')
    .then(r => r.json().then(d => ({ ok:r.ok, d })))
    .then(({ ok, d }) => { if (ok && d.decks) DECKS = d.decks; });
}

(function init(){
  Promise.all([
    api('/api/subscription'),
    fetch(API_BASE+'/syllabus_modules.json').then(r => r.ok ? r.json() : {}).catch(() => ({}))
  ])
  .then(([sub, syll]) => {
    if (!sub.ok || sub.status === 401){
      window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
      return null;
    }
    SYLLABUS = syll || {};
    return loadDecks();
  })
  .then(done => {
    if (done === null) return;
    render();
    document.getElementById('authLoading').classList.add('hidden');
    document.getElementById('appContainer').classList.remove('hidden');
  })
  .catch(() => {
    window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
  });
})();
</script>
</body>
</html>
