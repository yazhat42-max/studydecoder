<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign In – Study Decoder</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://www.studydecoder.com.au/login.html">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #6C63FF;
            --primary-dark: #5a52e0;
            --secondary: #1a1a2e;
            --accent: #FF6584;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-lg: 16px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6C63FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.1);
            padding: 40px 36px;
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .brand-logo {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        
        .brand h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .brand p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        /* Tab Navigation */
        .auth-tabs {
            display: flex;
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 24px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .auth-tab.active {
            background: var(--bg-card);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        
        .auth-tab:hover:not(.active) {
            color: var(--text-primary);
        }
        
        /* Forms */
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }
        
        .form-input::placeholder {
            color: var(--text-secondary);
        }
        
        .form-input.error {
            border-color: var(--error);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            font-size: 1.1rem;
        }
        
        .password-strength {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        
        .password-strength-bar.weak { width: 33%; background: var(--error); }
        .password-strength-bar.medium { width: 66%; background: var(--warning); }
        .password-strength-bar.strong { width: 100%; background: var(--success); }
        
        .form-helper {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        
        .form-error {
            font-size: 0.8rem;
            color: var(--error);
            margin-top: 6px;
            display: none;
        }
        
        .form-error.visible {
            display: block;
        }
        
        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        
        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        
        .checkbox-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .checkbox-label a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .checkbox-label a:hover {
            text-decoration: underline;
        }
        
        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 14px rgba(108, 99, 255, 0.35);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.45);
        }
        
        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-loading::after {
            content: '';
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 16px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .divider span {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Google Button */
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .google-btn-custom {
            width: 100%;
            padding: 14px 24px;
            font-size: 0.95rem;
            font-weight: 500;
            background: white;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }
        
        .google-btn-custom:hover {
            background: var(--bg-light);
            border-color: #d1d5db;
        }
        
        .google-btn-custom img {
            width: 20px;
            height: 20px;
        }
        
        /* OG Tester Section */
        .og-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: none;
        }
        
        .og-section.visible {
            display: block;
        }
        
        .og-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s ease;
        }
        
        .og-toggle:hover {
            color: var(--primary);
        }
        
        .og-form {
            margin-top: 16px;
            display: none;
        }
        
        .og-form.visible {
            display: block;
        }
        
        .og-input-wrapper {
            display: flex;
            gap: 12px;
        }
        
        .og-input-wrapper .form-input {
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            text-align: center;
        }
        
        .og-submit {
            padding: 14px 24px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .og-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(240, 147, 251, 0.4);
        }
        
        .og-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        /* Alert Messages */
        .alert {
            padding: 14px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 0.875rem;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .alert.visible {
            display: flex;
        }
        
        .alert-error {
            background: #fef2f2;
            color: var(--error);
            border: 1px solid #fecaca;
        }
        
        .alert-success {
            background: #ecfdf5;
            color: var(--success);
            border: 1px solid #a7f3d0;
        }
        
        .alert-icon {
            font-size: 1.2rem;
        }
        
        /* Forgot Password Link */
        .forgot-link {
            text-align: right;
            margin-top: -12px;
            margin-bottom: 20px;
        }
        
        .forgot-link a {
            font-size: 0.875rem;
            color: var(--primary);
            text-decoration: none;
        }
        
        .forgot-link a:hover {
            text-decoration: underline;
        }
        
        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        
        .login-footer p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .login-footer a {
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        /* Back to Home */
        .back-home {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-home a {
            color: white;
            opacity: 0.9;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s ease;
        }
        
        .back-home a:hover {
            opacity: 1;
        }
        
        /* Mobile Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            
            .brand h1 {
                font-size: 1.5rem;
            }
            
            .og-input-wrapper {
                flex-direction: column;
            }
        }
        
        /* Password Requirements */
        .password-requirements {
            margin-top: 10px;
            padding: 12px;
            background: var(--bg-light);
            border-radius: 8px;
            font-size: 0.8rem;
        }
        
        .password-requirements p {
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        
        .password-requirements ul {
            list-style: none;
            display: grid;
            gap: 4px;
        }
        
        .password-requirements li {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }
        
        .password-requirements li.valid {
            color: var(--success);
        }
        
        .req-icon {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <img src="logo.png" alt="Study Decoder" class="brand-logo">
                <h1>Study Decoder</h1>
                <p>Your AI-Powered HSC Success Partner</p>
            </div>
            
            <div class="alert alert-error" id="alertError">
                <span class="alert-icon">&#x26A0;&#xFE0F;</span>
                <span id="alertErrorText">An error occurred</span>
            </div>
            
            <div class="alert alert-success" id="alertSuccess">
                <span class="alert-icon">&#x2713;</span>
                <span id="alertSuccessText">Success!</span>
            </div>

            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
                <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
            </div>
            
            <!-- Sign In Form -->
            <div class="auth-form active" id="signinForm">
                <form onsubmit="handleEmailLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">&#x1F441;</button>
                        </div>
                    </div>
                    <div class="forgot-link">
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
                </form>
                
                <div class="divider"><span>or</span></div>
                
                <button type="button" class="google-btn-custom" id="googleSignInBtn">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Continue with Google
                </button>
            </div>
            
            <!-- Sign Up Form -->
            <div class="auth-form" id="signupForm">
                <form onsubmit="handleEmailRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" id="registerName" placeholder="Your name" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="registerEmail" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-input" id="registerPassword" placeholder="Create a password" required autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
                            <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">&#x1F441;</button>
                        </div>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="password-requirements" id="passwordReqs">
                            <p>Password must have:</p>
                            <ul>
                                <li id="reqLength"><span class="req-icon">&#x25CB;</span> At least 8 characters</li>
                                <li id="reqUpper"><span class="req-icon">&#x25CB;</span> One uppercase letter</li>
                                <li id="reqLower"><span class="req-icon">&#x25CB;</span> One lowercase letter</li>
                                <li id="reqNumber"><span class="req-icon">&#x25CB;</span> One number</li>
                            </ul>
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" class="checkbox-input" id="agreeTerms" required>
                        <label class="checkbox-label" for="agreeTerms">I agree to the <a href="terms.html" target="_blank">Terms</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></label>
                    </div>
                    <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
                </form>
                
                <div class="divider"><span>or</span></div>
                
                <button type="button" class="google-btn-custom" id="googleSignUpBtn">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Sign up with Google
                </button>
            </div>
            
            <div class="login-footer" id="loginFooter">
                <p id="footerText">Works on every browser &#x2014; no extensions needed</p>
            </div>
        </div>
        
        <div class="back-home">
            <a href="index.html">&#x2190; Back to Home</a>
        </div>
    </div>
    
    <!-- Hidden Google Sign-In -->
    <div id="g_id_onload"
         data-client_id="875851537672-mn188te4kip14c0f6th40o9ui9ccuevs.apps.googleusercontent.com"
         data-callback="handleGoogleResponse"
         data-auto_prompt="false"
         style="display: none;">
    </div>
    
    <script>
        // ==================== Configuration ====================
        const API_BASE = '';
        const GOOGLE_CLIENT_ID = '875851537672-mn188te4kip14c0f6th40o9ui9ccuevs.apps.googleusercontent.com';
        
        // ==================== State ====================
        let isLoading = false;
        let googleInitialized = false;
        let googleTokenClient = null;
        let oneTapAvailable = false;
        let googleInitRetries = 0;
        const MAX_GOOGLE_RETRIES = 6;
        
        // ==================== DOM Elements ====================
        const alertError = document.getElementById('alertError');
        const alertSuccess = document.getElementById('alertSuccess');
        
        // ==================== Tab Switching ====================
        function switchTab(tab) {
            hideAlerts();
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'signin') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('signinForm').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
        }
        
        // ==================== Password Utilities ====================
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '\u25CF';
            } else {
                input.type = 'password';
                btn.innerHTML = '&#x1F441;';
            }
        }
        
        function checkPasswordStrength(pw) {
            const bar = document.getElementById('strengthBar');
            const hasLen = pw.length >= 8;
            const hasUpper = /[A-Z]/.test(pw);
            const hasLower = /[a-z]/.test(pw);
            const hasNum = /[0-9]/.test(pw);
            
            const updateReq = (id, valid) => {
                const el = document.getElementById(id);
                if (valid) {
                    el.classList.add('valid');
                    el.querySelector('.req-icon').textContent = '\u2713';
                } else {
                    el.classList.remove('valid');
                    el.querySelector('.req-icon').textContent = '\u25CB';
                }
            };
            updateReq('reqLength', hasLen);
            updateReq('reqUpper', hasUpper);
            updateReq('reqLower', hasLower);
            updateReq('reqNumber', hasNum);
            
            const score = [hasLen, hasUpper, hasLower, hasNum].filter(Boolean).length;
            bar.className = 'password-strength-bar';
            if (score <= 1) bar.classList.add('weak');
            else if (score <= 3) bar.classList.add('medium');
            else bar.classList.add('strong');
        }
        
        // ==================== Email/Password Auth ====================
        async function handleEmailLogin(e) {
            e.preventDefault();
            if (isLoading) return;
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return showError('Please fill in all fields');
            
            setLoading(true);
            hideAlerts();
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                showSuccess('Signed in! Redirecting...');
                setTimeout(() => redirectAfterLogin(data), 800);
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        }
        
        async function handleEmailRegister(e) {
            e.preventDefault();
            if (isLoading) return;
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            if (!name || !email || !password) return showError('Please fill in all fields');
            if (!document.getElementById('agreeTerms').checked) return showError('Please agree to the Terms and Privacy Policy');
            
            setLoading(true);
            hideAlerts();
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Registration failed');
                showSuccess('Account created! Redirecting...');
                setTimeout(() => redirectAfterLogin(data), 800);
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        }
        
        // ==================== Initialization ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if already logged in
            try {
                const res = await fetch('/api/subscription', { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    redirectAfterLogin(data);
                    return;
                }
            } catch (e) {}
            
            // Initialize Google Sign-In (optional — works if not blocked)
            initializeGoogleSignIn();
        });
        
        function initializeGoogleSignIn() {
            if (typeof google !== 'undefined' && google.accounts) {
                try {
                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleGoogleResponse,
                        auto_select: false,
                        cancel_on_tap_outside: true
                    });
                    oneTapAvailable = true;
                } catch (e) {
                    console.log('One Tap not available:', e);
                }
                
                if (google.accounts.oauth2) {
                    googleTokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: GOOGLE_CLIENT_ID,
                        scope: 'email profile openid',
                        callback: handleOAuthTokenResponse,
                    });
                }
                
                googleInitialized = true;
            } else {
                googleInitRetries++;
                if (googleInitRetries < MAX_GOOGLE_RETRIES) {
                    setTimeout(initializeGoogleSignIn, 500);
                } else {
                    // Google blocked — hide Google buttons, email/password still works fine
                    document.querySelectorAll('.google-btn-custom').forEach(btn => {
                        btn.style.display = 'none';
                    });
                    document.querySelectorAll('.divider').forEach(d => {
                        d.style.display = 'none';
                    });
                }
            }
        }
        
        // ==================== Google Sign-In ====================
        function triggerGoogleSignIn() {
            if (!googleInitialized) {
                showError('Google Sign-In is blocked by your browser. Use email and password instead.');
                return;
            }
            if (oneTapAvailable) {
                try {
                    google.accounts.id.prompt((notification) => {
                        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                            if (googleTokenClient) googleTokenClient.requestAccessToken();
                            else showError('Google Sign-In unavailable. Use email and password instead.');
                        }
                    });
                } catch (e) {
                    if (googleTokenClient) googleTokenClient.requestAccessToken();
                }
            } else if (googleTokenClient) {
                googleTokenClient.requestAccessToken();
            } else {
                showError('Google Sign-In unavailable. Use email and password instead.');
            }
        }
        
        document.getElementById('googleSignInBtn').addEventListener('click', triggerGoogleSignIn);
        document.getElementById('googleSignUpBtn').addEventListener('click', triggerGoogleSignIn);
        
        async function handleOAuthTokenResponse(tokenResponse) {
            if (isLoading || !tokenResponse.access_token) return;
            setLoading(true);
            hideAlerts();
            try {
                const res = await fetch('/api/auth/google-oauth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ accessToken: tokenResponse.access_token })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Authentication failed');
                showSuccess('Signed in! Redirecting...');
                setTimeout(() => redirectAfterLogin(data), 800);
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        }
        
        async function handleGoogleResponse(response) {
            if (isLoading) return;
            setLoading(true);
            hideAlerts();
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ idToken: response.credential })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Authentication failed');
                showSuccess('Signed in! Redirecting...');
                setTimeout(() => redirectAfterLogin(data), 800);
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        }
        
        window.handleGoogleResponse = handleGoogleResponse;
        
        // ==================== Helpers ====================
        function showError(message) {
            alertError.classList.add('visible');
            alertSuccess.classList.remove('visible');
            document.getElementById('alertErrorText').textContent = message;
        }
        
        function showSuccess(message) {
            alertSuccess.classList.add('visible');
            alertError.classList.remove('visible');
            document.getElementById('alertSuccessText').textContent = message;
        }
        
        function hideAlerts() {
            alertError.classList.remove('visible');
            alertSuccess.classList.remove('visible');
        }
        
        function setLoading(loading) {
            isLoading = loading;
            const buttons = document.querySelectorAll('.btn-primary, .google-btn-custom');
            buttons.forEach(btn => {
                btn.disabled = loading;
                if (loading) btn.classList.add('btn-loading');
                else btn.classList.remove('btn-loading');
            });
        }
        
        async function redirectAfterLogin(data) {
            try {
                const raw = localStorage.getItem('sd_user_cache');
                if (raw) {
                    const cached = JSON.parse(raw);
                    const prefs = cached.preferences;
                    if (prefs && (prefs.level || (prefs.subjects && prefs.subjects.length > 0) || prefs.onboarded)) {
                        await fetch('/api/user/preferences', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify(prefs)
                        });
                    }
                    if (cached.freeAcknowledged) {
                        await fetch('/api/acknowledge-free', { method: 'POST', credentials: 'include' });
                    }
                }
            } catch (e) {}
            // Redirect: admin for owner, saved redirect URL, or homepage
            const params = new URLSearchParams(window.location.search);
            const redirectTo = params.get('redirect');
            if (data.role === 'owner') {
                window.location.href = '/admin.html';
            } else if (redirectTo && redirectTo.startsWith('/')) {
                window.location.href = redirectTo;
            } else {
                window.location.href = '/index.html';
            }
        }
    </script>
</body>
</html>
