<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lesson Plan Generator | Study Decoder</title>
<meta name="description" content="Generate a ready-to-teach 60-minute HSC lesson plan from your syllabus dot points.">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; width:100%; font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1419; color:#e7e9ea; }
.app-container { display:flex; flex-direction:column; min-height:100vh; width:100%; overflow-x:hidden; }
.header { background:#16202a; border-bottom:1px solid #2f3336; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.header-left { display:flex; align-items:center; gap:16px; }
.back-btn { color:#4f8cff; text-decoration:none; font-size:14px; font-weight:500; padding:8px 16px; border-radius:8px; background:rgba(79,140,255,0.1); }
.header-title { font-size:20px; font-weight:700; }
.header-subtitle { font-size:12px; color:#71767b; margin-top:2px; }
.main-content { flex:1; padding:32px 24px; }
.container { max-width:980px; margin:0 auto; }
.card { background:#16202a; border:1px solid #2f3336; border-radius:16px; padding:24px; margin-bottom:20px; }
.btn { background:linear-gradient(135deg,#4f8cff,#6c63ff); color:#fff; border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; }
.btn:hover:not(:disabled) { transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-ghost { background:#1d3a5f; color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); }
.form-input,.form-select,textarea { background:#0f1419; border:1px solid #2f3336; border-radius:8px; padding:12px 14px; color:#e7e9ea; font-size:14px; font-family:inherit; width:100%; }
.form-input:focus,.form-select:focus,textarea:focus { outline:none; border-color:#4f8cff; }
.form-label { font-size:13px; font-weight:500; color:#c8ccd0; display:block; margin-bottom:6px; }
.form-group { margin-bottom:16px; }
.auth-loading-overlay { position:fixed; inset:0; background:#0f1419; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.auth-spinner { width:50px; height:50px; border:4px solid #2f3336; border-top-color:#4f8cff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
.error-banner { background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.4); color:#ff8088; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
.loading { display:flex; align-items:center; gap:10px; color:#71767b; padding:20px 0; justify-content:center; }
.loading-dots { display:flex; gap:4px; }
.loading-dots span { width:8px; height:8px; background:#4f8cff; border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
.loading-dots span:nth-child(1){animation-delay:-0.32s;} .loading-dots span:nth-child(2){animation-delay:-0.16s;}
@keyframes bounce { 0%,80%,100%{transform:scale(0);} 40%{transform:scale(1);} }
@media (max-width:720px){ .main-content{padding:16px;} }
/* page-specific */
.chip-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.chip { background:#1d3a5f; border:1px solid rgba(79,140,255,0.3); border-radius:999px; padding:6px 12px; font-size:13px; display:flex; align-items:center; gap:8px; }
.chip button { background:none; border:none; color:#9fb6d4; cursor:pointer; font-size:15px; line-height:1; padding:0; }
.chip button:hover { color:#fff; }
.row-inline { display:flex; gap:8px; }
.row-inline .form-input { flex:1; }
.plan-title { font-size:24px; font-weight:700; margin-bottom:4px; }
.plan-duration { font-size:13px; color:#71767b; margin-bottom:18px; }
.plan-section { margin-bottom:22px; }
.plan-section h3 { font-size:15px; font-weight:700; color:#4f8cff; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
.plan-section ul { padding-left:20px; }
.plan-section li { margin-bottom:6px; line-height:1.5; }
.outline-table { width:100%; border-collapse:collapse; }
.outline-table th,.outline-table td { text-align:left; padding:10px 12px; border-bottom:1px solid #2f3336; font-size:14px; vertical-align:top; }
.outline-table th { color:#c8ccd0; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
.outline-table td.phase { font-weight:600; white-space:nowrap; }
.outline-table td.mins { color:#71767b; white-space:nowrap; }
.toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
@media print {
  .header,.toolbar,#authLoading { display:none !important; }
  body,html,.app-container { background:#fff; color:#000; }
  .card { background:#fff; border:none; }
  .plan-section h3 { color:#000; }
  .outline-table td.mins,.plan-duration { color:#333; }
}
</style>
<link rel="stylesheet" href="teacher-theme.css">
</head>
<body>
<div id="authLoading" class="auth-loading-overlay"><div class="auth-spinner"></div><div style="margin-top:16px;color:#71767b;">Loading…</div></div>
<div class="app-container hidden" id="appContainer">
  <header class="header">
    <div class="header-left">
      <a href="teacher-dashboard.html" class="back-btn">← Dashboard</a>
      <div><div class="header-title">Lesson Plan Generator</div><div class="header-subtitle">A ready-to-teach 60-minute lesson from your syllabus dot points.</div></div>
    </div>
  </header>
  <main class="main-content"><div class="container" id="root"></div></main>
</div>
<script src="auth.js"></script>
<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
function api(path, opts){ return fetch(API_BASE+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts||{})); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let SYLLABUS = {};
let dotPoints = [];

async function init(){
  try {
    const res = await api('/api/subscription');
    if(!res.ok){
      if(res.status===401){ location.href='login.html?redirect='+encodeURIComponent(location.pathname); return; }
      throw new Error('Could not verify your account.');
    }
    const data = await res.json();
    if(data.role !== 'teacher'){ location.href='teacher-pricing.html'; return; }
  } catch(e){
    location.href='login.html?redirect='+encodeURIComponent(location.pathname); return;
  }
  try {
    const sres = await api('/syllabus_modules.json');
    if(sres.ok) SYLLABUS = await sres.json();
  } catch(e){ SYLLABUS = {}; }
  document.getElementById('authLoading').classList.add('hidden');
  document.getElementById('appContainer').classList.remove('hidden');
  renderForm();
}

function renderForm(){
  const subjects = Object.keys(SYLLABUS).sort();
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="card sd-fade">
      <p style="color:#a9b3bd;font-size:14px;margin-bottom:18px;line-height:1.5;">Pick a subject and module, add any dot points you want covered, and I'll draft a ready-to-teach 60-minute lesson — goals, timed outline, activities and resources.</p>
      <div id="formError"></div>
      <div class="form-group">
        <label class="form-label" for="subject">Subject</label>
        <select class="form-select" id="subject">
          <option value="">Select a subject…</option>
          ${subjects.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="module">Module</label>
        <select class="form-select" id="module" style="margin-bottom:8px;">
          <option value="">Select a module…</option>
        </select>
        <input class="form-input" id="moduleCustom" placeholder="…or type a module / unit name">
      </div>
      <div class="form-group">
        <label class="form-label">Dot points to cover <span style="color:#71767b;">(optional)</span></label>
        <div class="row-inline">
          <input class="form-input" id="dpInput" placeholder="e.g. Explain the role of enzymes in metabolism">
          <button type="button" class="btn btn-ghost" id="dpAdd">Add</button>
        </div>
        <div class="chip-list" id="dpList"></div>
      </div>
      <button class="btn" id="generateBtn">Generate Lesson Plan</button>
    </div>
    <div id="output"></div>
  `;
  const subjectSel = document.getElementById('subject');
  subjectSel.addEventListener('change', ()=>{
    const mods = SYLLABUS[subjectSel.value] || [];
    const moduleSel = document.getElementById('module');
    moduleSel.innerHTML = `<option value="">${mods.length?'Select a module…':'No preset modules — type one below'}</option>` +
      mods.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('');
  });
  document.getElementById('dpInput').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); addDot(); } });
  document.getElementById('dpAdd').addEventListener('click', addDot);
  document.getElementById('generateBtn').addEventListener('click', generate);
  renderDots();
}

function addDot(){
  const inp = document.getElementById('dpInput');
  const v = inp.value.trim();
  if(!v) return;
  dotPoints.push(v);
  inp.value = '';
  renderDots();
}
function renderDots(){
  const list = document.getElementById('dpList');
  list.innerHTML = dotPoints.map((d,i)=>`<span class="chip">${esc(d)}<button type="button" data-i="${i}">×</button></span>`).join('');
  list.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{ dotPoints.splice(+b.dataset.i,1); renderDots(); }));
}

function showError(msg){
  document.getElementById('formError').innerHTML = msg ? `<div class="error-banner">${esc(msg)}</div>` : '';
}

async function generate(){
  showError('');
  const subject = document.getElementById('subject').value.trim();
  const moduleSel = document.getElementById('module').value.trim();
  const moduleCustom = document.getElementById('moduleCustom').value.trim();
  const module = moduleCustom || moduleSel;
  if(!subject){ showError('Please choose a subject.'); return; }
  if(!module){ showError('Please choose or type a module.'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  const output = document.getElementById('output');
  output.innerHTML = `<div class="card sd-fade"><div class="sd-loading"><div class="ring"></div><div>Building your lesson plan… this usually takes 10-20 seconds.</div></div></div>`;

  try {
    const res = await api('/api/teacher/ai/lesson-plan',{method:'POST',body:JSON.stringify({subject, module, dotPoints})});
    if(!res.ok){
      let msg = 'Something went wrong generating the lesson plan.';
      try { const j = await res.json(); if(j && j.error) msg = j.error; } catch(e){}
      throw new Error(msg);
    }
    const data = await res.json();
    renderPlan(data.plan || {});
  } catch(e){
    output.innerHTML = '';
    showError(e.message || 'Network error. Please try again.');
  } finally {
    btn.disabled = false;
  }
}

function renderPlan(plan){
  const list = (arr)=> (arr&&arr.length) ? `<ul>${arr.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>` : `<p style="color:#71767b;">None provided.</p>`;
  const outline = (plan.outline&&plan.outline.length)
    ? `<table class="outline-table"><thead><tr><th>Phase</th><th>Minutes</th><th>Detail</th></tr></thead><tbody>${
        plan.outline.map(o=>`<tr><td class="phase">${esc(o.phase)}</td><td class="mins">${esc(o.minutes)}</td><td>${esc(o.detail)}</td></tr>`).join('')
      }</tbody></table>`
    : `<p style="color:#71767b;">None provided.</p>`;
  document.getElementById('output').innerHTML = `
    <div class="toolbar">
      <button class="btn" onclick="window.print()">Print</button>
      <button class="btn btn-ghost" id="resetBtn">New plan</button>
    </div>
    <div class="card">
      <div class="plan-title">${esc(plan.title||'Lesson Plan')}</div>
      <div class="plan-duration">${esc(plan.duration||'60 minutes')}</div>
      <div class="plan-section"><h3>Learning Goals</h3>${list(plan.learningGoals)}</div>
      <div class="plan-section"><h3>Lesson Outline</h3>${outline}</div>
      <div class="plan-section"><h3>Activities</h3>${list(plan.activities)}</div>
      <div class="plan-section"><h3>Check for Understanding</h3>${list(plan.checkForUnderstanding)}</div>
      <div class="plan-section"><h3>Resources</h3>${list(plan.resources)}</div>
    </div>
  `;
  document.getElementById('resetBtn').addEventListener('click', ()=>{ dotPoints=[]; renderForm(); window.scrollTo(0,0); });
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
</body>
</html>
