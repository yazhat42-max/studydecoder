<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Your Assignments | Study Decoder</title>
<meta name="description" content="See and complete the assignments your teacher has set for your class.">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; width:100%; font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1419; color:#e7e9ea; }
.app-container { display:flex; flex-direction:column; min-height:100vh; width:100%; overflow-x:hidden; }
.header { background:#16202a; border-bottom:1px solid #2f3336; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.header-left { display:flex; align-items:center; gap:16px; }
.back-btn { color:#4f8cff; text-decoration:none; font-size:14px; font-weight:500; padding:8px 16px; border-radius:8px; background:rgba(79,140,255,0.1); }
.header-title { font-size:20px; font-weight:700; }
.header-subtitle { font-size:12px; color:#71767b; margin-top:2px; }
.main-content { flex:1; padding:32px 24px; }
.container { max-width:820px; margin:0 auto; }
.card { background:#16202a; border:1px solid #2f3336; border-radius:16px; padding:24px; margin-bottom:20px; }
.card.muted { color:#71767b; }
.btn { background:linear-gradient(135deg,#4f8cff,#6c63ff); color:#fff; border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; font-family:inherit; }
.btn:hover:not(:disabled) { transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-sm { padding:8px 14px; font-size:13px; border-radius:8px; }
.btn-ghost { background:#1d3a5f; color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); }
.auth-loading-overlay { position:fixed; inset:0; background:#0f1419; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.auth-spinner { width:50px; height:50px; border:4px solid #2f3336; border-top-color:#4f8cff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
.error-banner { background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.4); color:#ff8088; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
.success-note { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.4); color:#7ee2a8; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
.section-title { font-size:18px; font-weight:700; margin-bottom:14px; }

.page-hero { text-align:center; padding:8px 8px 24px; }
.page-hero h1 { font-size:30px; line-height:1.2; font-weight:800; margin-bottom:10px; }
.page-hero .grad { background:linear-gradient(135deg,#4f8cff,#6c63ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.page-hero p { font-size:15px; color:#a9b3bd; max-width:560px; margin:0 auto; }

.empty-card { text-align:center; padding:48px 24px; }
.empty-card .icon { font-size:42px; margin-bottom:10px; }
.empty-card h3 { font-size:18px; font-weight:700; margin-bottom:8px; color:#e7e9ea; }
.empty-card p { color:#a9b3bd; font-size:14px; line-height:1.55; max-width:380px; margin:0 auto 16px; }
.empty-card a { color:#4f8cff; text-decoration:none; font-weight:600; }
.empty-card a:hover { text-decoration:underline; }

.assign-card { background:#0f1419; border:1px solid #2f3336; border-radius:12px; padding:18px 20px; margin-bottom:14px; }
.assign-card.done { background:rgba(34,197,94,0.04); border-color:rgba(34,197,94,0.35); }
.assign-card.overdue { border-color:rgba(220,53,69,0.4); }
.assign-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:6px; }
.assign-title { font-size:16px; font-weight:700; color:#e7e9ea; flex:1; min-width:200px; }
.assign-class { font-size:12px; color:#8899a6; margin-top:2px; }
.assign-instr { font-size:14px; color:#d4d9de; margin-top:10px; line-height:1.55; padding:10px 12px; background:rgba(79,140,255,0.06); border:1px solid rgba(79,140,255,0.18); border-radius:8px; white-space:pre-wrap; word-break:break-word; }
.assign-meta { display:flex; gap:10px; align-items:center; font-size:12px; color:#8899a6; margin-top:10px; flex-wrap:wrap; }
.assign-actions { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.badge { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:3px 9px; border-radius:6px; background:#1d3a5f; color:#9ec3ff; }
.badge.practice { background:rgba(139,92,246,0.18); color:#c4b5fd; }
.badge.worksheet { background:rgba(245,158,11,0.18); color:#fcd34d; }
.badge.deck { background:rgba(34,197,94,0.16); color:#86efac; }
.badge.exam { background:rgba(239,68,68,0.18); color:#fca5a5; }
.badge.scenario { background:rgba(56,189,248,0.18); color:#7dd3fc; }
.status-pill { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px; }
.status-pending { background:rgba(245,158,11,0.12); color:#fcd34d; border:1px solid rgba(245,158,11,0.3); }
.status-completed { background:rgba(34,197,94,0.16); color:#86efac; border:1px solid rgba(34,197,94,0.4); }
.status-overdue { background:rgba(220,53,69,0.15); color:#ff8088; border:1px solid rgba(220,53,69,0.4); }
.due-soon { color:#fcd34d; }
.due-overdue { color:#ff8088; }

.tool-shortcut { background:rgba(108,99,255,0.08); border:1px solid rgba(108,99,255,0.28); color:#a78bfa; text-decoration:none; padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600; transition:all .15s; }
.tool-shortcut:hover { background:rgba(108,99,255,0.18); border-color:rgba(108,99,255,0.5); color:#c4b5fd; }

@media (max-width:560px) {
    .main-content { padding:20px 14px; }
    .page-hero h1 { font-size:24px; }
    .assign-card { padding:14px 16px; }
    .header { padding:10px 16px; }
    .header-title { font-size:17px; }
}
</style>
</head>
<body>
<div id="authLoading" class="auth-loading-overlay"><div class="auth-spinner"></div><div style="margin-top:16px;color:#71767b;">Loading…</div></div>
<div class="app-container hidden" id="appContainer">
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">← Back to Home</a>
      <div><div class="header-title">Your Assignments</div><div class="header-subtitle">Tasks set by your teacher</div></div>
    </div>
  </header>
  <main class="main-content">
    <div class="container">
      <div class="page-hero">
        <h1>Your <span class="grad">Assignments</span></h1>
        <p>Tasks your teacher has set for your class. Open the relevant tool, do the work, then mark as done.</p>
      </div>
      <div id="errSlot"></div>
      <div id="postsSlot"></div>
      <div id="listSlot"><div class="card muted">Loading assignments…</div></div>
    </div>
  </main>
</div>
<script src="auth.js"></script>
<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
function api(path, opts){ return fetch(API_BASE+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts||{})); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escMultiline(s){ return esc(s).replace(/\n/g, '<br>'); }

function fmtDate(s){
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

function daysUntil(s){
    if (!s) return null;
    const d = new Date(s);
    if (isNaN(d)) return null;
    const ms = d.setHours(23,59,59,999) - Date.now();
    return Math.ceil(ms / 86400000);
}

// Each assignment now has AI-generated content stored on the server, so the
// student opens it on a dedicated view page rather than being deep-linked
// out to a generic tool.

function renderList(assignments){
    const slot = document.getElementById('listSlot');
    if (!assignments || !assignments.length){
        slot.innerHTML = `
            <div class="card empty-card">
                <div class="icon">📭</div>
                <h3>No assignments yet</h3>
                <p>When your teacher sets a task, it'll show up here. Make sure you've joined your class first.</p>
                <a href="join-class.html">🎓 Join a class →</a>
            </div>`;
        return;
    }

    // Split into pending + completed so the most relevant work sits up top.
    const pending = assignments.filter(a => a.status !== 'completed');
    const done    = assignments.filter(a => a.status === 'completed');

    function card(a){
        const dueDays = daysUntil(a.dueAt);
        const isOverdue = a.status !== 'completed' && dueDays !== null && dueDays < 0;
        const isDueSoon = a.status !== 'completed' && dueDays !== null && dueDays >= 0 && dueDays <= 2;
        const cls = a.status === 'completed' ? 'done' : (isOverdue ? 'overdue' : '');
        const dueLabel = !a.dueAt
            ? 'No due date'
            : (isOverdue
                ? `<span class="due-overdue">Overdue · was ${esc(fmtDate(a.dueAt))}</span>`
                : (isDueSoon
                    ? `<span class="due-soon">Due ${esc(fmtDate(a.dueAt))} (${dueDays === 0 ? 'today' : dueDays + ' day' + (dueDays === 1 ? '' : 's') + ' left'})</span>`
                    : `Due ${esc(fmtDate(a.dueAt))}`));
        const statusClass = a.status === 'completed' ? 'status-completed' : (isOverdue ? 'status-overdue' : 'status-pending');
        const statusText  = a.status === 'completed' ? '✓ Completed' : (isOverdue ? 'Overdue' : 'Pending');
        const typeClass = (a.type || '').toLowerCase();
        const instr = a.instructions
            ? `<div class="assign-instr">${escMultiline(a.instructions)}</div>`
            : (a.refId
                ? `<div class="assign-instr">${escMultiline(a.refId)}</div>`
                : '');
        const spec = a.spec || {};
        const specBits = [
            spec.module || '',
            spec.difficulty ? spec.difficulty.charAt(0).toUpperCase() + spec.difficulty.slice(1) : '',
            spec.count ? spec.count + (a.type === 'deck' ? ' cards' : ' questions') : ''
        ].filter(Boolean).map(esc).join(' · ');
        const action = `<a class="btn btn-sm" href="student-assignment-view.html?id=${encodeURIComponent(a.assignmentId)}">${a.status === 'completed' ? 'Review →' : 'Open →'}</a>`;
        return `
            <div class="assign-card ${cls}" data-id="${esc(a.assignmentId)}">
                <div class="assign-head">
                    <div style="flex:1; min-width:200px;">
                        <span class="badge ${typeClass}">${esc(a.type || '')}</span>
                        <span class="assign-title" style="display:inline; margin-left:6px;">${esc(a.title)}</span>
                        <div class="assign-class">${esc(a.className || 'Your class')}${specBits ? ' · ' + specBits : ''}</div>
                    </div>
                    <span class="status-pill ${statusClass}">${statusText}</span>
                </div>
                ${instr}
                <div class="assign-meta">📅 ${dueLabel}</div>
                <div class="assign-actions">
                    ${action}
                </div>
            </div>`;
    }

    let html = '';
    if (pending.length){
        html += `<div class="card"><div class="section-title">To do (${pending.length})</div>${pending.map(card).join('')}</div>`;
    }
    if (done.length){
        html += `<div class="card"><div class="section-title">Completed (${done.length})</div>${done.map(card).join('')}</div>`;
    }
    slot.innerHTML = html;
    slot.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', () => handleAction(btn));
    });
}

function handleAction(btn){
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = action === 'complete' ? 'Saving…' : 'Updating…';
    const body = action === 'complete' ? { status: 'completed' } : { status: 'pending' };
    api('/api/student/assignments/' + encodeURIComponent(id) + '/submit', {
        method: 'POST',
        body: JSON.stringify(body)
    })
        .then(async r => {
            if (!r.ok){
                const d = await r.json().catch(()=>({}));
                showError(d.error || 'Could not update assignment.');
                btn.disabled = false; btn.textContent = orig;
                return;
            }
            loadAssignments();
        })
        .catch(() => {
            showError('Network error. Please try again.');
            btn.disabled = false; btn.textContent = orig;
        });
}

function showError(msg){
    document.getElementById('errSlot').innerHTML = '<div class="error-banner">' + esc(msg) + '</div>';
    setTimeout(() => { document.getElementById('errSlot').innerHTML = ''; }, 5000);
}

function loadAssignments(){
    api('/api/student/assignments')
        .then(async r => {
            if (!r.ok){
                if (r.status === 401){
                    window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
                    return;
                }
                throw new Error('load failed');
            }
            return r.json();
        })
        .then(d => { if (d) renderList(d.assignments || []); })
        .catch(() => {
            document.getElementById('listSlot').innerHTML = '<div class="error-banner">Could not load your assignments. Please refresh.</div>';
        });
    loadPosts();
}

function loadPosts(){
    api('/api/student/posts')
        .then(r => r.ok ? r.json() : { posts: [] })
        .then(d => renderPosts(d.posts || []))
        .catch(() => {});
}

function renderPosts(posts){
    const slot = document.getElementById('postsSlot');
    if (!slot) return;
    if (!posts.length){ slot.innerHTML = ''; return; }
    const KIND_LABEL = { syllabus: '📖 Syllabus', note: '📝 Note', announcement: '📣 Announcement' };
    slot.innerHTML = `<div class="card" style="margin-bottom:18px;">
        <div class="section-title" style="font-weight:700;font-size:15px;margin-bottom:12px;">📌 Class posts (${posts.length})</div>
        ${posts.map(p => `
            <details class="assign-card" style="margin-bottom:10px;">
                <summary style="cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                    <div>
                        <span class="badge">${esc(KIND_LABEL[p.kind] || p.kind || 'Post')}</span>
                        <strong style="color:#e7e9ea;margin-left:6px;">${esc(p.title)}</strong>
                        <div class="assign-class">${esc(p.className || 'Your class')}${p.module ? ' · ' + esc(p.module) : ''} · ${esc(new Date(p.createdAt).toLocaleDateString('en-AU',{day:'numeric',month:'short'}))}</div>
                    </div>
                    <span style="color:#71767b;font-size:12px;">▼</span>
                </summary>
                <div style="margin-top:14px;padding-top:14px;border-top:1px solid #2f3336;color:#d4d9de;font-size:14px;line-height:1.65;white-space:pre-wrap;">${escMultiline(p.body || '')}</div>
                ${p.source ? `<div style="margin-top:10px;font-size:13px;"><a href="${esc(p.source)}" target="_blank" rel="noopener" style="color:#4f8cff;text-decoration:none;">🔗 Source ↗</a></div>` : ''}
            </details>
        `).join('')}
    </div>`;
}

(function init(){
    api('/api/subscription')
        .then(r => {
            if (!r.ok || r.status === 401){
                window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
                return null;
            }
            return r.json();
        })
        .then(d => {
            if (!d) return;
            // Teachers shouldn't be here — bounce them back to their dashboard.
            if (d.role === 'teacher'){
                window.location.replace('/teacher-dashboard.html');
                return;
            }
            loadAssignments();
            document.getElementById('authLoading').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
        })
        .catch(() => {
            window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
        });
})();
</script>
</body>
</html>
