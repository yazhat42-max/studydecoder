    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%; width: 100%;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f1419; color: #e7e9ea;
        }
        .app-container { display: flex; flex-direction: column; min-height: 100vh; width: 100%; overflow-x: hidden; }
        .header {
            background: #16202a; border-bottom: 1px solid #2f3336;
            padding: 12px 24px; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0; position: sticky; top: 0; z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .back-btn {
            color: #4f8cff; text-decoration: none; font-size: 14px; font-weight: 500;
            padding: 8px 16px; border-radius: 8px; background: rgba(79, 140, 255, 0.1);
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(79, 140, 255, 0.2); }
        .header-title { font-size: 20px; font-weight: 700; color: #e7e9ea; }
        .header-subtitle { font-size: 12px; color: #71767b; margin-top: 2px; }
        .main-content { flex: 1; padding: 32px 24px; }
        .container { max-width: 980px; margin: 0 auto; }

        .config-card {
            background: #16202a; border: 1px solid #2f3336; border-radius: 16px;
            padding: 28px; margin-bottom: 24px;
        }
        .config-card h2 { font-size: 22px; margin-bottom: 6px; color: #e7e9ea; }
        .config-card .sub { color: #8899a6; font-size: 14px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-label { font-size: 13px; font-weight: 500; color: #c8ccd0; }
        .form-input, .form-select {
            background: #0f1419; border: 1px solid #2f3336; border-radius: 8px;
            padding: 12px 14px; color: #e7e9ea; font-size: 14px; font-family: inherit;
        }
        .form-input:focus, .form-select:focus { outline: none; border-color: #4f8cff; }
        .submit-btn {
            width: 100%; background: linear-gradient(135deg, #4f8cff, #6c63ff); color: #fff;
            border: none; border-radius: 10px; padding: 14px 24px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 18px;
        }
        .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79,140,255,0.3); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: flex; align-items: center; gap: 10px; color: #71767b; padding: 20px 0; justify-content: center; }
        .loading-dots { display: flex; gap: 4px; }
        .loading-dots span {
            width: 8px; height: 8px; background: #4f8cff; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .toolbar {
            display: flex; gap: 10px; flex-wrap: wrap; padding: 14px 16px;
            background: #16202a; border: 1px solid #2f3336; border-radius: 12px;
            margin-bottom: 16px; align-items: center;
        }
        .toolbar-info { flex: 1; font-size: 13px; color: #8899a6; }
        .tb-btn {
            background: #1d3a5f; color: #e7e9ea; border: 1px solid rgba(79,140,255,0.3);
            padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .tb-btn:hover { background: #25497a; }
        .tb-btn.primary { background: #4f8cff; border-color: #4f8cff; }
        .tb-btn.primary:hover { background: #3d7ae8; }
        .tb-btn.ghost { background: transparent; }
        .tb-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #c8ccd0; }
        .tb-toggle input { accent-color: #4f8cff; }

        /* Worksheet sheet — printable */
        #worksheet {
            background: #fff; color: #111; max-width: 880px; margin: 0 auto;
            padding: 48px 56px; border-radius: 8px; line-height: 1.55;
            font-family: 'Georgia', 'Times New Roman', serif;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        #worksheet h1 { font-size: 24px; margin-bottom: 4px; color: #111; }
        #worksheet .ws-meta { font-size: 13px; color: #555; margin-bottom: 6px; }
        #worksheet .ws-instructions { font-size: 13px; color: #333; padding: 10px 14px;
            background: #f5f6f8; border-left: 4px solid #4f8cff; border-radius: 4px;
            margin: 14px 0 24px; }
        #worksheet .ws-namebox { display: flex; gap: 24px; font-size: 13px; color: #444;
            border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; padding: 10px 0;
            margin-bottom: 24px; }
        #worksheet .ws-namebox span { flex: 1; }
        #worksheet .ws-q { margin-bottom: 22px; page-break-inside: avoid; }
        #worksheet .ws-q-head { font-weight: 700; margin-bottom: 6px; font-size: 14px; }
        #worksheet .ws-q-text { font-size: 14px; }
        #worksheet .ws-options { margin: 8px 0 0 18px; font-size: 14px; }
        #worksheet .ws-options li { margin-bottom: 4px; list-style: none; }
        #worksheet .ws-answerline { border-bottom: 1px solid #ccc; height: 22px; margin: 6px 0; }
        #worksheet .ws-answerbox { border: 1px solid #ccc; min-height: 90px; margin-top: 8px; border-radius: 4px; }

        #answerKey {
            background: #fff; color: #111; max-width: 880px; margin: 24px auto 0;
            padding: 48px 56px; border-radius: 8px; line-height: 1.55;
            font-family: 'Georgia', 'Times New Roman', serif;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            page-break-before: always;
        }
        #answerKey h1 { font-size: 22px; margin-bottom: 16px; color: #111; }
        #answerKey .ak-q { margin-bottom: 16px; page-break-inside: avoid; }
        #answerKey .ak-q-head { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        #answerKey .ak-answer { font-size: 14px; white-space: pre-wrap; }
        #answerKey .ak-explain { font-size: 13px; color: #555; margin-top: 4px; padding-left: 12px;
            border-left: 3px solid #4f8cff; }

        @media print {
            body { background: #fff; }
            .header, .config-card, .toolbar, .auth-loading-overlay { display: none !important; }
            .main-content { padding: 0; }
            #worksheet, #answerKey { box-shadow: none; border-radius: 0; max-width: 100%; padding: 24px; }
            #answerKey { page-break-before: always; }
        }
        @media (max-width: 720px) {
            .form-grid { grid-template-columns: 1fr; }
            #worksheet, #answerKey { padding: 28px 22px; }
            .main-content { padding: 16px; }

        .auth-loading-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0f1419; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .auth-spinner {
            width: 50px; height: 50px; border: 4px solid #2f3336;

        }

        .auth-text { margin-top: 16px; color: #71767b; font-size: 1rem; }

        .error-banner {

            color: #ff8088; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;

</head>

                    <div class="form-grid">

                            <label class="form-label" for="subjectSelect">Subject</label>

                        </div>

                            <label class="form-label" for="topicSelect">Topic / Module</label>

                        </div>
                        <div class="form-group">
                            <label class="form-label" for="countSelect">Number of Questions</label>
                            <select id="countSelect" class="form-select">
                                <option value="5">5 questions &middot; ~13 marks &middot; ~15 min</option>
                                <option value="10" selected>10 questions &middot; ~25 marks &middot; ~30 min</option>
                                <option value="15">15 questions &middot; ~38 marks &middot; ~45 min</option>
                                <option value="20">20 questions &middot; ~50 marks &middot; ~60 min</option>

                        <div class="form-group">

                        </div>
                    </div>

                    <button class="submit-btn" id="generateBtn">Generate Worksheet</button>
                    <div id="loadingBox" class="loading hidden">

                    </div>
                </section>

                        <button class="tb-btn ghost" id="newBtn">↻ New worksheet</button>
                        <button class="tb-btn" id="printBtn">🖨️ Print</button>
                        <button class="tb-btn" id="wordBtn">📄 Download Word</button>
                        <button class="tb-btn primary" id="pdfBtn">⬇ Download PDF</button>
                    </div>
                    <div id="worksheet"></div>
                    <div id="answerKey"></div>
                </div>
            </div>
        </main>

            'mathematics-extension-1': ['Further work with functions','Polynomials','Further trigonometry','Permutations and combinations','The binomial theorem','Proof by mathematical induction','Introduction to vectors','Inverse trigonometric functions','Further calculus skills','Further applications of calculus','The binomial distribution and sampling distribution of the mean'],
            'mathematics-extension-2': ['The nature of proof','Further work with vectors','Introduction to complex numbers','Further integration','Applications of calculus to mechanics'],
            'mathematics-standard': ['Formulas and equations','Linear relationships','Earning money','Managing money','Applications of measurement','Time and location','Networks, paths and trees','Data analysis','Algebraic relationships','Investment','Depreciation and loans','Investment and loans','Annuities','Right-angled triangles','Trigonometry','Ratios and rates','Network flow','Critical path analysis','Bivariate data analysis','Relative frequency and probability','The normal distribution'],
            'modern-history': ['Case Study - The Decline and Fall of the Romanov Dynasty','Case Study - The American Civil War','Case Study - The Meiji Restoration','Case Study - The Cuban Revolution','The Shaping of the Modern World - The French Revolution','The Shaping of the Modern World - World War I','The Shaping of the Modern World - The Age of Imperialism','Historical Investigation','Core Study: Power and Authority in the Modern World 1919-1946','National Studies - USA 1919-1941','National Studies - Russia and the Soviet Union 1917-1941','National Studies - China 1927-1949','National Studies - Japan 1904-1937','National Studies - India 1942-1984','National Studies - Australia 1918-1949','Peace and Conflict - Conflict in Indochina 1954-1979','Peace and Conflict - Conflict in the Pacific 1937-1951','Peace and Conflict - Conflict in Europe 1935-1945','Peace and Conflict - The Cold War 1945-1991','Peace and Conflict - The Arab-Israeli Conflict 1948-1996','Change in the Modern World - Civil Rights in the USA 1945-1968','Change in the Modern World - Apartheid in South Africa 1960-1994','Change in the Modern World - The Nuclear Age 1945-2011'],
            'music-1': ['Performance (Solo and Ensemble)','Composition','Musicology','Aural Skills','Topic - Australian Music','Topic - Jazz','Topic - Popular Music','Topic - Rock','Topic - Theatre Music','Topic - Music of a Culture'],
            'music-2': ['Performance','Composition','Musicology','Aural Skills','Music 1600-1900','Music of the Last 25 Years','Additional Topic'],
            'physics': ['Module 1: Kinematics','Module 2: Dynamics','Module 3: Waves and Thermodynamics','Module 4: Electricity and Magnetism','Module 5: Advanced Mechanics','Module 6: Electromagnetism','Module 7: The Nature of Light','Module 8: From the Universe to the Atom'],
            'science-extension': ['Science Inquiry and Innovation Project'],
            'society-culture': ['The Social and Cultural World','Personal and Social Identity','Intercultural Communication','Social and Cultural Continuity and Change (Core)','Personal Interest Project (PIP)','Depth Study - Popular Culture','Depth Study - Belief Systems and Ideologies','Depth Study - Social Inclusion and Exclusion','Depth Study - Social Conformity and Nonconformity'],
            'software-engineering': ['Programming Fundamentals','The Object-Oriented Paradigm','Programming Mechatronics','Secure Software Architecture','Programming for the Web','Software Automation','Software Engineering Project'],
            'studies-of-religion': ['Nature of Religion and Beliefs','Religious Tradition Study - Buddhism','Religious Tradition Study - Christianity','Religious Tradition Study - Hinduism','Religious Tradition Study - Islam','Religious Tradition Study - Judaism','Religion and Belief Systems in Australia post-1945','Religion and Peace','Religion and Non-Religion','Religions of Ancient Origin'],
            'visual-arts': ['Artmaking Practice','Art Criticism and Art History','The Conceptual Framework','The Frames (Subjective, Cultural, Structural, Postmodern)','Body of Work Development','Case Studies']
        };

        const SUBJECT_TOPICS_JUNIOR = {
            'english-7-10': ['Reading and Comprehension','Creative Writing','Persuasive Writing','Essay Writing','Poetry Analysis','Novel Study','Film Study','Grammar and Punctuation','Speaking and Listening','Visual Texts','Drama and Performance Texts'],
            'mathematics-7-10': ['Integers and Whole Numbers','Fractions, Decimals and Percentages','Ratios and Rates','Algebra - Expressions','Algebra - Equations','Linear Relationships','Coordinate Geometry','Indices and Surds','Measurement - Length, Area and Volume','Geometry - Angles and Polygons','Statistics and Data Analysis','Probability','Trigonometry','Pythagoras Theorem','Quadratic Expressions and Equations','Financial Mathematics'],
            'science-7-10': ['Cells and Living Things','Body Systems','Reproduction and Inheritance','Ecosystems and Food Webs','Classification of Living Things','Forces and Motion','Energy and Energy Transfers','Waves, Light and Sound','Electricity and Magnetism','Elements, Compounds and Mixtures','Chemical Reactions','Atoms and the Periodic Table','Acids and Bases','Earth Systems and Climate','Space and the Universe','Working Scientifically']
        };

        async function init() {
            // Step 1: try to detect user's level from /api/subscription (non-blocking)
            try {
                const r = await fetch(`${API_BASE}/api/subscription`, { credentials: 'include' });
                if (r.ok) {
                    const sub = await r.json();
                    USER_LEVEL = sub?.preferences?.level || 'senior';
                } else if (r.status === 401) {
                    window.location.href = 'login.html?next=' + encodeURIComponent(window.location.pathname);
                    return;
                }
            } catch (e) {
                console.warn('[worksheet-gen] subscription check failed', e);
            }

            // Step 2: load subjects (with hardcoded fallback if API fails)
            const endpoint = USER_LEVEL === 'junior' ? '/api/junior-subjects' : '/api/subjects';
            try {
                const r = await fetch(`${API_BASE}${endpoint}`, { credentials: 'include' });
                if (r.ok) {
                    const data = await r.json();
                    if (Array.isArray(data.subjects) && data.subjects.length > 0) {
                        SUBJECTS = data.subjects;
                    }
                }
            } catch (e) {
                console.warn('[worksheet-gen] subjects fetch failed, using fallback', e);
            }
            if (!SUBJECTS.length) {
                SUBJECTS = USER_LEVEL === 'junior' ? FALLBACK_SUBJECTS_JUNIOR : FALLBACK_SUBJECTS_SENIOR;
            }
            TOPICS_BY_SUBJECT = USER_LEVEL === 'junior' ? SUBJECT_TOPICS_JUNIOR : SUBJECT_TOPICS_SENIOR;

            populateSubjects();
            wireSubjectChange();

            document.getElementById('authLoading').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
        }

        function populateSubjects() {
            const sel = document.getElementById('subjectSelect');
            sel.innerHTML = '<option value="">Select a subject…</option>';
            const byCat = {};
            SUBJECTS.forEach(s => {
                const cat = s.category || 'Other';
                (byCat[cat] = byCat[cat] || []).push(s);
            });
            Object.keys(byCat).sort().forEach(cat => {
                const og = document.createElement('optgroup');
                og.label = cat;
                byCat[cat].forEach(s => {
                    const o = document.createElement('option');
                    o.value = s.id;
                    o.textContent = s.name;
                    og.appendChild(o);
                });
                sel.appendChild(og);
            });
        }

        function wireSubjectChange() {
            const subjectSel = document.getElementById('subjectSelect');
            const topicSel = document.getElementById('topicSelect');
            const updateTopics = () => {
                const id = subjectSel.value;
                if (!id) {
                    topicSel.innerHTML = '<option value="">Select a subject first</option>';
                    return;
                }
                const topics = TOPICS_BY_SUBJECT[id] || [];
                let html = '<option value="">All topics (mixed)</option>';
                topics.forEach(t => {
                    html += '<option value="' + escapeAttr(t) + '">' + escapeHtml(t) + '</option>';
                });
                topicSel.innerHTML = html;
            };
            subjectSel.addEventListener('change', updateTopics);
            subjectSel.addEventListener('input', updateTopics);
        }

        function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
        function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }

        function showError(msg) {
            const eb = document.getElementById('errorBanner');
            eb.textContent = msg;
            eb.classList.remove('hidden');
            setTimeout(() => eb.classList.add('hidden'), 8000);
        }

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const subject = document.getElementById('subjectSelect').value;
            const topicDropdown = document.getElementById('topicSelect').value;
            const customTopic = document.getElementById('customTopic').value.trim();
            const topic = customTopic || topicDropdown || '';
            const questionCount = parseInt(document.getElementById('countSelect').value, 10);
            const difficulty = document.getElementById('difficultySelect').value;

            if (!subject) { showError('Please select a subject.'); return; }

            const btn = document.getElementById('generateBtn');
            const loadingBox = document.getElementById('loadingBox');
            btn.disabled = true; btn.textContent = 'Generating…';
            loadingBox.classList.remove('hidden');
            document.getElementById('errorBanner').classList.add('hidden');

            try {
                const r = await fetch(`${API_BASE}/api/worksheet/generate`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject, topic, questionCount, difficulty })
                });
                if (!r.ok) {
                    if (window.SDUpsell && await window.SDUpsell.handleApiError(r)) return;
                    const data = await r.json().catch(() => ({}));
                    if (data.freeTierExhausted) {
                        showError('You\'ve hit your free daily limit. Upgrade to Pro for unlimited worksheets.');
                    } else {
                        showError(data.error || 'Generation failed. Please retry.');
                    }
                    return;
                }
                const data = await r.json();
                lastWorksheet = data;
                renderWorksheet(data);
            } catch (e) {
                showError('Network error. Please retry.');
            } finally {
                btn.disabled = false; btn.textContent = 'Generate Worksheet';
                loadingBox.classList.add('hidden');
            }
        });

        function renderWorksheet(data) {
            const wsEl = document.getElementById('worksheet');
            const akEl = document.getElementById('answerKey');
            const dateStr = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });

            let qHtml = '';
            data.questions.forEach((q, i) => {
                const num = q.number || (i + 1);
                const marks = q.marks || 1;
                const head = `Q${num}. <span style="float:right;color:#666;font-weight:500;">[${marks} mark${marks !== 1 ? 's' : ''}]</span>`;
                let body = `<div class="ws-q-text">${escapeHtml(q.question || '')}</div>`;
                if (q.type === 'mc' && Array.isArray(q.options)) {
                    body += '<ul class="ws-options">' + q.options.map(o => `<li>○ ${escapeHtml(o)}</li>`).join('') + '</ul>';
                } else if (q.type === 'extended' || marks >= 5) {
                    body += '<div class="ws-answerbox"></div>';
                } else {
                    const lines = Math.max(2, Math.min(6, marks * 2));
                    for (let j = 0; j < lines; j++) body += '<div class="ws-answerline"></div>';
                }
                qHtml += `<div class="ws-q"><div class="ws-q-head">${head}</div>${body}</div>`;
            });

            wsEl.innerHTML = `
                <h1>${escapeHtml(data.title || (data.subjectName + ' Worksheet'))}</h1>
                <div class="ws-meta">${escapeHtml(data.subjectName)} • ${escapeHtml(data.topic)} • Total: ${data.totalMarks} marks • ${escapeHtml(data.estimatedTime)}</div>
                <div class="ws-instructions"><strong>Instructions:</strong> ${escapeHtml(data.instructions || '')}</div>
                <div class="ws-namebox"><span><strong>Name:</strong> ____________________</span><span><strong>Date:</strong> ${dateStr}</span><span><strong>Mark:</strong> ____ / ${data.totalMarks}</span></div>
                ${qHtml}
            `;

            let akHtml = '<h1>Answer Key</h1>';
            data.questions.forEach((q, i) => {
                const num = q.number || (i + 1);
                akHtml += `<div class="ak-q"><div class="ak-q-head">Q${num} (${q.marks || 1} mark${(q.marks || 1) !== 1 ? 's' : ''}) — Answer:</div>`;
                akHtml += `<div class="ak-answer">${escapeHtml(q.answer || '')}</div>`;
                if (q.explanation) akHtml += `<div class="ak-explain">${escapeHtml(q.explanation)}</div>`;
                akHtml += '</div>';
            });
            akEl.innerHTML = akHtml;

            document.getElementById('toolbarInfo').innerHTML =
                `<strong>${escapeHtml(data.subjectName)}</strong> — ${escapeHtml(data.topic)} • ${data.questions.length} questions • ${data.totalMarks} marks`;

            document.getElementById('resultArea').classList.remove('hidden');
            applyAnswerKeyVisibility();
            window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 20, behavior: 'smooth' });
        }

        function applyAnswerKeyVisibility() {
            const show = document.getElementById('toggleAnswers').checked;
            document.getElementById('answerKey').style.display = show ? 'block' : 'none';
        }
        document.getElementById('toggleAnswers').addEventListener('change', applyAnswerKeyVisibility);

        document.getElementById('newBtn').addEventListener('click', () => {
            document.getElementById('resultArea').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        document.getElementById('printBtn').addEventListener('click', () => window.print());

        document.getElementById('pdfBtn').addEventListener('click', () => {
            if (!lastWorksheet) return;
            const includeAnswers = document.getElementById('toggleAnswers').checked;
            const wrap = document.createElement('div');
            wrap.appendChild(document.getElementById('worksheet').cloneNode(true));
            if (includeAnswers) wrap.appendChild(document.getElementById('answerKey').cloneNode(true));
            const filename = (lastWorksheet.title || 'worksheet').replace(/[^a-z0-9]+/gi, '_').toLowerCase() + '.pdf';
            const opt = {
                margin: [12, 12, 14, 12],
                filename,
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] }
            };
            const btn = document.getElementById('pdfBtn');
            const orig = btn.textContent; btn.textContent = 'Building PDF…'; btn.disabled = true;
            html2pdf().set(opt).from(wrap).save().then(() => {
                btn.textContent = orig; btn.disabled = false;
            }).catch(() => {
                btn.textContent = orig; btn.disabled = false;
                showError('PDF export failed. Try the Print button instead.');
            });
        });

        // ── Word (.doc) export ──
        // Builds a clean, Word-compatible HTML document from the worksheet data
        // (not a clone of the styled preview). Uses only simple block elements
        // and tables so Word lays it out predictably with no broken formatting.
        function buildWordHtml(data, includeAnswers) {
            const dateStr = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
            const P = 'font-family:Calibri,Arial,sans-serif;font-size:11pt;';
            let q = '';
            data.questions.forEach((qq, i) => {
                const num = qq.number || (i + 1);
                const marks = qq.marks || 1;
                q += `<p style="${P}margin:14pt 0 4pt;"><b>Q${num}.</b> ${escapeHtml(qq.question || '')} <b>[${marks} mark${marks !== 1 ? 's' : ''}]</b></p>`;
                if (qq.type === 'mc' && Array.isArray(qq.options)) {
                    qq.options.forEach(o => {
                        q += `<p style="${P}margin:2pt 0 2pt 28pt;">&#9675;&nbsp; ${escapeHtml(o)}</p>`;
                    });
                } else if (qq.type === 'extended' || marks >= 5) {
                    q += `<table style="width:100%;border-collapse:collapse;margin:4pt 0;"><tr><td style="border:1px solid #888;height:130pt;">&nbsp;</td></tr></table>`;
                } else {
                    const lines = Math.max(2, Math.min(6, marks * 2));
                    for (let j = 0; j < lines; j++) {
                        q += `<p style="${P}margin:0 0 10pt;border-bottom:1px solid #999;">&nbsp;</p>`;
                    }
                }
            });

            let ak = '';
            if (includeAnswers) {
                ak = `<br style="page-break-before:always;mso-special-character:line-break;">`;
                ak += `<h1 style="font-family:Calibri,Arial,sans-serif;font-size:16pt;">Answer Key</h1>`;
                data.questions.forEach((qq, i) => {
                    const num = qq.number || (i + 1);
                    const marks = qq.marks || 1;
                    ak += `<p style="${P}margin:12pt 0 2pt;"><b>Q${num} (${marks} mark${marks !== 1 ? 's' : ''}) — Answer:</b></p>`;
                    ak += `<p style="${P}margin:0 0 2pt;white-space:pre-wrap;">${escapeHtml(qq.answer || '')}</p>`;
                    if (qq.explanation) {
                        ak += `<p style="${P}margin:0 0 2pt 14pt;color:#555;font-style:italic;">${escapeHtml(qq.explanation)}</p>`;
                    }
                });
            }

            const head = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'
                + '<head><meta charset="utf-8"><title>' + escapeHtml(data.title || 'Worksheet') + '</title>'
                + '<style>@page{size:A4;margin:2cm;} body{font-family:Calibri,Arial,sans-serif;}</style></head><body>';
            const titleBlock = `<h1 style="font-family:Calibri,Arial,sans-serif;font-size:18pt;margin:0 0 2pt;">${escapeHtml(data.title || (data.subjectName + ' Worksheet'))}</h1>`
                + `<p style="${P}color:#444;margin:0 0 8pt;">${escapeHtml(data.subjectName || '')} &bull; ${escapeHtml(data.topic || '')} &bull; Total: ${data.totalMarks} marks &bull; ${escapeHtml(data.estimatedTime || '')}</p>`
                + `<p style="${P}background:#f0f2f5;padding:6pt 8pt;margin:0 0 10pt;"><b>Instructions:</b> ${escapeHtml(data.instructions || '')}</p>`
                + `<table style="width:100%;border-collapse:collapse;margin:0 0 12pt;${P}"><tr>`
                + `<td style="border-top:1px solid #ccc;border-bottom:1px solid #ccc;padding:6pt 0;"><b>Name:</b> ____________________</td>`
                + `<td style="border-top:1px solid #ccc;border-bottom:1px solid #ccc;padding:6pt 0;"><b>Date:</b> ${dateStr}</td>`
                + `<td style="border-top:1px solid #ccc;border-bottom:1px solid #ccc;padding:6pt 0;"><b>Mark:</b> ____ / ${data.totalMarks}</td>`
                + `</tr></table>`;
            return head + titleBlock + q + ak + '</body></html>';
        }

        document.getElementById('wordBtn').addEventListener('click', () => {
            if (!lastWorksheet) return;
            const includeAnswers = document.getElementById('toggleAnswers').checked;
            const html = buildWordHtml(lastWorksheet, includeAnswers);
            // BOM + application/msword so Word opens it natively and keeps formatting.
            const blob = new Blob(['﻿', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (lastWorksheet.title || 'worksheet').replace(/[^a-z0-9]+/gi, '_').toLowerCase() + '.doc';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        });

        init();
    </script>
</body>
