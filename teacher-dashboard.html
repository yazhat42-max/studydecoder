<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Teacher Dashboard | Study Decoder</title>
<meta name="description" content="Manage your Study Decoder classes, rosters, assignments and class mastery progress.">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; width:100%; font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1419; color:#e7e9ea; }
.app-container { display:flex; flex-direction:column; min-height:100vh; width:100%; overflow-x:hidden; }
.header { background:#16202a; border-bottom:1px solid #2f3336; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.header-left { display:flex; align-items:center; gap:16px; }
.back-btn { color:#4f8cff; text-decoration:none; font-size:14px; font-weight:500; padding:8px 16px; border-radius:8px; background:rgba(79,140,255,0.1); }
.header-title { font-size:20px; font-weight:700; }
.header-subtitle { font-size:12px; color:#71767b; margin-top:2px; }
.main-content { flex:1; padding:32px 24px; }
.container { max-width:980px; margin:0 auto; }
.card { background:#16202a; border:1px solid #2f3336; border-radius:16px; padding:24px; margin-bottom:20px; }
.btn { background:linear-gradient(135deg,#4f8cff,#6c63ff); color:#fff; border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; }
.btn:hover:not(:disabled) { transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-ghost { background:#1d3a5f; color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); }
.btn-danger { background:rgba(220,53,69,0.15); color:#ff8088; border:1px solid rgba(220,53,69,0.4); }
.form-input,.form-select,textarea { background:#0f1419; border:1px solid #2f3336; border-radius:8px; padding:12px 14px; color:#e7e9ea; font-size:14px; font-family:inherit; width:100%; }
.form-input:focus,.form-select:focus,textarea:focus { outline:none; border-color:#4f8cff; }
.form-label { font-size:13px; font-weight:500; color:#c8ccd0; display:block; margin-bottom:6px; }
.auth-loading-overlay { position:fixed; inset:0; background:#0f1419; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.auth-spinner { width:50px; height:50px; border:4px solid #2f3336; border-top-color:#4f8cff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
.error-banner { background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.4); color:#ff8088; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
.stat-box { background:#0f1419; border:1px solid #2f3336; border-radius:12px; padding:16px; }
.stat-box .num { font-size:26px; font-weight:800; color:#4f8cff; }
.stat-box .lbl { font-size:12px; color:#8899a6; margin-top:2px; }
table { width:100%; border-collapse:collapse; }
th,td { text-align:left; padding:10px 12px; border-bottom:1px solid #2f3336; font-size:14px; }
th { color:#8899a6; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
@media (max-width:720px){ .main-content{padding:16px;} table{font-size:13px;} th,td{padding:8px 6px;} }

.row-between { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.section-title { font-size:18px; font-weight:700; }
.muted { color:#71767b; font-size:14px; }
.link-inline { color:#4f8cff; text-decoration:none; font-weight:600; cursor:pointer; background:none; border:none; padding:0; font-size:14px; font-family:inherit; }
.class-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.class-card { background:#0f1419; border:1px solid #2f3336; border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:10px; }
.class-card h3 { font-size:17px; font-weight:700; }
.class-card .sub { font-size:12px; color:#8899a6; }
.join-code-box { display:flex; align-items:center; gap:8px; }
.join-code { font-family:'Courier New',monospace; font-size:20px; font-weight:800; letter-spacing:3px; color:#9ec3ff; background:#16202a; border:1px solid #2f3336; border-radius:8px; padding:6px 12px; }
.copy-btn { font-size:12px; padding:6px 10px; border-radius:7px; background:#1d3a5f; color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); cursor:pointer; }
.copy-btn:hover { background:#234a78; }
.card-actions { display:flex; gap:8px; margin-top:auto; padding-top:6px; }
.card-actions .btn, .card-actions .btn-danger { padding:8px 14px; font-size:13px; border-radius:8px; }
.btn-danger { cursor:pointer; font-weight:600; }
.empty-state { text-align:center; padding:36px 16px; color:#8899a6; }
.empty-state h3 { color:#e7e9ea; font-size:18px; margin-bottom:8px; }
.form-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.form-row > div { flex:1; min-width:160px; }
.tabs { display:flex; gap:6px; margin-bottom:18px; border-bottom:1px solid #2f3336; }
.tab { padding:10px 16px; font-size:14px; font-weight:600; color:#8899a6; cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; font-family:inherit; }
.tab.active { color:#4f8cff; border-bottom-color:#4f8cff; }
.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align:middle; }
.dot-green { background:#22c55e; } .dot-yellow { background:#eab308; } .dot-red { background:#ef4444; }
.badge { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:3px 8px; border-radius:6px; background:#1d3a5f; color:#9ec3ff; }
.bar { background:#0f1419; border:1px solid #2f3336; border-radius:6px; height:12px; overflow:hidden; min-width:90px; }
.bar > span { display:block; height:100%; background:linear-gradient(90deg,#4f8cff,#6c63ff); }
.progress-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #2f3336; flex-wrap:wrap; }
.progress-row .pname { font-weight:600; min-width:140px; }
.progress-row .pname button { color:#4f8cff; }
.heat-module { margin-bottom:16px; }
.heat-module h4 { font-size:13px; color:#c8ccd0; margin-bottom:8px; }
.heat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
.tile { border-radius:8px; padding:8px 10px; font-size:11px; line-height:1.35; }
.tile .ref { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tile .pct { font-weight:800; font-size:13px; }
.tile-strong { background:rgba(34,197,94,.25); border:1px solid #22c55e; }
.tile-medium { background:rgba(234,179,8,.2); border:1px solid #eab308; }
.tile-weak { background:rgba(239,68,68,.2); border:1px solid #ef4444; }
.heat-subject { font-size:15px; font-weight:700; margin:18px 0 10px; }
.assign-list { list-style:none; }
.assign-list li { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:12px 14px; background:#0f1419; border:1px solid #2f3336; border-radius:10px; margin-bottom:10px; }
.assign-meta { font-size:12px; color:#8899a6; margin-top:6px; }
.assign-instr { font-size:13px; color:#d4d9de; margin-top:6px; line-height:1.45; padding:8px 10px; background:rgba(79,140,255,0.06); border:1px solid rgba(79,140,255,0.18); border-radius:6px; white-space:pre-wrap; word-break:break-word; }
.assign-instr.muted { background:transparent; border:0; padding:0; color:#71767b; }
.assign-content-list { padding-left:18px; }
.assign-content-list li { padding:14px 0; border-bottom:1px solid #2f3336; }
.assign-content-list li:last-child { border-bottom:0; }
.ac-q { color:#e7e9ea; line-height:1.55; margin-bottom:8px; }
.ac-marks { color:#8899a6; font-size:13px; font-weight:500; margin-left:6px; }
.ac-opts { padding:6px 0 8px 4px; color:#a9b3bd; font-size:14px; line-height:1.7; }
.ac-answer { margin-top:6px; }
.ac-answer summary { cursor:pointer; color:#4f8cff; font-size:13px; font-weight:600; padding:4px 0; }
.ac-answer > div { padding:8px 12px; margin-top:6px; background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.22); border-radius:6px; color:#d4d9de; font-size:14px; line-height:1.55; }
.ac-explain { background:rgba(245,158,11,0.06) !important; border-color:rgba(245,158,11,0.22) !important; margin-top:6px; }
.ac-front { font-weight:700; color:#e7e9ea; margin-bottom:4px; }
.ac-back { color:#a9b3bd; font-size:14px; line-height:1.5; }
/* Syllabus post → section cards (mirrors student-assignments.html) */
.syllabus-cards { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
.syllabus-card { background:#0f1419; border:1px solid #2f3336; border-left:4px solid var(--card-color, #4f8cff); border-radius:10px; padding:12px 16px; }
.syllabus-card-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,0.06); }
.syllabus-card-icon { font-size:18px; line-height:1; flex-shrink:0; }
.syllabus-card-title { font-weight:700; color:#e7e9ea; font-size:14px; }
.syllabus-card-body { color:#d4d9de; font-size:13px; line-height:1.6; }
.syllabus-card-body p { margin:0 0 6px; }
.syllabus-card-body p:last-child { margin-bottom:0; }
.syllabus-card-body ul, .syllabus-card-body ol { padding-left:18px; margin:4px 0 6px; }
.syllabus-card-body li { margin:2px 0; }
.syllabus-card-body strong { color:#fff; }
.syllabus-card-body em { color:#c4b5fd; }
/* Account dropdown */
#acctMenu button:hover { background:rgba(255,255,255,0.04); }
#acctMenu button:active { background:rgba(255,255,255,0.08); }
#acctBtn:hover { background:rgba(79,140,255,0.14); border-color:rgba(79,140,255,0.5); }
</style>
<link rel="stylesheet" href="teacher-theme.css">
</head>
<body>
<div id="authLoading" class="auth-loading-overlay"><div class="auth-spinner"></div><div style="margin-top:16px;color:#71767b;">Loading…</div></div>
<div class="app-container hidden" id="appContainer">
  <header class="header">
    <div class="header-left">
      <a href="index.html?stay=1" class="back-btn">← Home</a>
      <div><div class="header-title">Teacher Dashboard</div><div class="header-subtitle">Your classes, rosters and progress.</div></div>
    </div>
    <div style="position:relative;">
      <button id="acctBtn" style="background:rgba(79,140,255,0.08);border:1px solid rgba(79,140,255,0.3);color:#e7e9ea;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;">
        <span id="acctEmail" style="color:#a9b3bd;">Account</span>
        <span style="font-size:10px;color:#71767b;">▼</span>
      </button>
      <div id="acctMenu" style="display:none;position:absolute;top:100%;right:0;margin-top:6px;background:#0f1419;border:1px solid #2f3336;border-radius:10px;min-width:240px;box-shadow:0 14px 40px rgba(0,0,0,0.5);overflow:hidden;z-index:60;">
        <div style="padding:14px 16px;border-bottom:1px solid #2f3336;">
          <div style="font-size:13px;font-weight:700;color:#e7e9ea;" id="acctMenuName">—</div>
          <div style="font-size:11px;color:#71767b;margin-top:2px;" id="acctMenuPlan">—</div>
        </div>
        <button id="acctCancel" style="display:block;width:100%;background:none;border:0;text-align:left;padding:11px 16px;color:#fcd34d;font-size:13px;cursor:pointer;font-family:inherit;border-bottom:1px solid #2f3336;">Cancel teacher seat</button>
        <button id="acctSignout" style="display:block;width:100%;background:none;border:0;text-align:left;padding:11px 16px;color:#ff8088;font-size:13px;cursor:pointer;font-family:inherit;">Sign out</button>
      </div>
    </div>
  </header>
  <main class="main-content"><div class="container" id="root"></div></main>
</div>
<script src="auth.js"></script>
<script src="subject-data.js"></script>
<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
function api(path, opts){ return fetch(API_BASE+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts||{})); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const root = document.getElementById('root');
let state = { view:'list', classId:null, className:'', tab:'roster', studentView:null };
// Teacher's seat tier + usage — refreshed from /api/teacher/classes on every load.
let teacherTier = 'both';
let studentTotal = 0;
let studentCap = 100;
let currentUser = null;          // the logged-in teacher (from /api/subscription)
let myClasses = [];              // active classes, cached for Home quick-actions
// Subject + module catalog comes from the shared subject-data.js
// (window.SD_SUBJECTS) so the teacher dashboard shows the exact same
// known modules as the Worksheet Generator / consumer tools.
function loadSyllabusModules() { return Promise.resolve(); } // kept for call-site compat
function modulesForSubject(subject) {
  return (window.SD_SUBJECTS && window.SD_SUBJECTS.modulesFor(subject)) || [];
}
// Resolve any stored class subject (id, name, or legacy free text) to a
// human-readable display name for banners + chips.
function subjectDisplayName(subject) {
  if (!subject) return '';
  return (window.SD_SUBJECTS && window.SD_SUBJECTS.displayName(subject)) || subject;
}

function fmtDate(s){
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return '—';
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}
function pct(n){ return Math.round((Number(n)||0) * 100) + '%'; }
function masteryDot(avg){
  if (avg == null) return '';
  if (avg >= 0.75) return '<span class="dot dot-green"></span>';
  if (avg >= 0.45) return '<span class="dot dot-yellow"></span>';
  return '<span class="dot dot-red"></span>';
}
function bandClass(band){
  if (band === 'strong') return 'tile-strong';
  if (band === 'weak') return 'tile-weak';
  return 'tile-medium';
}
function bandFromScore(score){
  if (score >= 0.75) return 'strong';
  if (score >= 0.45) return 'medium';
  return 'weak';
}

/* ===================== VIEW A: CLASS LIST ===================== */
function showList(){
  state = { view:'list', classId:null, className:'', tab:'roster', studentView:null };
  root.innerHTML = `
    <div id="overviewSlot" class="sd-fade"><div class="sd-loading"><div class="ring"></div><div>Loading your overview…</div></div></div>
    <div class="card" id="classesCard">
      <div class="row-between" style="margin-bottom:16px;">
        <div>
          <div class="section-title">Your classes</div>
          <div class="sub" id="seatInfo" style="margin-top:2px;"></div>
        </div>
        <button class="btn" id="newClassToggle">+ Create Class</button>
      </div>
      <div id="newClassForm" class="hidden">
        <div id="createErr"></div>
        <div class="form-row">
          <div><label class="form-label">Class name *</label><input class="form-input" id="ncName" placeholder="Year 12 English Advanced"></div>
          <div><label class="form-label">Level *</label><select class="form-select" id="ncLevel"></select></div>
        </div>
        <div class="form-row" style="margin-top:14px;">
          <div><label class="form-label">Subject *</label><select class="form-select" id="ncSubject"><option value="">— Pick the class level first —</option></select></div>
          <div><label class="form-label">Year</label><input class="form-input" id="ncYear" placeholder="2026"></div>
        </div>
        <p class="muted" style="margin-top:8px;font-size:12px;">The subject locks what your linked students can use for free. Pick the one this class teaches.</p>
        <button class="btn" id="ncCreate" style="margin-top:14px;">Create class</button>
      </div>
    </div>
    <div id="classListSlot"><div class="card muted">Loading classes…</div></div>`;

  document.getElementById('newClassToggle').addEventListener('click', () => {
    document.getElementById('newClassForm').classList.toggle('hidden');
  });
  document.getElementById('ncCreate').addEventListener('click', createClass);
  loadClasses();
  loadOverview();
}

function greetingWord(){
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 18) return 'Good afternoon';
  return 'Good evening';
}
function firstName(){
  const n = (currentUser && (currentUser.name || currentUser.email)) || '';
  return esc(String(n).split(/[\s@]/)[0] || 'there');
}

function loadOverview(){
  api('/api/teacher/overview')
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(renderOverview)
    .catch(() => {
      const slot = document.getElementById('overviewSlot');
      if (slot) slot.innerHTML = '';   // fail quietly; the class list still loads
    });
}

function renderOverview(d){
  const slot = document.getElementById('overviewSlot');
  if (!slot) return;
  const greet = `
    <div class="sd-home-greet">${greetingWord()}, <span class="grad">${firstName()}</span> 👋</div>
    <div class="sd-home-sub">Here's how your classes are tracking today.</div>`;

  // New teacher with zero classes → inviting empty state, not blank stats.
  if (!d.classes){
    slot.innerHTML = greet + `
      <div class="card glow sd-empty">
        <div class="ico">🎓</div>
        <h3>Let's set up your first class</h3>
        <p>Create a class, then share the join code with your students. They get full Study Decoder access for your subject — and you get live progress, assignments and AI tools.</p>
        <button class="btn" id="ovCreateFirst">+ Create your first class</button>
      </div>`;
    const b = document.getElementById('ovCreateFirst');
    if (b) b.addEventListener('click', revealCreateForm);
    return;
  }

  const capPct = d.studentCap ? Math.round((d.activeStudents / d.studentCap) * 100) : 0;
  const masteryVal = d.avgMasteryPct == null ? '—' : d.avgMasteryPct + '%';
  const masterySub = d.avgMasteryPct == null ? 'No data yet' : 'class average';
  const stats = `
    <div class="sd-stat-grid">
      <div class="sd-stat s-students">
        <div class="sd-stat-label">Active students</div>
        <div class="sd-stat-value">${d.activeStudents}</div>
        <div class="sd-stat-sub">${capPct}% of your ${d.studentCap}-seat cap</div>
      </div>
      <div class="sd-stat s-classes">
        <div class="sd-stat-label">Classes</div>
        <div class="sd-stat-value">${d.classes}</div>
        <div class="sd-stat-sub">active</div>
      </div>
      <div class="sd-stat s-review">
        <div class="sd-stat-label">Submissions in</div>
        <div class="sd-stat-value">${d.submissionsToReview}</div>
        <div class="sd-stat-sub">turned in by students</div>
      </div>
      <div class="sd-stat s-mastery">
        <div class="sd-stat-label">Class mastery</div>
        <div class="sd-stat-value">${masteryVal}</div>
        <div class="sd-stat-sub">${masterySub}</div>
      </div>
    </div>`;

  const quick = `
    <div class="sd-quick-actions">
      <button class="btn" data-qa="create">+ Create class</button>
      <button class="btn-ghost" data-qa="assignment">📝 New assignment</button>
      <button class="btn-ghost" data-qa="post">📣 New post</button>
    </div>`;

  // Needs attention — topics where the most students are weak.
  let attention = '';
  if (d.weakTopics && d.weakTopics.length){
    const items = d.weakTopics.map(w => `
      <li>
        <span class="sd-chip">${esc(subjectDisplayName(w.subject))}</span>
        <span style="flex:1;">${esc(w.topic)}</span>
        <span class="when">${w.students} student${w.students===1?'':'s'} · ${w.avgScore}%</span>
      </li>`).join('');
    attention = `
      <div class="card" style="margin-bottom:14px;">
        <div class="section-title" style="margin-bottom:10px;">Needs attention</div>
        <ul class="sd-activity">${items}</ul>
      </div>`;
  }

  // Recent activity feed.
  let recent = '';
  if (d.recentActivity && d.recentActivity.length){
    const items = d.recentActivity.map(a => {
      const ico = a.type === 'submission' ? '✅' : '👋';
      const right = a.score ? `<span class="sd-chip">${esc(a.score)}</span>` : '';
      return `
        <li>
          <span>${ico}</span>
          <span style="flex:1;"><strong>${esc(a.name)}</strong> ${esc(a.detail)}${a.className ? ` · ${esc(a.className)}` : ''}</span>
          ${right}
          <span class="when">${fmtDate(a.at)}</span>
        </li>`;
    }).join('');
    recent = `
      <div class="card" style="margin-bottom:14px;">
        <div class="section-title" style="margin-bottom:10px;">Recent activity</div>
        <ul class="sd-activity">${items}</ul>
      </div>`;
  }

  slot.innerHTML = greet + stats + quick + attention + recent;

  slot.querySelectorAll('[data-qa]').forEach(b => b.addEventListener('click', () => {
    const qa = b.dataset.qa;
    if (qa === 'create') return revealCreateForm();
    if (!myClasses.length){ revealCreateForm(); alert('Create a class first, then you can add assignments and posts.'); return; }
    const c = myClasses[0];
    openClass(c.classId, c.name, c.subject || '', qa === 'assignment' ? 'assignments' : 'posts');
  }));
}

function revealCreateForm(){
  const form = document.getElementById('newClassForm');
  const card = document.getElementById('classesCard');
  if (form) form.classList.remove('hidden');
  if (card) card.scrollIntoView({ behavior:'smooth', block:'start' });
  const name = document.getElementById('ncName');
  if (name) setTimeout(() => name.focus(), 300);
}

function loadClasses(){
  api('/api/teacher/classes')
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(d => {
      teacherTier  = d.tier || 'both';
      studentTotal = d.studentTotal || 0;
      studentCap   = d.studentCap || 100;
      myClasses    = (d.classes || []).filter(c => !c.archivedAt);
      updateSeatInfo();
      populateLevelSelect();
      renderClassList(d.classes || []);
    })
    .catch(() => {

function updateSeatInfo(){
  const el = document.getElementById('seatInfo');
  if (!el) return;
  const tierLabel = teacherTier === 'junior' ? 'Junior seat'
                  : teacherTier === 'senior' ? 'Senior seat'
                  : 'Combined seat (Junior + Senior)';
  const pct = Math.min(100, Math.round((studentTotal / studentCap) * 100));
  const colour = pct >= 90 ? '#ef4444' : pct >= 70 ? '#eab308' : '#22c55e';
  el.innerHTML = `${tierLabel} &middot; <span style="color:${colour};font-weight:600;">${studentTotal} / ${studentCap}</span> students linked`;
}

function populateLevelSelect(){
  const sel = document.getElementById('ncLevel');
  if (!sel) return;
  const opts = [];
  if (teacherTier === 'junior' || teacherTier === 'both') opts.push('<option value="junior">Junior (Years 7-10)</option>');
  if (teacherTier === 'senior' || teacherTier === 'both') opts.push('<option value="senior">Senior (HSC, Year 11-12)</option>');
  sel.innerHTML = opts.join('');
  sel.disabled = opts.length < 2;
  // Cascade: when the level changes, repopulate the subject dropdown.
  sel.addEventListener('change', populateSubjectSelectForLevel);
  populateSubjectSelectForLevel();
}

// Build a subject <select> for the given level from the shared catalog.
// Option VALUE = subject id (e.g. "mathematics-advanced") so module lookups
// + the student access gate match the canonical ids the tools use.
function subjectOptionsHtml(level) {
  const subs = (window.SD_SUBJECTS ? window.SD_SUBJECTS.subjectsForLevel(level) : []);
  if (level === 'junior') {
    return '<option value="">Pick a subject…</option>' +
      subs.map(s => `<option value="${esc(s.id)}">${esc(s.name)}</option>`).join('');
  }
  // Senior — group by category.
  const byCat = {};
  subs.forEach(s => { (byCat[s.category] = byCat[s.category] || []).push(s); });
  let html = '<option value="">Pick a subject…</option>';
  Object.keys(byCat).sort().forEach(cat => {
    html += `<optgroup label="${esc(cat)}">`;
    byCat[cat].forEach(s => { html += `<option value="${esc(s.id)}">${esc(s.name)}</option>`; });
    html += '</optgroup>';
  });
  return html;
}

function populateSubjectSelectForLevel() {
  const levelSel = document.getElementById('ncLevel');
  const sel = document.getElementById('ncSubject');
  if (!levelSel || !sel) return;
  const level = levelSel.value;
  sel.innerHTML = level ? subjectOptionsHtml(level) : '<option value="">— Pick the class level first —</option>';
}

function renderClassList(classes){
  const active = classes.filter(c => !c.archivedAt);
  const slot = document.getElementById('classListSlot');
  if (!active.length){
    slot.innerHTML = `
      <div class="card muted sd-empty">
        <div class="ico">📚</div>
        <h3>No classes yet</h3>
        <p>Create your first class above, then share the join code with your students so they get full Study Decoder access for your subject.</p>
      </div>`;
    return;
  }
  // Surface a single big banner at the top of the list if ANY active class
  // doesn't have a subject set — those classes can't gate student access
  // properly until the teacher picks one.
  const subjectless = active.filter(c => !c.subject);
  let prompt = '';
  if (subjectless.length) {
    const list = subjectless.map(c => `<li style="margin-top:4px;"><strong>${esc(c.name)}</strong> — <button class="link-inline cls-set-subject" data-id="${esc(c.classId)}" data-level="${esc(c.level || 'senior')}">Set subject →</button></li>`).join('');
    prompt = `<div class="card" style="background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.4);margin-bottom:14px;">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <div style="font-size:1.4rem;">⚠️</div>
        <div style="flex:1;">
          <div style="font-weight:700;color:#fcd34d;margin-bottom:4px;">${subjectless.length} class${subjectless.length===1?'':'es'} ${subjectless.length===1?'has':'have'} no subject set</div>
          <div class="muted" style="font-size:13px;margin-bottom:8px;">Students linked here won't get any free subject access until you pick one. Pick the subject this class teaches:</div>
          <ul style="list-style:disc;padding-left:18px;color:#d4d9de;font-size:13px;">${list}</ul>
        </div>
      </div>
    </div>`;
  }
  const cards = active.map(c => {
    const levelLabel = c.level === 'junior' ? 'Junior' : c.level === 'senior' ? 'Senior' : '';
    const metaParts = [levelLabel, c.subject ? subjectDisplayName(c.subject) : '', c.year].filter(Boolean);
    const meta = metaParts.length ? metaParts.join(' · ') : '';
    const subjectChip = c.subject
      ? `<span style="display:inline-block;background:rgba(108,99,255,0.18);color:#c4b5fd;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-top:6px;">🎯 ${esc(subjectDisplayName(c.subject))}</span>`
      : `<span style="display:inline-block;background:rgba(245,158,11,0.18);color:#fcd34d;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-top:6px;">⚠️ No subject set</span>`;
    return `
      <div class="class-card">
        <div>
          <h3>${esc(c.name)}</h3>
          ${meta ? `<div class="sub">${esc(meta)}</div>` : ''}
          ${subjectChip}
        </div>
        <div class="join-code-box">
          <span class="join-code">${esc(c.joinCode)}</span>
          <button class="copy-btn" data-code="${esc(c.joinCode)}">Copy</button>
        </div>
        <div class="sub">${c.memberCount || 0} student${(c.memberCount===1)?'':'s'}</div>
        <div class="card-actions">
          <button class="btn" data-open="${esc(c.classId)}" data-name="${esc(c.name)}" data-subject="${esc(c.subject || '')}">Open</button>
          <button class="btn-danger" data-archive="${esc(c.classId)}" data-aname="${esc(c.name)}">Archive</button>
        </div>
      </div>`;
  }).join('');
  slot.innerHTML = prompt + `<div class="class-grid">${cards}</div>`;

  // Wire the "Set subject" links in the prompt banner.
  slot.querySelectorAll('.cls-set-subject').forEach(btn => {
    btn.addEventListener('click', () => openSetSubjectModal(btn.dataset.id, btn.dataset.level || 'senior'));
  });

  slot.querySelectorAll('[data-code]').forEach(b => b.addEventListener('click', () => {
    navigator.clipboard && navigator.clipboard.writeText(b.dataset.code);
    const t = b.textContent; b.textContent = 'Copied!';
    setTimeout(() => { b.textContent = t; }, 1400);

    api('/api/teacher/classes/' + encodeURIComponent(b.dataset.archive), { method:'DELETE' })
      .then(r => r.ok ? loadClasses() : alert('Could not archive that class.'))
      .catch(() => alert('Network error.'));
  }));
}

function createClass(){
  const name = document.getElementById('ncName').value.trim();
  const level = document.getElementById('ncLevel').value;
  const subjSel = document.getElementById('ncSubject');
  // Value is now a canonical subject id (e.g. "mathematics-advanced").
  const subject = (subjSel ? subjSel.value : '').trim();
  const year = document.getElementById('ncYear').value.trim();
  const errSlot = document.getElementById('createErr');
  errSlot.innerHTML = '';
  if (!name){ errSlot.innerHTML = '<div class="error-banner">Class name is required.</div>'; return; }
  if (!level){ errSlot.innerHTML = '<div class="error-banner">Pick a class level.</div>'; return; }
  if (!subject){ errSlot.innerHTML = '<div class="error-banner">Pick a subject — students need it for the free-access lock.</div>'; return; }
  const btn = document.getElementById('ncCreate');
  btn.disabled = true; btn.textContent = 'Creating…';
  api('/api/teacher/classes', { method:'POST', body: JSON.stringify({ name, subject, year, level }) })
    .then(async r => {
      const d = await r.json().catch(()=>({}));
      btn.disabled = false; btn.textContent = 'Create class';
      if (!r.ok){ errSlot.innerHTML = '<div class="error-banner">' + esc(d.error || 'Could not create class.') + '</div>'; return; }
      document.getElementById('ncName').value = '';
      if (subjSel) subjSel.value = '';
      document.getElementById('ncYear').value = '';
      document.getElementById('newClassForm').classList.add('hidden');
      loadClasses();
    })
    .catch(() => {
      btn.disabled = false; btn.textContent = 'Create class';
      errSlot.innerHTML = '<div class="error-banner">Network error. Please try again.</div>';
    });
}

// Modal to set / change the subject on an existing class. Uses the shared
// subject catalog (id values) for the dropdown.
function openSetSubjectModal(classId, level) {
  let overlay = document.getElementById('sdSetSubjectOverlay');
  if (overlay) overlay.remove();
  overlay = document.createElement('div');
  overlay.id = 'sdSetSubjectOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(6px);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  const subjectHtml = subjectOptionsHtml(level || 'senior');

  overlay.innerHTML = `
    <div style="background:#16202a;border:1px solid #2f3336;border-radius:18px;max-width:480px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.6);">
      <div style="padding:18px 22px;border-bottom:1px solid #2f3336;">
        <div style="font-size:17px;font-weight:700;color:#e7e9ea;">🎯 Set class subject</div>
        <div style="font-size:12px;color:#71767b;margin-top:2px;">Students linked here get free access to this subject only.</div>
      </div>
      <div style="padding:18px 22px;">
        <div id="setSubjErr"></div>
        <label style="display:block;font-size:13px;font-weight:600;color:#c8ccd0;margin-bottom:6px;">Subject</label>
        <select id="setSubjSelect" class="form-select">${subjectHtml}</select>
      </div>
      <div style="padding:14px 22px;border-top:1px solid #2f3336;display:flex;justify-content:flex-end;gap:10px;">
        <button id="setSubjCancel" class="btn-ghost" style="border:1px solid #2f3336;background:rgba(255,255,255,0.04);color:#e7e9ea;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
        <button id="setSubjSave" class="btn" style="border-radius:8px;padding:8px 18px;font-size:13px;">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const sel = document.getElementById('setSubjSelect');
  document.getElementById('setSubjCancel').addEventListener('click', () => overlay.remove());
  document.getElementById('setSubjSave').addEventListener('click', () => {
    const subject = sel.value;
    const err = document.getElementById('setSubjErr');
    err.innerHTML = '';
    if (!subject) { err.innerHTML = '<div class="error-banner">Pick a subject first.</div>'; return; }
    const btn = document.getElementById('setSubjSave');
    btn.disabled = true; btn.textContent = 'Saving…';
    api('/api/teacher/classes/' + encodeURIComponent(classId), {
      method: 'PATCH',
      body: JSON.stringify({ subject })
    })
      .then(async r => {
        const d = await r.json().catch(() => ({}));
        btn.disabled = false; btn.textContent = 'Save';
        if (!r.ok) { err.innerHTML = '<div class="error-banner">' + esc(d.error || 'Could not save.') + '</div>'; return; }
        overlay.remove();
        loadClasses();
      })
      .catch(() => {
        btn.disabled = false; btn.textContent = 'Save';
        err.innerHTML = '<div class="error-banner">Network error. Please try again.</div>';
      });
  });
}

function openClass(classId, className, classSubject, tab){
  state = { view:'class', classId, className, classSubject: classSubject || '', tab: tab || 'roster', studentView:null };

function renderClassShell(){
  const subjectBanner = state.classSubject
    ? `<div style="margin-top:10px;padding:10px 14px;background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.28);border-radius:10px;font-size:13px;color:#c4b5fd;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">

      </div>`
    : `<div style="margin-top:10px;padding:10px 14px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.32);border-radius:10px;font-size:13px;color:#fcd34d;">

    <div class="card">
      <div class="row-between">
        <div>
          <button class="link-inline" id="backToClasses">← Back to classes</button>
          <div class="section-title" style="margin-top:6px;">${esc(state.className)}</div>
        </div>
        <button class="btn-ghost btn" id="regenBtn">Regenerate code</button>
      </div>
      ${subjectBanner}
      <div id="regenMsg" style="margin-top:10px;"></div>
    </div>
    <div class="tabs">
      <button class="tab ${state.tab==='roster'?'active':''}" data-tab="roster">Roster</button>
      <button class="tab ${state.tab==='assignments'?'active':''}" data-tab="assignments">Assignments</button>
      <button class="tab ${state.tab==='posts'?'active':''}" data-tab="posts">Class posts</button>
      <button class="tab ${state.tab==='progress'?'active':''}" data-tab="progress">Progress</button>
    </div>
    <div id="tabSlot"><div class="card muted">Loading…</div></div>`;

  document.getElementById('backToClasses').addEventListener('click', showList);

function regenerateCode(){
  if (!confirm('Generate a new join code? The old code will stop working immediately.')) return;
  const btn = document.getElementById('regenBtn');
  btn.disabled = true;
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/regenerate-code', { method:'POST' })
    .then(async r => {
      const d = await r.json().catch(()=>({}));
      btn.disabled = false;
      if (!r.ok){ document.getElementById('regenMsg').innerHTML = '<div class="error-banner">Could not regenerate code.</div>'; return; }
      document.getElementById('regenMsg').innerHTML = 'New join code: <span class="join-code">' + esc(d.joinCode) + '</span>';
    })
    .catch(() => {
      btn.disabled = false;
      document.getElementById('regenMsg').innerHTML = '<div class="error-banner">Network error.</div>';
    });
}

function loadRoster(){
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/students')
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(d => renderRoster(d.students || []))

      document.getElementById('tabSlot').innerHTML = '<div class="error-banner">Could not load the roster.</div>';

function renderRoster(students){
  const slot = document.getElementById('tabSlot');
  if (!students.length){
    slot.innerHTML = '<div class="card empty-state"><h3>No students yet</h3><p>Share this class\'s join code so students can link their accounts.</p></div>';
    return;
  }
  const rows = students.map(s => {
    const avg = s.mastery ? s.mastery.average : null;
    const avgCell = avg == null ? '—' : masteryDot(avg) + pct(avg);
    return `<tr>
      <td><button class="link-inline" data-student="${esc(s.userId)}" data-sname="${esc(s.name)}">${esc(s.name)}</button></td>
      <td>${esc(s.email)}</td>
      <td>${esc(fmtDate(s.joinedAt))}</td>
      <td>${esc(fmtDate(s.lastActive))}</td>

    </tr>`;
  }).join('');
  slot.innerHTML = `
    <div class="card">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Last active</th><th>Avg mastery</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  slot.querySelectorAll('[data-student]').forEach(b => b.addEventListener('click', () => {
    state.studentView = { userId: b.dataset.student, name: b.dataset.sname };
    renderClassShell();
  }));
  slot.querySelectorAll('[data-remove]').forEach(b => b.addEventListener('click', () => {
    if (!confirm('Remove ' + b.dataset.rname + ' from this class? They will lose their full access.')) return;
    api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/students/' + encodeURIComponent(b.dataset.remove), { method:'DELETE' })
      .then(r => r.ok ? loadRoster() : alert('Could not remove that student.'))
      .catch(() => alert('Network error.'));
  }));
}

          <label class="form-label">Difficulty</label>

        <div>
          <label class="form-label">Due date</label>
          <input class="form-input" id="asgDue" type="date">
        </div>
        <div></div>
      </div>
      <div style="margin-top:14px;">
        <label class="form-label">Extra instructions for students (optional)</label>
        <textarea class="form-input" id="asgInstructions" rows="2" placeholder="e.g. 'Write your essay response in your exercise book and bring it to class.'"></textarea>

    </div>
    <div id="asgListSlot"><div class="card muted">Loading assignments…</div></div>`;

function refreshAssignmentList(){
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/assignments')
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(d => renderAssignmentList(d.assignments || []))

      document.getElementById('asgListSlot').innerHTML = '<div class="error-banner">Could not load assignments.</div>';
    });

function renderAssignmentList(assignments){
  const slot = document.getElementById('asgListSlot');
  if (!assignments.length){
    slot.innerHTML = '<div class="card muted">No assignments yet for this class.</div>';
    return;
  }
  const items = assignments.map(a => {
    const sub = a.submissions || { completed:0, total:0 };
    const due = a.dueAt ? 'Due ' + esc(fmtDate(a.dueAt)) : 'No due date';
    const spec = a.spec || {};
    const specBits = [
      spec.module ? esc(spec.module) : '',
      spec.difficulty ? esc(spec.difficulty.charAt(0).toUpperCase() + spec.difficulty.slice(1)) : '',
      spec.count ? esc(spec.count) + (a.type === 'deck' ? ' cards' : ' questions') : ''
    ].filter(Boolean).join(' · ');
    const specRow = specBits ? `<div class="assign-meta" style="margin-top:4px;">📋 ${specBits}</div>` : '';
    // Backward-compat: assignments created before the AI-generation refactor
    // used `refId` for free-text instructions and don't have spec/content.
    const instructionsText = a.instructions || a.refId || '';
    const instr = instructionsText
      ? `<div class="assign-instr">${escMultiline(instructionsText)}</div>`
      : '';
    let statusBadge = '';
    if (a.generationStatus === 'failed') {
      statusBadge = `<div class="assign-instr" style="background:rgba(220,53,69,0.08);border-color:rgba(220,53,69,0.3);color:#ff8088;">⚠️ Content generation failed${a.generationError ? ': ' + esc(a.generationError) : ''}. Delete and try again.</div>`;
    } else if (a.generationStatus === 'pending') {
      statusBadge = `<div class="assign-instr" style="background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.3);color:#fcd34d;">⏳ Content not yet generated.</div>`;
    }
    return `<li>
      <div style="flex:1; min-width:0;">
        <div><span class="badge">${esc(a.type||'')}</span> &nbsp;<strong>${esc(a.title)}</strong></div>
        ${specRow}
        ${instr}
        ${statusBadge}
        <div class="assign-meta">${due}</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0;">
        <div class="muted">${sub.completed} / ${sub.total} completed</div>
        <button class="btn-ghost asg-view" data-id="${esc(a.assignmentId)}" style="font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer;">View content</button>
        <button class="btn-danger asg-del" data-id="${esc(a.assignmentId)}" data-title="${esc(a.title)}" style="font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer;">Delete</button>
      </div>
    </li>`;
  }).join('');
  slot.innerHTML = `<div class="card"><div class="section-title" style="margin-bottom:14px;">Assignments</div><ul class="assign-list">${items}</ul></div>` +
    '<div id="asgViewSlot"></div>';
  slot.querySelectorAll('.asg-del').forEach(btn => btn.addEventListener('click', () => deleteAssignment(btn.dataset.id, btn.dataset.title)));
  slot.querySelectorAll('.asg-view').forEach(btn => btn.addEventListener('click', () => viewAssignmentContent(btn.dataset.id)));
}

function viewAssignmentContent(assignmentId){
  const slot = document.getElementById('asgViewSlot');
  slot.innerHTML = '<div class="card muted">Loading…</div>';
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/assignments/' + encodeURIComponent(assignmentId))
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(d => renderAssignmentContent(d.assignment, d.submissions || []))
    .catch(() => { slot.innerHTML = '<div class="error-banner">Could not load assignment content.</div>'; });

      ? '<div class="ac-opts">' + q.options.map(o => '<div>' + esc(o) + '</div>').join('') + '</div>'

    return `<li>
      <div class="ac-q"><strong>${esc(q.question || '')}</strong> ${marks}</div>

    const items = submissions.map(s => {

      const answersHtml = Array.isArray(s.answers) && Array.isArray(s.perQuestion) && a.content && Array.isArray(a.content.questions)

                const ans = (s.answers.find(x => x.qIdx === i) || {}).value || '';

              }).join('')}
            </ol>
          </details>`
        : '';
      return `<li style="padding:14px 0;border-bottom:1px solid #2f3336;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
          <div><strong>${esc(s.studentName || 'Student')}</strong> ${band}<div class="assign-meta">${esc(s.studentEmail || '')}</div></div>
          <div style="font-weight:700;color:#e7e9ea;">${esc(score)}</div>
        </div>
        ${answersHtml}
      </li>`;
    }).join('');
    subsHtml = `<div class="card" style="margin-top:14px;">
      <div class="section-title" style="margin:0 0 12px;">Submissions (${submissions.length})</div>
      <ul style="list-style:none;">${items}</ul>
    </div>`;
  } else {
    subsHtml = `<div class="card muted" style="margin-top:14px;">No submissions yet.</div>`;
  }

  slot.innerHTML = `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="section-title" style="margin:0;">${esc(a.title)} — content preview</div>
      <button class="btn-ghost" id="asgViewClose" style="font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;">Close</button>
    </div>
    ${body}
  </div>${a.type !== 'deck' ? subsHtml : ''}`;
  document.getElementById('asgViewClose').addEventListener('click', () => { slot.innerHTML = ''; });
}

function escMultiline(s){
  return esc(s).replace(/\n/g, '<br>');
}

// Parse an AI-decoded syllabus body (emoji-headed sections) into stacked
// cards. Returns null if there are no recognised emoji headers so the
// caller can fall back to plain text. Mirrors the renderSyllabusCards
// function in student-assignments.html — kept in sync deliberately.
const SD_TEACHER_CARD_COLORS = {
  '📌':'#a78bfa', '🧠':'#f472b6', '📖':'#4f8cff', '✍️':'#fbbf24',
  '💡':'#facc15', '🎯':'#22c55e', '📊':'#38bdf8', '🔑':'#f59e0b',
  '⚡':'#fbbf24', '✅':'#22c55e', '🔥':'#ef4444', '⭐':'#fde047'
};
const SD_TEACHER_SECTION_RE = /^(📌|🧠|📖|✍️|💡|🎯|📊|🔑|⚡|✅|🔥|⭐)/u;
function renderSyllabusCardsTeacher(text){
  if (!text) return null;
  const lines = String(text).split('\n');
  const sections = []; let current = null;
  for (const line of lines){
    const m = line.match(SD_TEACHER_SECTION_RE);
    if (m){
      if (current) sections.push(current);
      const title = line.slice(m[1].length).trim().replace(/\*\*/g, '').replace(/:$/, '').trim();
      current = { icon: m[1], title: title || 'Section', body: [] };
    } else {
      if (!current) current = { icon: '📋', title: 'Decoded', body: [] };
      current.body.push(line);
    }
  }
  if (current) sections.push(current);
  if (!sections.length || (sections.length === 1 && sections[0].icon === '📋')) return null;
  const inline = s => esc(s).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>');
  function fmtBody(bodyLines){
    let html = ''; let listBuf = []; let listType = null;
    const flush = () => { if (listBuf.length){ html += `<${listType}>${listBuf.join('')}</${listType}>`; listBuf = []; listType = null; } };
    for (const raw of bodyLines){
      const t = raw.trim();
      if (!t){ flush(); continue; }
      const bullet = t.match(/^[•\-\*]\s+(.+)$/);
      const num = t.match(/^(\d+)[.)]\s+(.+)$/);
      if (bullet){ if (listType === 'ol') flush(); listType = 'ul'; listBuf.push(`<li>${inline(bullet[1])}</li>`); }
      else if (num){ if (listType === 'ul') flush(); listType = 'ol'; listBuf.push(`<li>${inline(num[2])}</li>`); }
      else { flush(); html += `<p>${inline(t)}</p>`; }
    }
    flush();
    return html;
  }
  return '<div class="syllabus-cards">' + sections.map(sec => {
    const color = SD_TEACHER_CARD_COLORS[sec.icon] || '#4f8cff';
    return `<div class="syllabus-card" style="--card-color:${color};">
      <div class="syllabus-card-header">
        <div class="syllabus-card-icon">${sec.icon}</div>
        <div class="syllabus-card-title">${esc(sec.title)}</div>
      </div>
      <div class="syllabus-card-body">${fmtBody(sec.body) || '<p style="color:#71767b;font-style:italic;">No content.</p>'}</div>
    </div>`;
  }).join('') + '</div>';
}

function deleteAssignment(assignmentId, title){
  if (!confirm('Delete assignment "' + title + '"? Students will no longer see it.')) return;
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/assignments/' + encodeURIComponent(assignmentId), {
    method: 'DELETE'
  })
    .then(async r => {
      if (!r.ok){
        const d = await r.json().catch(()=>({}));
        alert(d.error || 'Could not delete assignment.');
        return;
      }
      refreshAssignmentList();
    })
    .catch(() => alert('Network error.'));
}

function createAssignment(){
  const type = document.getElementById('asgType').value;
  const title = document.getElementById('asgTitle').value.trim();
  // Module is either a <select> (dropdown for subjects that have modules
  // listed) or a plain <input>. When the dropdown's "Other" option is
  // picked, read from the adjacent custom text input instead.
  const modSel = document.getElementById('asgModule');
  let module = '';
  if (modSel && modSel.tagName === 'SELECT') {
    if (modSel.value === '__custom__') {
      const cust = document.getElementById('asgModuleCustom');
      module = cust ? cust.value.trim() : '';
    } else {
      module = modSel.value;
    }
  } else if (modSel) {
    module = modSel.value.trim();
  }
  const difficulty = document.getElementById('asgDifficulty').value;
  const count = parseInt(document.getElementById('asgCount').value, 10) || 6;
  const instructions = document.getElementById('asgInstructions').value.trim();
  const dueAt = document.getElementById('asgDue').value;
  const errSlot = document.getElementById('asgErr');
  errSlot.innerHTML = '';
  if (!title){ errSlot.innerHTML = '<div class="error-banner">Title is required.</div>'; return; }
  if (!module){ errSlot.innerHTML = '<div class="error-banner">Pick a module so the AI knows what to generate.</div>'; return; }
  const btn = document.getElementById('asgCreate');
  btn.disabled = true; btn.textContent = 'Generating content (10-20s)…';
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/assignments', {
    method:'POST',
    body: JSON.stringify({ type, title, module, difficulty, count, instructions: instructions || null, dueAt: dueAt || null })
  })
    .then(async r => {
      const d = await r.json().catch(()=>({}));
      btn.disabled = false; btn.textContent = 'Generate & assign';
      if (!r.ok){ errSlot.innerHTML = '<div class="error-banner">' + esc(d.error || 'Could not create assignment.') + '</div>'; return; }
      document.getElementById('asgTitle').value = '';
      document.getElementById('asgModule').value = '';
      document.getElementById('asgInstructions').value = '';
      document.getElementById('asgDue').value = '';
      refreshAssignmentList();
    })
    .catch(() => {
      btn.disabled = false; btn.textContent = 'Generate & assign';
      errSlot.innerHTML = '<div class="error-banner">Network error. Please try again.</div>';
    });
}

// Calls the existing syllabus chat endpoint with the class subject + chosen
// module so the teacher gets the same breakdown they'd see in the consumer
// Syllabus Decoder — fills it straight into the post body.
function decodeForPost() {
  const subject = state.classSubject;
  const modSel = document.getElementById('postModule');
  let module = '';
  if (modSel && modSel.tagName === 'SELECT') {
    module = modSel.value === '__custom__' ? (document.getElementById('postModuleCustom')||{}).value || '' : modSel.value;
  } else if (modSel) {
    module = modSel.value;
  }
  const status = document.getElementById('postDecodeStatus');
  const btn = document.getElementById('postDecodeBtn');
  if (!subject) { status.innerHTML = '<span style="color:#ff8088;">Class has no subject set.</span>'; return; }
  if (!module || !module.trim()) { status.innerHTML = '<span style="color:#fcd34d;">Pick a module first.</span>'; return; }
  status.textContent = 'Decoding (10-20s)…';
  btn.disabled = true;
  const subjectName = subjectDisplayName(subject);
  const messages = [{
    role: 'user',
    content: `Give me a clear breakdown of the ${subjectName} module "${module}" for my students. Cover: what the syllabus actually says, key concepts/skills they need to know, and how this appears in exams. Plain English, dot points where useful.`
  }];
  api('/api/chat/syllabus', { method: 'POST', body: JSON.stringify({ messages, subject, detailLevel: 3 }) })
    .then(async r => {
      btn.disabled = false;
      if (!r.ok) {
        const d = await r.json().catch(()=>({}));
        status.innerHTML = '<span style="color:#ff8088;">' + esc(d.error || 'Could not decode. Try again.') + '</span>';
        return;
      }
      const d = await r.json();
      const reply = (d.reply || '').replace(/\*\*(.*?)\*\*/g, '$1');
      document.getElementById('postBody').value = reply;
      const titleEl = document.getElementById('postTitle');
      if (!titleEl.value.trim()) titleEl.value = subject + ' — ' + module + ' decoded';
      status.innerHTML = '<span style="color:#86efac;">✓ Decoded. Edit the body below before posting.</span>';
    })
    .catch(() => {
      btn.disabled = false;
      status.innerHTML = '<span style="color:#ff8088;">Network error. Try again.</span>';
    });
}

function refreshPostList(){
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/posts')
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(d => renderPostList(d.posts || []))
    .catch(() => { document.getElementById('postListSlot').innerHTML = '<div class="error-banner">Could not load posts.</div>'; });
}

function renderPostList(posts){
  const slot = document.getElementById('postListSlot');
  if (!posts.length){ slot.innerHTML = '<div class="card muted">No posts yet for this class.</div>'; return; }
  const KIND_LABEL = { syllabus: '📖 Syllabus', note: '📝 Note', announcement: '📣 Announcement' };
  slot.innerHTML = `<div class="card"><div class="section-title" style="margin-bottom:14px;">Posts</div><ul class="assign-list">` + posts.map(p => {
    // Render syllabus posts as decoded cards (same look as the student view).
    const cards = p.kind === 'syllabus' ? renderSyllabusCardsTeacher(p.body || '') : null;
    const bodyHtml = cards || `<div class="assign-instr" style="white-space:pre-wrap;">${escMultiline(p.body || '')}</div>`;
    return `
    <li>
      <div style="flex:1;min-width:0;">
        <div><span class="badge">${esc(KIND_LABEL[p.kind] || p.kind || 'Post')}</span> &nbsp;<strong>${esc(p.title)}</strong></div>
        ${bodyHtml}
        ${p.source ? `<div class="assign-meta">🔗 <a href="${esc(p.source)}" target="_blank" rel="noopener" style="color:#4f8cff;">${esc(p.source)}</a></div>` : ''}
        <div class="assign-meta">Posted ${esc(fmtDate(p.createdAt))}${p.module ? ' · ' + esc(p.module) : ''}</div>
      </div>
      <div style="flex-shrink:0;">
        <button class="btn-danger post-del" data-id="${esc(p.postId)}" data-title="${esc(p.title)}" style="font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;">Delete</button>
      </div>
    </li>
  `;
  }).join('') + '</ul></div>';
  slot.querySelectorAll('.post-del').forEach(btn => btn.addEventListener('click', () => deletePost(btn.dataset.id, btn.dataset.title)));
}

function createPost(){
  const kind = document.getElementById('postKind').value;
  const title = document.getElementById('postTitle').value.trim();
  const body = document.getElementById('postBody').value.trim();
  // Module can be a <select> (with optional custom override) or a plain input.
  const modSel = document.getElementById('postModule');
  let module = '';
  if (modSel && modSel.tagName === 'SELECT') {
    module = modSel.value === '__custom__' ? (document.getElementById('postModuleCustom')||{}).value || '' : modSel.value;
  } else if (modSel) {
    module = modSel.value;
  }
  module = (module || '').trim();
  const source = document.getElementById('postSource').value.trim();
  const errSlot = document.getElementById('postErr');
  errSlot.innerHTML = '';
  if (!title || !body){ errSlot.innerHTML = '<div class="error-banner">Title and body are required.</div>'; return; }
  const btn = document.getElementById('postCreate');
  btn.disabled = true; btn.textContent = 'Posting…';
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/posts', {
    method: 'POST',
    body: JSON.stringify({ kind, title, body, module: module || null, source: source || null })
  })
    .then(async r => {
      const d = await r.json().catch(()=>({}));
      btn.disabled = false; btn.textContent = 'Post to class';
      if (!r.ok){ errSlot.innerHTML = '<div class="error-banner">' + esc(d.error || 'Could not post.') + '</div>'; return; }
      document.getElementById('postTitle').value = '';
      document.getElementById('postBody').value = '';
      if (modSel) {
        if (modSel.tagName === 'SELECT') modSel.value = '';
        else modSel.value = '';
        const cust = document.getElementById('postModuleCustom');
        if (cust) { cust.value = ''; cust.style.display = 'none'; }
      }
      document.getElementById('postSource').value = '';
      refreshPostList();
    })
    .catch(() => { btn.disabled = false; btn.textContent = 'Post to class'; errSlot.innerHTML = '<div class="error-banner">Network error. Please try again.</div>'; });
}

function deletePost(postId, title){
  if (!confirm('Delete post "' + title + '"? Students will no longer see it.')) return;
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/posts/' + encodeURIComponent(postId), { method: 'DELETE' })
    .then(async r => { if (!r.ok){ const d = await r.json().catch(()=>({})); alert(d.error || 'Could not delete.'); return; } refreshPostList(); })
    .catch(() => alert('Network error.'));
}

/* ----- PROGRESS ----- */
let progressCache = [];
function loadProgress(){
  api('/api/teacher/classes/' + encodeURIComponent(state.classId) + '/progress')
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(d => { progressCache = d.students || []; renderProgress(progressCache); })
    .catch(() => {
      document.getElementById('tabSlot').innerHTML = '<div class="error-banner">Could not load class progress.</div>';
    });
}

function renderProgress(students){
  const slot = document.getElementById('tabSlot');
  if (!students.length){
    slot.innerHTML = '<div class="card empty-state"><h3>No progress yet</h3><p>Once students join and start studying, their mastery will show here.</p></div>';
    return;
  }
  const withAvg = students.filter(s => s.summary && s.summary.average != null);
  const classAvg = withAvg.length ? withAvg.reduce((a,s) => a + s.summary.average, 0) / withAvg.length : null;
  const totalWeak = students.reduce((a,s) => a + ((s.summary && s.summary.weak) || 0), 0);
  const totalStrong = students.reduce((a,s) => a + ((s.summary && s.summary.strong) || 0), 0);

  const rows = students.map(s => {
    const avg = s.summary ? s.summary.average : null;
    const weak = (s.summary && s.summary.weak) || 0;
    const strong = (s.summary && s.summary.strong) || 0;
    const barW = avg == null ? 0 : Math.round(avg * 100);
    return `<div class="progress-row">
      <div class="pname"><button class="link-inline" data-pstudent="${esc(s.userId)}" data-pname="${esc(s.name)}">${esc(s.name)}</button></div>
      <div class="bar"><span style="width:${barW}%"></span></div>
      <div class="muted" style="min-width:48px;">${avg == null ? '—' : pct(avg)}</div>
      <div class="muted"><span class="dot dot-red"></span>${weak} weak &nbsp; <span class="dot dot-green"></span>${strong} strong</div>
    </div>`;
  }).join('');

  slot.innerHTML = `
    <div class="card">
      <div class="section-title" style="margin-bottom:14px;">Class overview</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="num">${students.length}</div><div class="lbl">Students</div></div>
        <div class="stat-box"><div class="num">${classAvg == null ? '—' : pct(classAvg)}</div><div class="lbl">Avg class mastery</div></div>
        <div class="stat-box"><div class="num">${totalWeak}</div><div class="lbl">Weak dot points</div></div>
        <div class="stat-box"><div class="num">${totalStrong}</div><div class="lbl">Strong dot points</div></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title" style="margin-bottom:8px;">Per-student progress</div>
      ${rows}
    </div>`;

  slot.querySelectorAll('[data-pstudent]').forEach(b => b.addEventListener('click', () => {
    state.studentView = { userId: b.dataset.pstudent, name: b.dataset.pname };
    renderClassShell();
  }));
}

/* ----- PER-STUDENT MASTERY HEATMAP ----- */
function renderStudentMastery(){
  const slot = document.getElementById('tabSlot');
  slot.innerHTML = '<div class="card muted">Loading mastery map…</div>';
  api('/api/mastery/' + encodeURIComponent(state.studentView.userId))
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(d => drawHeatmap(d))
    .catch(() => {
      slot.innerHTML = `
        <div class="card">
          <button class="link-inline" id="backFromStudent">← Back to ${esc(state.tab)}</button>
          <div class="error-banner" style="margin-top:12px;">Could not load this student's mastery map.</div>
        </div>`;
      const b = document.getElementById('backFromStudent');
      if (b) b.addEventListener('click', () => { state.studentView = null; renderClassShell(); });
    });
}

function drawHeatmap(d){
  const slot = document.getElementById('tabSlot');
  const student = d.student || state.studentView;
  const mastery = d.mastery || {};
  const summary = d.summary || {};
  let body = '';
  const subjects = Object.keys(mastery);
  if (!subjects.length){
    body = '<div class="card muted">No mastery data recorded for this student yet.</div>';
  } else {
    body = subjects.map(subj => {
      const modules = mastery[subj] || {};
      const modBlocks = Object.keys(modules).map(mod => {
        let entries = modules[mod];
        // entries may be an array of {dotPointRef,score,band} OR an object map dotPointRef->score
        if (!Array.isArray(entries)){
          entries = Object.keys(entries).map(ref => ({ dotPointRef: ref, score: entries[ref] }));
        }
        const tiles = entries.map(e => {
          const score = Number(e.score) || 0;
          const band = e.band || bandFromScore(score);
          return `<div class="tile ${bandClass(band)}" title="${esc(e.dotPointRef)} — ${pct(score)}">
            <span class="ref">${esc(e.dotPointRef)}</span>
            <span class="pct">${pct(score)}</span>
          </div>`;
        }).join('');
        return `<div class="heat-module"><h4>${esc(mod)}</h4><div class="heat-grid">${tiles}</div></div>`;
      }).join('');
      return `<div class="heat-subject">${esc(subj)}</div>${modBlocks}`;
    }).join('');
  }

  slot.innerHTML = `
    <div class="card">
      <div class="row-between" style="margin-bottom:6px;">
        <div>
          <button class="link-inline" id="backFromStudent">← Back to ${esc(state.tab)}</button>
          <div class="section-title" style="margin-top:6px;">${esc(student.name || 'Student')} — mastery map</div>
        </div>
      </div>
      <div class="muted">Last active ${esc(fmtDate(student.lastActive))}</div>
      <div class="stat-grid" style="margin-top:14px;">
        <div class="stat-box"><div class="num">${summary.average == null ? '—' : pct(summary.average)}</div><div class="lbl">Avg mastery</div></div>
        <div class="stat-box"><div class="num">${summary.dotPoints || 0}</div><div class="lbl">Dot points tracked</div></div>
        <div class="stat-box"><div class="num">${summary.weak || 0}</div><div class="lbl">Weak</div></div>
        <div class="stat-box"><div class="num">${summary.strong || 0}</div><div class="lbl">Strong</div></div>
      </div>
    </div>
    <div class="card">${body}</div>`;

  document.getElementById('backFromStudent').addEventListener('click', () => {
    state.studentView = null; renderClassShell();
  });
}

/* ===================== INIT ===================== */
function wireAccountMenu(user){
  const btn = document.getElementById('acctBtn');
  const menu = document.getElementById('acctMenu');
  document.getElementById('acctEmail').textContent = user.email || 'Account';
  document.getElementById('acctMenuName').textContent = user.name || user.email || '—';
  // Plan + expiry summary so the teacher can see what they're cancelling.
  const tierLabel = ({ junior:'Junior', senior:'Senior', both:'Combined' })[user.teacherTier] || user.teacherTier || '—';
  const exp = user.teacherExpiresAt ? new Date(user.teacherExpiresAt).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }) : '';
  const cancelling = user.cancelAtPeriodEnd;
  document.getElementById('acctMenuPlan').innerHTML = 'Teacher seat: <strong>' + esc(tierLabel) + '</strong>' + (exp ? ' · ' + (cancelling ? 'ends ' : 'renews ') + esc(exp) : '');

  function closeMenu() { menu.style.display = 'none'; }
  function openMenu() { menu.style.display = 'block'; }
  btn.addEventListener('click', e => {
    e.stopPropagation();
    menu.style.display === 'block' ? closeMenu() : openMenu();
  });
  // Touch + click + escape close handlers — touch needed for iOS where
  // outside-tap doesn't always synthesize a click.
  document.addEventListener('click', closeMenu);
  document.addEventListener('touchstart', e => { if (!menu.contains(e.target) && e.target !== btn) closeMenu(); }, { passive: true });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
  menu.addEventListener('click', e => e.stopPropagation());

  document.getElementById('acctSignout').addEventListener('click', () => {
    if (!confirm('Sign out of Study Decoder?')) return;
    api('/api/logout', { method: 'POST' })
      .then(() => { window.location.href = '/login.html'; })
      .catch(() => { window.location.href = '/login.html'; });
  });

  document.getElementById('acctCancel').addEventListener('click', () => {
    const cancelBtn = document.getElementById('acctCancel');
    if (cancelling) {
      alert('Your teacher seat is already set to cancel at the end of the billing period.');
      return;
    }
    if (!confirm('Cancel your teacher seat? You\'ll keep full access until the end of your current billing period — after that your linked students revert to the free tier. Their progress is kept.')) return;
    const orig = cancelBtn.textContent;
    cancelBtn.disabled = true; cancelBtn.textContent = 'Cancelling…';
    api('/api/teacher/cancel', { method: 'POST' })
      .then(async r => {
        const d = await r.json().catch(() => ({}));
        cancelBtn.disabled = false; cancelBtn.textContent = orig;
        if (!r.ok) { alert(d.error || 'Could not cancel.'); return; }
        alert(d.message || 'Your teacher seat will end at the close of the current billing period.');
        location.reload();
      })
      .catch(() => {
        cancelBtn.disabled = false; cancelBtn.textContent = orig;
        alert('Network error. Please try again.');
      });
  });
}

(function init(){
  api('/api/subscription')
    .then(r => {
      if (!r.ok || r.status === 401){
        window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
        return null;
      }
      return r.json();
    })
    .then(d => {
      if (!d) return;
      if (d.role !== 'teacher'){
        window.location.href = 'teacher-pricing.html';
        return;
      }
      currentUser = d;
      wireAccountMenu(d);
      showList();
      document.getElementById('authLoading').classList.add('hidden');
      document.getElementById('appContainer').classList.remove('hidden');
    })
    .catch(() => {
      window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
    });
})();
</script>
