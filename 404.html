<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Page Not Found — Study Decoder</title>
    <meta name="description" content="The page you were looking for couldn't be found. Head back to Study Decoder to keep practising HSC and Years 7–10 syllabus content with AI.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.studydecoder.com.au/404.html">
    <meta property="og:title" content="Page Not Found — Study Decoder">
    <meta property="og:description" content="The page you were looking for couldn't be found.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.studydecoder.com.au/404.html">
    <meta property="og:image" content="https://www.studydecoder.com.au/logo.png">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        :root {
            --bg: #0e0c18;
            --fg: #f5f1e8;
            --muted: #aaa39a;
            --accent: #6C63FF;
            --accent-2: #FF6584;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.5;
        }
        .card {
            max-width: 560px;
            text-align: center;
        }
        .badge {
            display: inline-block;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 24px;
        }
        h1 {
            font-size: clamp(40px, 8vw, 72px);
            line-height: 1.05;
            margin: 0 0 16px 0;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p {
            color: var(--muted);
            font-size: 17px;
            margin: 0 0 28px 0;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a.btn {
            display: inline-block;
            padding: 12px 22px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.15s ease;
        }
        a.btn:hover { transform: translateY(-2px); }
        a.btn-primary {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #fff;
        }
        a.btn-secondary {
            border: 1px solid rgba(255,255,255,0.18);
            color: var(--fg);
        }
        .links {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 14px;
            color: var(--muted);
        }
        .links a {
            color: var(--fg);
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <main class="card">
        <div class="badge">Error 404</div>
        <h1>Page not found</h1>
        <p>The page you were looking for doesn't exist or has moved. Try one of the links below to get back on track.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/">Back to home</a>
            <a class="btn btn-secondary" href="/learn">Browse the syllabus</a>
        </div>
        <nav class="links" aria-label="Helpful links">
            <a href="/practice.html">Practice</a>
            <a href="/chat-tutor.html">AI Tutor</a>
            <a href="/flashcards.html">Flashcards</a>
            <a href="/blog/">Blog</a>
            <a href="/contact.html">Contact</a>
        </nav>
    </main>
</body>
</html>
