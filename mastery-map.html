<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mastery Map | Study Decoder</title>
<meta name="description" content="Your syllabus heatmap — see which dot points are solid and which need more work.">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; width:100%; font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--tool-bg); color:#e7e9ea; }
.app-container { display:flex; flex-direction:column; min-height:100vh; width:100%; overflow-x:hidden; }
.header { background:var(--tool-surface); border-bottom:1px solid #2f3336; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.header-left { display:flex; align-items:center; gap:16px; }
.back-btn { color:#4f8cff; text-decoration:none; font-size:14px; font-weight:500; padding:8px 16px; border-radius:8px; background:rgba(79,140,255,0.1); }
.header-title { font-size:20px; font-weight:700; }
.header-subtitle { font-size:12px; color:#71767b; margin-top:2px; }
.main-content { flex:1; padding:32px 24px; }
.container { max-width:980px; margin:0 auto; }
.card { background:var(--tool-surface); border:1px solid #2f3336; border-radius:16px; padding:24px; margin-bottom:20px; }
.btn { background:linear-gradient(135deg,#4f8cff,#6c63ff); color:var(--tool-ink); border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; }
.btn:hover:not(:disabled) { transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-ghost { background:var(--tool-surface); color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); }
.btn-danger { background:rgba(220,53,69,0.15); color:#ff8088; border:1px solid rgba(220,53,69,0.4); }
.form-input,.form-select,textarea { background:var(--tool-bg); border:1px solid #2f3336; border-radius:8px; padding:12px 14px; color:#e7e9ea; font-size:14px; font-family:inherit; width:100%; }
.form-input:focus,.form-select:focus,textarea:focus { outline:none; border-color:#4f8cff; }
.form-label { font-size:13px; font-weight:500; color:#c8ccd0; display:block; margin-bottom:6px; }
.form-group { margin-bottom:16px; }
.auth-loading-overlay { position:fixed; inset:0; background:var(--tool-bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.auth-spinner { width:50px; height:50px; border:4px solid #2f3336; border-top-color:#4f8cff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
.error-banner { background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.4); color:#ff8088; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
.loading { display:flex; align-items:center; gap:10px; color:#71767b; padding:20px 0; justify-content:center; }
.loading-dots { display:flex; gap:4px; }
.loading-dots span { width:8px; height:8px; background:#4f8cff; border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
.loading-dots span:nth-child(1){animation-delay:-0.32s;} .loading-dots span:nth-child(2){animation-delay:-0.16s;}
@keyframes bounce { 0%,80%,100%{transform:scale(0);} 40%{transform:scale(1);} }
@media (max-width:720px){ .main-content{padding:16px;} }
/* page-specific */
.stat-row { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px; }
.stat-box { flex:1; min-width:140px; background:var(--tool-surface); border:1px solid #2f3336; border-radius:14px; padding:18px; text-align:center; }
.stat-box .num { font-size:28px; font-weight:700; }
.stat-box .lbl { font-size:12px; color:#71767b; margin-top:4px; }
.subject-block { margin-bottom:8px; }
.subject-name { font-size:17px; font-weight:700; margin:18px 0 4px; }
.module-name { font-size:14px; font-weight:600; color:#c8ccd0; margin:14px 0 8px; }
.heat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
.tile { border-radius:10px; padding:12px; cursor:pointer; transition:transform .12s; border:1px solid; }
.tile:hover { transform:translateY(-2px); }
.tile-ref { font-size:12px; line-height:1.4; margin-bottom:8px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
.tile-score { font-size:20px; font-weight:700; }
.focus-btn { margin-top:8px; font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; background:rgba(var(--tool-ink-rgb),0.08); color:#e7e9ea; border:none; cursor:pointer; }
.panel { background:var(--tool-bg); border:1px solid #4f8cff; border-radius:12px; padding:16px; margin-top:12px; }
.panel h4 { font-size:14px; margin-bottom:6px; }
.panel .desc { font-size:13px; color:#aab0b6; line-height:1.55; margin-bottom:12px; }
.panel ul { list-style:none; margin-bottom:14px; }
.panel li { font-size:13px; color:#c8ccd0; padding:6px 0 6px 16px; position:relative; line-height:1.5; border-bottom:1px solid #1d2530; }
.panel li:last-child { border-bottom:none; }
.panel li:before { content:""; position:absolute; left:0; top:12px; width:7px; height:7px; border-radius:50%; }
.panel li.weak:before { background:#ef4444; }
.panel li.medium:before { background:#eab308; }
.panel li .pct { color:#71767b; }
.legend { display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:#71767b; margin-top:14px; }
.legend span { display:flex; align-items:center; gap:6px; }
.legend i { width:12px; height:12px; border-radius:3px; display:inline-block; border:1px solid; }
.empty-state { text-align:center; color:#71767b; padding:30px 20px; }
.muted { color:#71767b; font-size:13px; }
</style>
<script>(function(){try{var t=localStorage.getItem('sd_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="authLoading" class="auth-loading-overlay"><div class="auth-spinner"></div><div style="margin-top:16px;color:#71767b;">Loading…</div></div>
<div class="app-container hidden" id="appContainer">
  <header class="header">
    <div class="header-left">
      <a href="flashcards.html" class="back-btn">← Flashcards</a>
      <div><div class="header-title">Mastery Map</div><div class="header-subtitle">Your syllabus heatmap — green is solid, red needs work.</div></div>
    </div>
  </header>
  <main class="main-content"><div class="container" id="root"></div></main>
</div>
<script src="auth.js"></script>
<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
function api(path, opts){ return fetch(API_BASE+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts||{})); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const root = document.getElementById('root');
const BANDS = {
  strong: { bg:'rgba(34,197,94,0.22)',  border:'#22c55e', text:'#4ade80' },
  medium: { bg:'rgba(234,179,8,0.18)',  border:'#eab308', text:'#facc15' },
  weak:   { bg:'rgba(239,68,68,0.18)',  border:'#ef4444', text:'#f87171' },
  none:   { bg:'rgba(255,255,255,0.04)',border:'#2f3336', text:'#71767b' }
};
function bandOf(b){ return BANDS[b] || BANDS.none; }

let MASTERY = {};
let SUMMARY = {};
let openPanel = null; // "subject||module"

function pct(n){ return Math.round((n||0)*100) + '%'; }

function render(){
  const subjects = Object.keys(MASTERY);
  if (!subjects.length){
    root.innerHTML = `
      <div class="card empty-state">
        <div style="font-size:18px;font-weight:700;color:#e7e9ea;margin-bottom:8px;">No mastery data yet</div>
        <div class="muted" style="margin-bottom:18px;">Review some conversational flashcards first — every answer you give updates this heatmap, dot point by dot point.</div>
        <a class="btn" href="flashcards.html">Go to flashcards</a>
      </div>`;
    return;
  }

  const s = SUMMARY || {};
  let html = `
    <div class="stat-row">
      <div class="stat-box"><div class="num">${pct(s.average)}</div><div class="lbl">Overall mastery</div></div>
      <div class="stat-box"><div class="num">${s.dotPoints!=null?s.dotPoints:0}</div><div class="lbl">Dot points tracked</div></div>
      <div class="stat-box"><div class="num" style="color:${BANDS.strong.text}">${s.strong!=null?s.strong:0}</div><div class="lbl">Strong</div></div>
      <div class="stat-box"><div class="num" style="color:${BANDS.weak.text}">${s.weak!=null?s.weak:0}</div><div class="lbl">Weak</div></div>
    </div>
  `;

  subjects.forEach(subject => {
    html += `<div class="subject-block"><div class="subject-name">${esc(subject)}</div>`;
    const modules = MASTERY[subject] || {};
    Object.keys(modules).forEach(module => {
      const dps = modules[module] || [];
      const key = subject + '||' + module;
      html += `<div class="module-name">${esc(module)}</div>`;
      html += `<div class="heat-grid">`;
      dps.forEach((dp, i) => {
        const b = bandOf(dp.band);
        const needsWork = dp.band === 'weak' || dp.band === 'medium';
        html += `
          <div class="tile" data-key="${esc(key)}" style="background:${b.bg};border-color:${b.border};">
            <div class="tile-ref" title="${esc(dp.dotPointRef)}" style="color:${b.text};">${esc(dp.dotPointRef)}</div>
            <div class="tile-score" style="color:${b.text};">${pct(dp.score)}</div>
            ${needsWork ? `<button class="focus-btn" data-focus="${esc(key)}">Focus review</button>` : ''}
          </div>`;
      });
      html += `</div>`;
      if (openPanel === key) html += renderPanel(subject, module, dps);
    });
    html += `</div>`;
  });

  html += `
    <div class="legend">
      <span><i style="background:${BANDS.strong.bg};border-color:${BANDS.strong.border};"></i> Strong</span>
      <span><i style="background:${BANDS.medium.bg};border-color:${BANDS.medium.border};"></i> Medium</span>
      <span><i style="background:${BANDS.weak.bg};border-color:${BANDS.weak.border};"></i> Weak</span>
      <span><i style="background:${BANDS.none.bg};border-color:${BANDS.none.border};"></i> No data</span>
    </div>`;

  root.innerHTML = html;

  root.querySelectorAll('.tile').forEach(t => {
    t.addEventListener('click', e => {
      if (e.target.classList.contains('focus-btn')) return;
      togglePanel(t.dataset.key);
    });
  });
  root.querySelectorAll('.focus-btn').forEach(b => {
    b.addEventListener('click', e => { e.stopPropagation(); togglePanel(b.dataset.focus); });
  });
}

function renderPanel(subject, module, dps){
  const focus = dps.filter(d => d.band === 'weak' || d.band === 'medium')
                   .sort((a,b) => (a.score||0) - (b.score||0));
  const items = focus.length
    ? focus.map(d => `<li class="${esc(d.band)}">${esc(d.dotPointRef)} <span class="pct">— ${pct(d.score)}</span></li>`).join('')
    : '<li>Nothing weak here — this module is looking solid.</li>';
  return `
    <div class="panel">
      <h4>Focus review · ${esc(module)}</h4>
      <div class="desc">Generate or open a deck covering these dot points to drill them. These are the weak and medium dot points in this module:</div>
      <ul>${items}</ul>
      <a class="btn" href="flashcards.html?subject=${encodeURIComponent(subject)}">Start a focused review →</a>
    </div>`;
}

function togglePanel(key){
  openPanel = (openPanel === key) ? null : key;
  render();
  if (openPanel){
    const p = root.querySelector('.panel');
    if (p) p.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

(function init(){
  api('/api/subscription')
    .then(r => {
      if (!r.ok || r.status === 401){ location.href = 'login.html?redirect='+encodeURIComponent(location.pathname); return null; }
      return api('/api/mastery');
    })
    .then(r => {
      if (r === null) return null;
      return r.json().then(d => ({ ok:r.ok, d }));
    })
    .then(res => {
      if (res === null) return;
      document.getElementById('authLoading').classList.add('hidden');
      document.getElementById('appContainer').classList.remove('hidden');
      if (!res.ok) throw new Error((res.d && res.d.error) || 'Could not load your mastery data.');
      MASTERY = (res.d && res.d.mastery) || {};
      SUMMARY = (res.d && res.d.summary) || {};
      render();
    })
    .catch(err => {
      const al = document.getElementById('authLoading');
      if (al && !al.classList.contains('hidden')){
        location.href = 'login.html?redirect='+encodeURIComponent(location.pathname);
        return;
      }
      root.innerHTML = '<div class="error-banner">'+esc(err.message||'Something went wrong.')+'</div>';
    });
})();
</script>
<script src="theme.js"></script>
</body>
</html>
