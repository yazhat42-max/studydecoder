    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #2A2A2A;
            --accent: #FF6584;
            --game: #10b981;
            --breakdown: #f59e0b;
            --light-bg: #F9F9FB;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--light-bg); color: var(--secondary); min-height: 100vh; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: var(--white);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { height: 38px; }
        .logo span { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 0.6rem 1.4rem; border-radius: 50px; text-decoration: none;
            font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: var(--transition); border: none;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(108,99,255,0.3); }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: #fff; }

        /* Hook screen — full-screen, visible to everyone */
        .hook-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: calc(100vh - 70px); padding: 40px 20px; text-align: center;
        }
        .hook-screen h1 {
            font-size: 2.2rem; font-weight: 700; max-width: 600px; line-height: 1.3;
            color: var(--secondary); margin-bottom: 40px;
        }
        .hook-screen h1 em {
            font-style: normal;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hook-start-btn {
            padding: 18px 60px; border: none; border-radius: 50px;
            font-size: 1.15rem; font-weight: 700; cursor: pointer; transition: var(--transition);
            color: #fff; background: linear-gradient(135deg, var(--primary), #8b7cf7);
            letter-spacing: 0.5px;
        }
        .hook-start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(108,99,255,0.4); }

        /* Onboard steps — centered single-field screens */
        .onboard-step {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            min-height: calc(100vh - 70px); padding: 40px 20px; text-align: center;
        }
        .onboard-step.active { display: flex; }
        .onboard-step h2 {
            font-size: 1.6rem; font-weight: 600; color: var(--secondary); margin-bottom: 24px;
        }
        .onboard-input {
            width: 100%; max-width: 420px; padding: 16px 20px; border: 2px solid #e8e8e8; border-radius: 14px;
            font-size: 16px; color: var(--secondary); transition: var(--transition);
            font-family: 'Poppins', sans-serif; text-align: center;
        }
        .onboard-input:focus { outline: none; border-color: var(--primary); }
        .onboard-next-btn {
            margin-top: 20px; padding: 14px 48px; border: none; border-radius: 50px;
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: var(--transition);
            color: #fff; background: linear-gradient(135deg, var(--primary), #8b7cf7);
            opacity: 0.4; pointer-events: none;
        }
        .onboard-next-btn.ready { opacity: 1; pointer-events: auto; }
        .onboard-next-btn.ready:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.35); }

        /* Main container (chat view) */
        .main-container { max-width: 900px; margin: 0 auto; padding: 30px 20px; display: none; }
        .main-container.active { display: block; }

        /* Chat area */
        .chat-container {
            background: var(--white); border-radius: var(--radius);
            box-shadow: var(--shadow); overflow: hidden; border: 1px solid rgba(0,0,0,0.04);
            display: block;
        }
        .chat-messages { height: 500px; overflow-y: auto; padding: 24px; background: linear-gradient(180deg, #fafbff 0%, #fff 100%); }
        .message { margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message-user {
            background: linear-gradient(135deg, var(--primary), #8b7cf7);
            color: #fff; padding: 14px 18px; border-radius: 16px 16px 4px 16px;
            margin-left: auto; max-width: 85%; width: fit-content;
        }
        .message-bot {
            background: #f0f2ff; border: 1px solid #e0e4ff;
            padding: 18px 20px; border-radius: 4px 16px 16px 16px; max-width: 95%;
        }
        .message-bot h2 { color: var(--primary); font-size: 16px; margin: 20px 0 12px 0; }
        .message-bot h2:first-child { margin-top: 0; }
        .message-bot h3 { color: var(--primary); font-size: 14px; margin: 16px 0 10px 0; }
        .message-bot p { margin-bottom: 10px; line-height: 1.65; color: #444; }
        .message-bot ul { margin: 8px 0 8px 18px; }
        .message-bot li { margin-bottom: 8px; color: #555; line-height: 1.5; }
        .message-bot strong { color: var(--primary); }

        /* Choice buttons */
        .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
        .choice-btn {
            padding: 14px 20px; border: 2px solid #e0e4ff; border-radius: 12px;
            background: #fff; cursor: pointer; font-size: 14px; font-weight: 500;
            color: var(--secondary); text-align: left; transition: var(--transition);
            font-family: 'Poppins', sans-serif; line-height: 1.5;
        }
        .choice-btn:hover { border-color: var(--primary); background: #f0f2ff; transform: translateX(4px); }
        .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .loading { display: flex; align-items: center; gap: 10px; color: #888; padding: 16px; }
        .loading-dots { display: flex; gap: 4px; }
        .loading-dots span {
            width: 8px; height: 8px; background: var(--primary); border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .input-panel { background: #fff; border-top: 1px solid #eee; padding: 20px 24px; }
        .input-form { display: flex; gap: 12px; }
        .chat-input {
            flex: 1; padding: 14px 18px; border: 2px solid #e8e8e8; border-radius: 12px;
            font-size: 14px; color: var(--secondary); resize: none;
            transition: var(--transition); font-family: 'Poppins', sans-serif;
        }
        .chat-input:focus { outline: none; border-color: var(--primary); }
        .chat-input:disabled { background: #f5f5f5; cursor: not-allowed; }
        .send-btn {
            background: linear-gradient(135deg, var(--primary), #8b7cf7);
            color: #fff; border: none; border-radius: 12px; padding: 14px 24px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition);
            white-space: nowrap;
        }
        .send-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.35); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .new-topic-btn {
            display: inline-block; margin-top: 16px; padding: 10px 20px;
            background: transparent; border: 2px solid var(--primary); border-radius: 50px;
            color: var(--primary); font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: var(--transition);
        }
        .new-topic-btn:hover { background: var(--primary); color: #fff; }

        /* Mode toggle (shown only after first session via New Topic) */
        .mode-toggle {
            display: flex; align-items: center; gap: 12px; margin-top: 12px;
        }
        .mode-toggle-label { font-size: 0.85rem; color: #888; font-weight: 500; }
        .mode-toggle-switch {
            padding: 6px 14px; border-radius: 50px; font-size: 0.8rem; font-weight: 600;
            border: 2px solid #e0e4ff; background: #fff; cursor: pointer;
            transition: var(--transition); color: var(--secondary);
        }
        .mode-toggle-switch.active-game { border-color: var(--game); color: var(--game); background: #ecfdf5; }
        .mode-toggle-switch.active-breakdown { border-color: var(--breakdown); color: var(--breakdown); background: #fffbeb; }

        @media (max-width: 768px) {
            .navbar { padding: 0.7rem 4%; }
            .logo span { font-size: 1.1rem; }
            .nav-right .btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
            .main-container { padding: 16px 10px; }

            .hook-screen h1 { font-size: 1.5rem; }
            .hook-start-btn { padding: 16px 48px; font-size: 1rem; }
            .onboard-step h2 { font-size: 1.3rem; }
            .onboard-input { font-size: 15px; padding: 14px 16px; }

            /* Chat fills available viewport */
            .chat-container {
                display: flex; flex-direction: column;
                height: calc(100vh - 130px);
                border-radius: 12px;
            }
            .chat-messages {
                height: unset; flex: 1; overflow-y: auto;
                padding: 14px;
            }
            .message-bot { max-width: 100%; padding: 14px; }
            .message-user { max-width: 90%; padding: 10px 14px; font-size: 0.9rem; }
            .choices { padding: 0 !important; }
            .choice-btn { padding: 12px 14px; font-size: 13px; }
            .input-panel { padding: 12px; }
            .input-form { flex-direction: column; gap: 8px; }
            .chat-input { font-size: 14px; padding: 10px 12px; }
            .send-btn { width: 100%; padding: 12px; }
            .new-topic-btn { font-size: 0.8rem; padding: 8px 16px; margin-top: 10px; }
        }
    </style>
</head>

        // Elements
        const hookScreen = document.getElementById('hookScreen');
        const stepSubject = document.getElementById('stepSubject');
        const stepTopic = document.getElementById('stepTopic');
        const mainContainer = document.getElementById('mainContainer');
        const chatContainer = document.getElementById('chatContainer');
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const subjectInput = document.getElementById('subjectInput');
        const topicInput = document.getElementById('topicInput');
        const userDisplay = document.getElementById('userDisplay');
        const choicesContainer = document.getElementById('choicesContainer');
        const subjectNextBtn = document.getElementById('subjectNextBtn');
        const topicNextBtn = document.getElementById('topicNextBtn');
        const modeToggle = document.getElementById('modeToggle');

        // Enable Next buttons on dropdown change
        subjectInput.addEventListener('change', () => {
            subjectNextBtn.classList.toggle('ready', subjectInput.value !== '');
            // Populate modules for selected subject
            topicInput.innerHTML = '<option value="">Select a module...</option>';
            topicNextBtn.classList.remove('ready');
            const topics = subjectTopics[subjectInput.value];
            if (topics) {
                topics.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    topicInput.appendChild(opt);
                });
            }
        });
        topicInput.addEventListener('change', () => {
            topicNextBtn.classList.toggle('ready', topicInput.value !== '');
        });

        // Check auth on page load, then show hook or redirect
        async function checkAuth() {
            try {
                const res = await fetch(API_BASE + '/api/subscription', { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    const hasAccess = data.role === 'owner' || data.role === 'lifetime' || data.role === 'og_tester' || data.subscribed || data.freeAcknowledged || data.preferences?.onboarded;
                    if (hasAccess) {
                        isAuthenticated = true;
                        userDisplay.textContent = data.name || data.email || '';
                        populateSubjects();
                        return; // Show hook screen (already visible)
                    }
                }
            } catch (e) {}
            // Not logged in → redirect to login
            window.location.href = 'login.html';
        }

        function populateSubjects() {
            const byCategory = {};
            subjects.forEach(s => {
                if (!byCategory[s.category]) byCategory[s.category] = [];
                byCategory[s.category].push(s);
            });
            subjectInput.innerHTML = '<option value="">Select your subject...</option>';
            Object.keys(byCategory).sort().forEach(cat => {
                const group = document.createElement('optgroup');
                group.label = cat;
                byCategory[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.id;
                    opt.textContent = s.name;
                    group.appendChild(opt);
                });
                subjectInput.appendChild(group);
            });
        }

        // Hook Start → go to subject step
        function handleHookStart() {
            showStep('subject');
        }

        function showStep(step) {
            hookScreen.style.display = 'none';
            stepSubject.style.display = 'none';
            stepSubject.classList.remove('active');
            stepTopic.style.display = 'none';
            stepTopic.classList.remove('active');
            mainContainer.classList.remove('active');

            if (step === 'subject') {
                stepSubject.style.display = 'flex';
                stepSubject.classList.add('active');
                subjectInput.focus();
            } else if (step === 'topic') {
                stepTopic.style.display = 'flex';
                stepTopic.classList.add('active');
                topicInput.focus();
            } else if (step === 'chat') {
                mainContainer.classList.add('active');
                userInput.focus();
            }
        }

        // Step 2 → Step 3
        function goToTopic() {
            if (!subjectInput.value) return;
            // Re-populate modules in case subject changed
            topicInput.innerHTML = '<option value="">Select a module...</option>';
            topicNextBtn.classList.remove('ready');
            const topics = subjectTopics[subjectInput.value];
            if (topics) {
                topics.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    topicInput.appendChild(opt);
                });
            }
            showStep('topic');
        }

        // Launch simulation (always game mode on first run)
        async function launchSimulation() {
            const subjectId = subjectInput.value;
            const subj = subjects.find(s => s.id === subjectId);
            const subject = subj ? subj.name : subjectId;
            const topic = topicInput.value;
            if (!subject || !topic) return;

            showStep('chat');
            chatMessages.innerHTML = '';
            choicesContainer.innerHTML = '';
            conversationHistory = [];
            gameState = null;

            // Show mode toggle after first session
            if (hasCompletedFirstSession) {
                modeToggle.style.display = 'flex';
            }

            const initMessage = `Subject: ${subject}\nTopic: ${topic}\nMode: ${currentMode}`;
            await sendMessage(initMessage, false);
        }

        function resetSession() {
            hasCompletedFirstSession = true;
            conversationHistory = [];
            gameState = null;
            chatMessages.innerHTML = '';
            choicesContainer.innerHTML = '';
            topicInput.value = '';
            topicNextBtn.classList.remove('ready');
            // Go back to topic step (keep subject selected for convenience)
            showStep('topic');
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('toggleGame').className = 'mode-toggle-switch' + (mode === 'game' ? ' active-game' : '');
            document.getElementById('toggleBreakdown').className = 'mode-toggle-switch' + (mode === 'breakdown' ? ' active-breakdown' : '');
        }

        async function sendMessage(content, showAsUser = true) {
            if (isLoading) return;

            if (showAsUser) addMessage(content, true);
            conversationHistory.push({ role: 'user', content });

            isLoading = true;
            sendBtn.disabled = true;
            userInput.disabled = true;
            showLoading();

            try {
                const res = await fetch(API_BASE + '/api/chat/learn-irl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ messages: conversationHistory })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    if (err.freeTierExhausted) {
                        hideLoading();
                        showFreeTierUpsell();
                        return;
                    }
                    throw new Error(err.error || 'Request failed');
                }

                const data = await res.json();
                hideLoading();

                const reply = data.reply || data.content || '';
                conversationHistory.push({ role: 'assistant', content: reply });

                // Try to parse game JSON from response
                if (currentMode === 'game') {
                    const parsed = tryParseGameResponse(reply);
                    if (parsed) {
                        renderGameResponse(parsed);
                        return;
                    }
                }

                // Fallback: render as regular text
                addMessage(reply, false);

            } catch (e) {
                hideLoading();
                addMessage('Something went wrong. Please try again.', false);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        function tryParseGameResponse(text) {
            const jsonMatch = text.match(/\{[\s\S]*"message"[\s\S]*"choices"[\s\S]*\}/);
            if (jsonMatch) {
                try {
                    const parsed = JSON.parse(jsonMatch[0]);
                    if (parsed.message && parsed.choices) return parsed;
                } catch (e) {}
            }
            try {
                const parsed = JSON.parse(text);
                if (parsed.message && parsed.choices) return parsed;
            } catch (e) {}
            return null;
        }

        function renderGameResponse(data) {
            if (data.effects) {
                if (!gameState) gameState = { money: 50, time: 50, risk: 50, energy: 50 };
                for (const [key, val] of Object.entries(data.effects)) {
                    if (gameState[key] !== undefined) gameState[key] += val;
                }
            }

            const div = document.createElement('div');
            div.className = 'message message-bot';
            div.innerHTML = `<p>${formatResponse(data.message)}</p>`;
            chatMessages.appendChild(div);

            if (data.choices && data.choices.length > 0) {
                choicesContainer.innerHTML = `<div class="choices" style="padding: 0 24px 16px;">
                    ${data.choices.map((c) => `<button class="choice-btn" onclick="pickChoice(this, '${escapeAttr(c)}')">${escapeHtml(c)}</button>`).join('')}
                </div>`;
            } else {
                choicesContainer.innerHTML = '';
            }

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function pickChoice(btn, choice) {
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            btn.style.borderColor = 'var(--primary)';
            btn.style.background = '#f0f2ff';
            choicesContainer.innerHTML = '';
            sendMessage(choice, true);
        }

        function addMessage(content, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'message-user' : 'message-bot'}`;
            if (isUser) {
                div.textContent = content;
            } else {
                div.innerHTML = `<p>${formatResponse(content)}</p>`;
            }
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function formatResponse(text) {
            return text
                .replace(/## (.*)/g, '<h2>$1</h2>')
                .replace(/### (.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^\• (.*)/gm, '<li>$1</li>')
                .replace(/^- (.*)/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/gs, '<ul>$&</ul>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        }

        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function escapeAttr(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        function showLoading() {
            const div = document.createElement('div');
            div.className = 'loading'; div.id = 'loadingIndicator';
            div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span>Thinking...</span>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function hideLoading() { const l = document.getElementById('loadingIndicator'); if (l) l.remove(); }

        function showFreeTierUpsell() {
            const div = document.createElement('div');
            div.className = 'message message-bot';
            div.innerHTML = `<div style="text-align:center;padding:20px 10px;">
                <h3 style="margin:0 0 8px;">You've used your free Learn IRL session for today.</h3>
                <p style="color:#666;margin:0 0 16px;">Upgrade to <strong>Premium</strong> for unlimited uses and better quality answers.</p>
                <a href="index.html" style="display:inline-block;padding:10px 24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;">See Plans</a>
                <p style="color:#888;font-size:0.85rem;margin-top:12px;">Come back tomorrow for more free uses!</p>
            </div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Form submit
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (!msg) return;
            userInput.value = '';
            sendMessage(msg, true);
        });

        // Enter to send in chat
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatForm.dispatchEvent(new Event('submit')); }
        });

        // Page load → check auth, then hook screen
        checkAuth();
    </script>
</body>
</html>
