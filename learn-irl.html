<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Learn IRL — Real-Life Learning | Study Decoder</title>
    <meta name="description" content="Learn any HSC topic through real-life simulations and breakdowns. Play interactive decision games or get clear real-world explanations that actually make sense.">
    <link rel="canonical" href="https://www.studydecoder.com.au/learn-irl.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Study Decoder">
    <meta property="og:title" content="Learn IRL — Real-Life Learning | Study Decoder">
    <meta property="og:description" content="Learn any HSC topic through real-life simulations and breakdowns. Make learning feel real.">
    <meta property="og:url" content="https://www.studydecoder.com.au/learn-irl.html">
    <meta property="og:image" content="https://www.studydecoder.com.au/logo.png">
    <meta property="og:locale" content="en_AU">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Learn IRL — Real-Life Learning | Study Decoder">
    <meta name="twitter:description" content="Learn through real-life simulations and breakdowns.">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #2A2A2A;
            --accent: #FF6584;
            --game: #10b981;
            --breakdown: #f59e0b;
            --light-bg: #F9F9FB;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--light-bg); color: var(--secondary); min-height: 100vh; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: var(--white);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { height: 38px; }
        .logo span { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 0.6rem 1.4rem; border-radius: 50px; text-decoration: none;
            font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: var(--transition); border: none;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(108,99,255,0.3); }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: #fff; }

        .login-gate {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 80vh; padding: 40px 20px; text-align: center;
        }
        .login-gate h1 {
            font-size: 2rem; margin-bottom: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .login-gate p { color: #666; margin-bottom: 24px; max-width: 500px; }
        .login-gate .btn { font-size: 1rem; padding: 0.8rem 2rem; }

        .main-container { max-width: 900px; margin: 0 auto; padding: 30px 20px; display: none; }
        .main-container.active { display: block; }

        .page-header { text-align: center; margin-bottom: 24px; }
        .page-header h1 {
            font-size: 2rem; font-weight: 700; margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-header p { color: #666; font-size: 1rem; }

        /* Setup panel */
        .setup-panel {
            background: var(--white); border-radius: var(--radius); padding: 28px;
            box-shadow: var(--shadow); margin-bottom: 24px;
        }
        .setup-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .setup-row label { font-size: 0.85rem; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
        .setup-field { flex: 1; min-width: 200px; }
        .setup-input {
            width: 100%; padding: 12px 16px; border: 2px solid #e8e8e8; border-radius: 10px;
            font-size: 14px; color: var(--secondary); transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }
        .setup-input:focus { outline: none; border-color: var(--primary); }

        .mode-selector { display: flex; gap: 12px; margin-bottom: 20px; }
        .mode-btn {
            flex: 1; padding: 18px 20px; border-radius: 12px;
            border: 2px solid #e8e8e8; background: #fff; cursor: pointer;
            transition: var(--transition); text-align: left;
        }
        .mode-btn:hover { border-color: var(--primary); }
        .mode-btn.active-game { border-color: var(--game); background: linear-gradient(135deg, #ecfdf5 0%, #fff 100%); box-shadow: 0 4px 12px rgba(16,185,129,0.15); }
        .mode-btn.active-breakdown { border-color: var(--breakdown); background: linear-gradient(135deg, #fffbeb 0%, #fff 100%); box-shadow: 0 4px 12px rgba(245,158,11,0.15); }
        .mode-btn h4 { font-size: 14px; margin-bottom: 4px; font-weight: 600; }
        .mode-btn p { font-size: 12px; color: #666; margin: 0; line-height: 1.4; }
        .mode-btn.active-game h4 { color: var(--game); }
        .mode-btn.active-breakdown h4 { color: var(--breakdown); }

        .start-btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: var(--transition);
            color: #fff; background: linear-gradient(135deg, var(--primary), #8b7cf7);
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.35); }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Chat area */
        .chat-container {
            background: var(--white); border-radius: var(--radius);
            box-shadow: var(--shadow); overflow: hidden; border: 1px solid rgba(0,0,0,0.04);
            display: none;
        }
        .chat-container.active { display: block; }
        .chat-messages { height: 500px; overflow-y: auto; padding: 24px; background: linear-gradient(180deg, #fafbff 0%, #fff 100%); }
        .message { margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message-user {
            background: linear-gradient(135deg, var(--primary), #8b7cf7);
            color: #fff; padding: 14px 18px; border-radius: 16px 16px 4px 16px;
            margin-left: auto; max-width: 85%; width: fit-content;
        }
        .message-bot {
            background: #f0f2ff; border: 1px solid #e0e4ff;
            padding: 18px 20px; border-radius: 4px 16px 16px 16px; max-width: 95%;
        }
        .message-bot h2 { color: var(--primary); font-size: 16px; margin: 20px 0 12px 0; }
        .message-bot h2:first-child { margin-top: 0; }
        .message-bot h3 { color: var(--primary); font-size: 14px; margin: 16px 0 10px 0; }
        .message-bot p { margin-bottom: 10px; line-height: 1.65; color: #444; }
        .message-bot ul { margin: 8px 0 8px 18px; }
        .message-bot li { margin-bottom: 8px; color: #555; line-height: 1.5; }
        .message-bot strong { color: var(--primary); }

        /* Choice buttons */
        .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
        .choice-btn {
            padding: 14px 20px; border: 2px solid #e0e4ff; border-radius: 12px;
            background: #fff; cursor: pointer; font-size: 14px; font-weight: 500;
            color: var(--secondary); text-align: left; transition: var(--transition);
            font-family: 'Poppins', sans-serif; line-height: 1.5;
        }
        .choice-btn:hover { border-color: var(--primary); background: #f0f2ff; transform: translateX(4px); }
        .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .loading { display: flex; align-items: center; gap: 10px; color: #888; padding: 16px; }
        .loading-dots { display: flex; gap: 4px; }
        .loading-dots span {
            width: 8px; height: 8px; background: var(--primary); border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .input-panel { background: #fff; border-top: 1px solid #eee; padding: 20px 24px; }
        .input-form { display: flex; gap: 12px; }
        .chat-input {
            flex: 1; padding: 14px 18px; border: 2px solid #e8e8e8; border-radius: 12px;
            font-size: 14px; color: var(--secondary); resize: none;
            transition: var(--transition); font-family: 'Poppins', sans-serif;
        }
        .chat-input:focus { outline: none; border-color: var(--primary); }
        .chat-input:disabled { background: #f5f5f5; cursor: not-allowed; }
        .send-btn {
            background: linear-gradient(135deg, var(--primary), #8b7cf7);
            color: #fff; border: none; border-radius: 12px; padding: 14px 24px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition);
            white-space: nowrap;
        }
        .send-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.35); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .new-topic-btn {
            display: inline-block; margin-top: 16px; padding: 10px 20px;
            background: transparent; border: 2px solid var(--primary); border-radius: 50px;
            color: var(--primary); font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: var(--transition);
        }
        .new-topic-btn:hover { background: var(--primary); color: #fff; }

        @media (max-width: 768px) {
            .navbar { padding: 0.7rem 4%; }
            .logo span { font-size: 1.1rem; }
            .nav-right .btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
            .page-header h1 { font-size: 1.4rem; }
            .page-header p { font-size: 0.85rem; }
            .main-container { padding: 16px 10px; }
            .setup-panel { padding: 18px 14px; }
            .mode-selector { flex-direction: column; }
            .setup-row { flex-direction: column; }
            .setup-field { min-width: unset; }

            /* Chat fills available viewport */
            .chat-container.active {
                display: flex; flex-direction: column;
                height: calc(100vh - 130px);
                border-radius: 12px;
            }
            .chat-messages {
                height: unset; flex: 1; overflow-y: auto;
                padding: 14px;
            }
            .message-bot { max-width: 100%; padding: 14px; }
            .message-user { max-width: 90%; padding: 10px 14px; font-size: 0.9rem; }
            .choices { padding: 0 !important; }
            .choice-btn { padding: 12px 14px; font-size: 13px; }
            .input-panel { padding: 12px; }
            .input-form { flex-direction: column; gap: 8px; }
            .chat-input { font-size: 14px; padding: 10px 12px; }
            .send-btn { width: 100%; padding: 12px; }
            .new-topic-btn { font-size: 0.8rem; padding: 8px 16px; margin-top: 10px; }
            .login-gate h1 { font-size: 1.5rem; }
            .login-gate p { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Study Decoder">
            <span>Study Decoder</span>
        </a>
        <div class="nav-right">
            <a href="senior-bot.html" class="btn btn-outline">← Back to Tools</a>
            <span id="userDisplay" style="font-size: 0.85rem; color: #666;"></span>
        </div>
    </nav>

    <!-- Login Gate -->
    <div class="login-gate" id="loginGate">
        <h1>Learn IRL</h1>
        <p>Learn any topic through real-life simulations and breakdowns. Sign in to start making learning feel real.</p>
        <a href="login.html" class="btn btn-primary">Sign In to Access</a>
    </div>

    <!-- Main Interface -->
    <div class="main-container" id="mainContainer">
        <div class="page-header">
            <h1>Learn IRL</h1>
            <p>Learn any topic through real-life decisions and clear breakdowns</p>
        </div>

        <!-- Setup Panel -->
        <div class="setup-panel" id="setupPanel">
            <div class="setup-row">
                <div class="setup-field">
                    <label>Subject</label>
                    <select class="setup-input" id="subjectInput">
                        <option value="">Select your subject...</option>
                    </select>
                </div>
                <div class="setup-field">
                    <label>Topic</label>
                    <input type="text" class="setup-input" id="topicInput" placeholder="e.g. Supply and Demand, Quadratics, Mitosis...">
                </div>
            </div>

            <div class="mode-selector" id="modeSelector">
                <button class="mode-btn active-game" id="gameModeBtn" onclick="selectMode('game')">
                    <h4>Game Mode</h4>
                    <p>Learn through interactive decisions. Make choices, see consequences, and understand concepts by living them.</p>
                </button>
                <button class="mode-btn" id="breakdownModeBtn" onclick="selectMode('breakdown')">
                    <h4>Breakdown Mode</h4>
                    <p>Get a clear real-life explanation. No textbook fluff — just what it means, where you see it, and why it matters.</p>
                </button>
            </div>

            <button class="start-btn" id="startBtn" onclick="startSession()">Start Learning</button>
        </div>

        <!-- Chat Area -->
        <div class="chat-container" id="chatContainer">
            <div class="chat-messages" id="chatMessages"></div>
            <div id="choicesContainer"></div>
            <div class="input-panel">
                <form class="input-form" id="chatForm">
                    <textarea class="chat-input" id="userInput" placeholder="Type your response or ask a follow-up..." rows="2"></textarea>
                    <button type="submit" class="send-btn" id="sendBtn">Send</button>
                </form>
                <button class="new-topic-btn" onclick="resetSession()">New Topic</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:3001' : '';

        let currentMode = 'game';
        let conversationHistory = [];
        let gameState = null;
        let isLoading = false;

        // Elements
        const loginGate = document.getElementById('loginGate');
        const mainContainer = document.getElementById('mainContainer');
        const setupPanel = document.getElementById('setupPanel');
        const chatContainer = document.getElementById('chatContainer');
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const startBtn = document.getElementById('startBtn');
        const subjectInput = document.getElementById('subjectInput');
        const topicInput = document.getElementById('topicInput');
        const userDisplay = document.getElementById('userDisplay');
        const choicesContainer = document.getElementById('choicesContainer');

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('gameModeBtn').className = 'mode-btn' + (mode === 'game' ? ' active-game' : '');
            document.getElementById('breakdownModeBtn').className = 'mode-btn' + (mode === 'breakdown' ? ' active-breakdown' : '');
        }

        async function checkAuth() {
            try {
                const res = await fetch(API_BASE + '/api/subscription', { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    const hasAccess = data.role === 'owner' || data.role === 'lifetime' || data.role === 'og_tester' || data.subscribed || data.freeAcknowledged || data.preferences?.onboarded;
                    if (hasAccess) {
                        loginGate.style.display = 'none';
                        mainContainer.classList.add('active');
                        userDisplay.textContent = data.name || data.email || '';
                        loadSubjects();
                        return;
                    }
                }
            } catch (e) {}
            loginGate.style.display = 'flex';
            mainContainer.classList.remove('active');
        }

        async function loadSubjects() {
            try {
                const res = await fetch(API_BASE + '/api/subjects');
                const data = await res.json();
                data.subjects.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.name;
                    opt.textContent = s.name;
                    subjectInput.appendChild(opt);
                });
            } catch (e) {}
        }

        async function startSession() {
            const subject = subjectInput.value;
            const topic = topicInput.value.trim();
            if (!subject || !topic) {
                alert('Please select a subject and enter a topic.');
                return;
            }

            setupPanel.style.display = 'none';
            chatContainer.classList.add('active');
            chatMessages.innerHTML = '';
            choicesContainer.innerHTML = '';
            conversationHistory = [];
            gameState = null;

            const initMessage = `Subject: ${subject}\nTopic: ${topic}\nMode: ${currentMode}`;
            await sendMessage(initMessage, false);
        }

        function resetSession() {
            setupPanel.style.display = 'block';
            chatContainer.classList.remove('active');
            conversationHistory = [];
            gameState = null;
            chatMessages.innerHTML = '';
            choicesContainer.innerHTML = '';
        }

        async function sendMessage(content, showAsUser = true) {
            if (isLoading) return;

            if (showAsUser) addMessage(content, true);
            conversationHistory.push({ role: 'user', content });

            isLoading = true;
            sendBtn.disabled = true;
            userInput.disabled = true;
            showLoading();

            try {
                const res = await fetch(API_BASE + '/api/chat/learn-irl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ messages: conversationHistory })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    if (err.freeTierExhausted) {
                        hideLoading();
                        showFreeTierUpsell();
                        return;
                    }
                    throw new Error(err.error || 'Request failed');
                }

                const data = await res.json();
                hideLoading();

                const reply = data.reply || data.content || '';
                conversationHistory.push({ role: 'assistant', content: reply });

                // Try to parse game JSON from response
                if (currentMode === 'game') {
                    const parsed = tryParseGameResponse(reply);
                    if (parsed) {
                        renderGameResponse(parsed);
                        return;
                    }
                }

                // Fallback: render as regular text
                addMessage(reply, false);

            } catch (e) {
                hideLoading();
                addMessage('Something went wrong. Please try again.', false);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        function tryParseGameResponse(text) {
            // Try to find JSON in the response
            const jsonMatch = text.match(/\{[\s\S]*"message"[\s\S]*"choices"[\s\S]*\}/);
            if (jsonMatch) {
                try {
                    const parsed = JSON.parse(jsonMatch[0]);
                    if (parsed.message && parsed.choices) return parsed;
                } catch (e) {}
            }
            // Try parsing entire response as JSON
            try {
                const parsed = JSON.parse(text);
                if (parsed.message && parsed.choices) return parsed;
            } catch (e) {}
            return null;
        }

        function renderGameResponse(data) {
            // Track state internally (no visible UI)
            if (data.effects) {
                if (!gameState) gameState = { money: 50, time: 50, risk: 50, energy: 50 };
                for (const [key, val] of Object.entries(data.effects)) {
                    if (gameState[key] !== undefined) gameState[key] += val;
                }
            }

            // Render message as story narration
            const div = document.createElement('div');
            div.className = 'message message-bot';
            div.innerHTML = `<p>${formatResponse(data.message)}</p>`;
            chatMessages.appendChild(div);

            // Render choices as story decisions (no labels)
            if (data.choices && data.choices.length > 0) {
                choicesContainer.innerHTML = `<div class="choices" style="padding: 0 24px 16px;">
                    ${data.choices.map((c) => `<button class="choice-btn" onclick="pickChoice(this, '${escapeAttr(c)}')">${escapeHtml(c)}</button>`).join('')}
                </div>`;
            } else {
                choicesContainer.innerHTML = '';
            }

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function pickChoice(btn, choice) {
            // Disable all choice buttons
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            btn.style.borderColor = 'var(--primary)';
            btn.style.background = '#f0f2ff';
            choicesContainer.innerHTML = '';
            sendMessage(choice, true);
        }

        function addMessage(content, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'message-user' : 'message-bot'}`;
            if (isUser) {
                div.textContent = content;
            } else {
                div.innerHTML = `<p>${formatResponse(content)}</p>`;
            }
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function formatResponse(text) {
            return text
                .replace(/## (.*)/g, '<h2>$1</h2>')
                .replace(/### (.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^\• (.*)/gm, '<li>$1</li>')
                .replace(/^- (.*)/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/gs, '<ul>$&</ul>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        }

        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function escapeAttr(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        function showLoading() {
            const div = document.createElement('div');
            div.className = 'loading'; div.id = 'loadingIndicator';
            div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span>Thinking...</span>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function hideLoading() { const l = document.getElementById('loadingIndicator'); if (l) l.remove(); }

        function showFreeTierUpsell() {
            const div = document.createElement('div');
            div.className = 'message message-bot';
            div.innerHTML = `<div style="text-align:center;padding:20px 10px;">
                <h3 style="margin:0 0 8px;">You've used your free Learn IRL session for today.</h3>
                <p style="color:#666;margin:0 0 16px;">Upgrade to <strong>Premium</strong> for unlimited uses and better quality answers.</p>
                <a href="index.html" style="display:inline-block;padding:10px 24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;">See Plans</a>
                <p style="color:#888;font-size:0.85rem;margin-top:12px;">Come back tomorrow for more free uses!</p>
            </div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Form submit
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (!msg) return;
            userInput.value = '';
            sendMessage(msg, true);
        });

        // Enter to send
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatForm.dispatchEvent(new Event('submit')); }
        });

        checkAuth();
    </script>
