<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Join a Class | Study Decoder</title>
<meta name="description" content="Enter the join code from your teacher to link your Study Decoder account to their class and unlock full access.">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; width:100%; font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1419; color:#e7e9ea; }
.app-container { display:flex; flex-direction:column; min-height:100vh; width:100%; overflow-x:hidden; }
.header { background:#16202a; border-bottom:1px solid #2f3336; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.header-left { display:flex; align-items:center; gap:16px; }
.back-btn { color:#4f8cff; text-decoration:none; font-size:14px; font-weight:500; padding:8px 16px; border-radius:8px; background:rgba(79,140,255,0.1); }
.header-title { font-size:20px; font-weight:700; }
.header-subtitle { font-size:12px; color:#71767b; margin-top:2px; }
.main-content { flex:1; padding:32px 24px; }
.container { max-width:980px; margin:0 auto; }
.card { background:#16202a; border:1px solid #2f3336; border-radius:16px; padding:24px; margin-bottom:20px; }
.btn { background:linear-gradient(135deg,#4f8cff,#6c63ff); color:#fff; border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; }
.btn:hover:not(:disabled) { transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-ghost { background:#1d3a5f; color:#e7e9ea; border:1px solid rgba(79,140,255,0.3); }
.btn-danger { background:rgba(220,53,69,0.15); color:#ff8088; border:1px solid rgba(220,53,69,0.4); }
.form-input,.form-select,textarea { background:#0f1419; border:1px solid #2f3336; border-radius:8px; padding:12px 14px; color:#e7e9ea; font-size:14px; font-family:inherit; width:100%; }
.form-input:focus,.form-select:focus,textarea:focus { outline:none; border-color:#4f8cff; }
.form-label { font-size:13px; font-weight:500; color:#c8ccd0; display:block; margin-bottom:6px; }
.auth-loading-overlay { position:fixed; inset:0; background:#0f1419; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.auth-spinner { width:50px; height:50px; border:4px solid #2f3336; border-top-color:#4f8cff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
.error-banner { background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.4); color:#ff8088; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
.stat-box { background:#0f1419; border:1px solid #2f3336; border-radius:12px; padding:16px; }
.stat-box .num { font-size:26px; font-weight:800; color:#4f8cff; }
.stat-box .lbl { font-size:12px; color:#8899a6; margin-top:2px; }
table { width:100%; border-collapse:collapse; }
th,td { text-align:left; padding:10px 12px; border-bottom:1px solid #2f3336; font-size:14px; }
th { color:#8899a6; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
@media (max-width:720px){ .main-content{padding:16px;} table{font-size:13px;} th,td{padding:8px 6px;} }

.join-card { max-width:460px; margin:8px auto 20px; text-align:center; }
.join-card h2 { font-size:22px; font-weight:800; margin-bottom:6px; }
.join-card .lead { color:#a9b3bd; font-size:14px; margin-bottom:20px; }
.code-input { text-transform:uppercase; letter-spacing:10px; font-size:28px; font-weight:800; text-align:center; padding:16px 14px; }
.code-input::placeholder { letter-spacing:6px; color:#3a4654; }
.success-card { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.4); border-radius:16px; padding:24px; margin-bottom:20px; text-align:center; }
.success-card h2 { color:#7ee2a8; font-size:20px; font-weight:800; margin-bottom:8px; }
.success-card p { color:#cfe8d8; font-size:15px; margin-bottom:16px; }
.section-title { font-size:18px; font-weight:700; margin-bottom:14px; }
.assign-list { list-style:none; }
.assign-list li { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 14px; background:#0f1419; border:1px solid #2f3336; border-radius:10px; margin-bottom:10px; }
.assign-meta { font-size:12px; color:#8899a6; margin-top:3px; }
.badge { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:3px 8px; border-radius:6px; background:#1d3a5f; color:#9ec3ff; }
.status-pill { font-size:12px; font-weight:600; padding:4px 10px; border-radius:20px; white-space:nowrap; }
.status-completed { background:rgba(34,197,94,0.15); color:#7ee2a8; }
.status-pending { background:rgba(234,179,8,0.15); color:#e8c463; }
.muted { color:#71767b; font-size:14px; }
</style>
</head>
<body>
<div id="authLoading" class="auth-loading-overlay"><div class="auth-spinner"></div><div style="margin-top:16px;color:#71767b;">Loading…</div></div>
<div class="app-container hidden" id="appContainer">
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">← Home</a>
      <div><div class="header-title">Join a Class</div><div class="header-subtitle">Enter the code your teacher gave you.</div></div>
    </div>
  </header>
  <main class="main-content"><div class="container" id="root"></div></main>
</div>
<script src="auth.js"></script>
<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
function api(path, opts){ return fetch(API_BASE+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts||{})); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let joined = false;
let joinedClassName = '';

function fmtDate(s){
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return '';
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

function renderAssignments(assignments){
  const slot = document.getElementById('assignSlot');
  if (!slot) return;
  if (!assignments || !assignments.length){ slot.innerHTML = ''; return; }
  const items = assignments.map(a => {
    const due = a.dueAt ? `Due ${esc(fmtDate(a.dueAt))}` : 'No due date';
    const statusClass = a.status === 'completed' ? 'status-completed' : 'status-pending';
    const statusText = a.status === 'completed' ? 'Completed' : 'Pending';
    return `<li>
      <div>
        <div><span class="badge">${esc(a.type||'')}</span> &nbsp;<strong>${esc(a.title)}</strong></div>
        <div class="assign-meta">${esc(a.className||'')} · ${due}</div>
      </div>
      <span class="status-pill ${statusClass}">${statusText}</span>
    </li>`;
  }).join('');
  slot.innerHTML = `
    <div class="card">
      <div class="section-title">Your assignments</div>
      <ul class="assign-list">${items}</ul>
    </div>`;
}

function loadAssignments(){
  api('/api/student/assignments')
    .then(r => r.ok ? r.json() : { assignments: [] })
    .then(d => renderAssignments(d.assignments || []))
    .catch(() => {});
}

function render(){
  const root = document.getElementById('root');
  if (joined){
    root.innerHTML = `
      <div class="success-card">
        <h2>You're in! 🎉</h2>
        <p>You now have full Study Decoder access while you're in ${esc(joinedClassName || 'your class')}.</p>
        <a href="index.html" class="btn" style="display:inline-block;text-decoration:none;">Start studying →</a>
      </div>
      <div id="assignSlot"></div>`;
  } else {
    root.innerHTML = `
      <div class="card join-card">
        <h2>Join your class</h2>
        <div class="lead">Your teacher will have given you a 6-character code. Enter it below to link your account.</div>
        <div id="errSlot"></div>
        <form id="joinForm" autocomplete="off">
          <label class="form-label" for="codeInput" style="text-align:left;">Class join code</label>
          <input class="form-input code-input" id="codeInput" name="code" maxlength="6" placeholder="ABC123"
            inputmode="latin" autocapitalize="characters" spellcheck="false" required>
          <button type="submit" class="btn" id="joinBtn" style="width:100%;margin-top:16px;">Join Class</button>
        </form>
      </div>
      <div id="assignSlot"></div>`;
    const input = document.getElementById('codeInput');
    input.addEventListener('input', () => {
      input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
    });
    document.getElementById('joinForm').addEventListener('submit', submitJoin);
  }
  loadAssignments();
}

function submitJoin(e){
  e.preventDefault();
  const btn = document.getElementById('joinBtn');
  const errSlot = document.getElementById('errSlot');
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  errSlot.innerHTML = '';
  if (code.length !== 6){
    errSlot.innerHTML = '<div class="error-banner">Enter the full 6-character code.</div>';
    return;
  }
  btn.disabled = true; btn.textContent = 'Joining…';
  api('/api/classes/join', { method:'POST', body: JSON.stringify({ joinCode: code }) })
    .then(async r => {
      const d = await r.json().catch(()=>({}));
      if (!r.ok){
        if (r.status === 401){
          window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
          return;
        }
        errSlot.innerHTML = '<div class="error-banner">' + esc(d.error || 'Could not join that class.') + '</div>';
        btn.disabled = false; btn.textContent = 'Join Class';
        return;
      }
      joined = true;
      joinedClassName = (d.class && d.class.name) ? d.class.name : '';
      render();
    })
    .catch(() => {
      errSlot.innerHTML = '<div class="error-banner">Network error. Please try again.</div>';
      btn.disabled = false; btn.textContent = 'Join Class';
    });
}

(function init(){
  api('/api/subscription')
    .then(r => {
      if (!r.ok || r.status === 401){
        window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
        return null;
      }
      return r.json();
    })
    .then(d => {
      if (!d) return;
      render();
      document.getElementById('authLoading').classList.add('hidden');
      document.getElementById('appContainer').classList.remove('hidden');
    })
    .catch(() => {
      window.location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname);
    });
})();
</script>
</body>
</html>
